<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Shibila & Murshid</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gold2:#E8C97A;--gold3:#8B6914;
  --cream:#FAF7F2;--cream2:#F2EDE4;--cream3:#E0D5C5;
  --dark:#1A1209;--dark2:#2D200A;--dark3:#4A3520;
  --text:#2A1F10;--text2:#6B5230;--text3:#9B7D52;
  --red:#c0392b;--green:#27ae60;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--cream);overflow-x:hidden;color:var(--text)}
::-webkit-scrollbar{display:none}
button,input,textarea{font-family:'Montserrat',sans-serif}
img{display:block}
a{text-decoration:none}

/* ── LOADING ── */
#ls{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.ls-star{font-size:32px;color:var(--gold);margin-bottom:20px;animation:pulse 2s infinite}
.ls-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--gold);margin-bottom:4px}
.ls-bar{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto;animation:barPulse 2s infinite}
.ls-txt{font-size:9px;color:var(--gold3);letter-spacing:4px;text-transform:uppercase}

/* ── BOTTOM NAV ── */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(26,18,9,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,0.2);display:flex;z-index:200}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 16px;opacity:0.3;transition:opacity 0.2s;cursor:pointer}
.nb.on{opacity:1}
.nb-i{font-size:20px;line-height:1}
.nb-l{font-size:8px;font-weight:600;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}

/* ── PAGES ── */
.pg{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:var(--cream);padding-bottom:80px}
.pg.on{display:block}

/* ── TOP BAR ── */
.tb{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.12);display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.tb-right{display:flex;align-items:center;gap:8px}
.admin-tag{font-size:8px;background:var(--gold);color:var(--dark);border-radius:8px;padding:2px 7px;font-weight:700;letter-spacing:1px;display:none}
.av-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--gold);background:var(--dark2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);font-style:italic;overflow:hidden;cursor:pointer;flex-shrink:0}
.av-btn img{width:100%;height:100%;object-fit:cover}

/* ── FAB ── */
#fab{position:fixed;bottom:88px;right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold3),var(--gold));border:none;color:var(--dark);font-size:26px;font-weight:300;display:none;align-items:center;justify-content:center;z-index:150;box-shadow:0 4px 20px rgba(201,168,76,0.5);cursor:pointer;max-width:calc(480px - 18px)}
#fab.on{display:flex}

/* ── STORIES ROW ── */
.stories{background:#fff;border-bottom:1px solid var(--cream3);padding:12px 0}
.stories-scroll{display:flex;gap:12px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
.s-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.s-ring{width:60px;height:60px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2))}
.s-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2.5px solid #fff}
.s-ring-empty{width:100%;height:100%;border-radius:50%;border:2.5px solid #fff;background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-size:18px}
.s-lbl{font-size:9px;color:var(--text2);max-width:60px;text-align:center;line-height:1.3;font-weight:500}

/* ── POST CARD ── */
.card{background:#fff;border-bottom:6px solid var(--cream);animation:fadeUp 0.3s ease}
.card-head{display:flex;align-items:center;gap:10px;padding:12px 14px}
.card-av{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);font-style:italic}
.card-av img{width:100%;height:100%;object-fit:cover}
.card-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--dark);font-weight:600}
.card-time{font-size:10px;color:var(--text3)}
.card-badge{font-size:9px;background:var(--dark);border-radius:20px;padding:3px 9px;color:var(--gold);letter-spacing:0.5px;font-weight:500;margin-left:auto}
.card-del{background:none;border:none;color:var(--red);font-size:16px;opacity:0.5;padding:4px;margin-left:4px;cursor:pointer;display:none}
.card-img{position:relative;user-select:none;-webkit-user-select:none}
.card-img img,.card-img video{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.slide-prev,.slide-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(26,18,9,0.5);border:1px solid rgba(201,168,76,0.4);border-radius:50%;width:30px;height:30px;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:2;color:var(--gold);cursor:pointer}
.slide-prev{left:10px}.slide-next{right:10px}
.slide-count{position:absolute;top:10px;right:10px;background:rgba(26,18,9,0.6);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:3px 9px;font-size:10px;color:var(--gold);font-weight:600}
.slide-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.dot{height:4px;border-radius:2px;transition:all 0.25s}
.dot.on{width:18px;background:var(--gold)}.dot.off{width:4px;background:rgba(201,168,76,0.4)}
.heart-pop{position:absolute;top:50%;left:50%;font-size:80px;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop 0.9s ease forwards}
.reel-ov{position:absolute;inset:0;background:rgba(26,18,9,0.28);display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-play{width:62px;height:62px;border-radius:50%;background:rgba(201,168,76,0.15);backdrop-filter:blur(8px);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:22px;padding-left:4px}
.card-actions{padding:10px 14px 12px}
.action-row{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.act{background:none;border:none;font-size:24px;line-height:1;transition:transform 0.15s;padding:2px;cursor:pointer}
.act:active{transform:scale(0.82)}
.like-count{font-weight:600;font-size:12px;color:var(--dark);margin-bottom:4px}
.caption{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:3px}
.caption strong{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--dark)}
.view-cmts{background:none;border:none;padding:0;font-size:11px;color:var(--text3);display:block;margin-top:2px;cursor:pointer}
.last-cmt{font-size:12px;color:var(--text2);margin-top:4px}
.last-cmt strong{font-family:'Cormorant Garamond',serif;font-style:italic}
.card-time-small{font-size:9px;color:var(--cream3);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.song-row{padding:5px 14px 0;font-size:11px;color:var(--text3);font-style:italic;display:flex;align-items:center;gap:5px}
.spin{animation:spin 4s linear infinite;display:inline-block}

/* ── REELS PAGE ── */
#pg-reels{background:var(--dark)}
.reels-tb{position:sticky;top:0;z-index:100;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,18,9,0.85);backdrop-filter:blur(12px)}
.reels-tb span{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:22px;font-style:italic}
.reel-card{position:relative;height:88vh;background:#0d0a06;margin-bottom:3px;overflow:hidden}
.reel-card video,.reel-card img{width:100%;height:100%;object-fit:cover;opacity:0.88}
.reel-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-center-btn{width:62px;height:62px;border-radius:50%;background:rgba(201,168,76,0.15);backdrop-filter:blur(8px);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:22px;padding-left:4px}
.reel-side{position:absolute;right:12px;bottom:140px;display:flex;flex-direction:column;gap:22px;align-items:center}
.reel-act{display:flex;flex-direction:column;align-items:center;gap:4px}
.reel-act button{background:none;border:none;font-size:28px;cursor:pointer;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7))}
.reel-act span{color:var(--gold);font-size:11px;font-weight:600;letter-spacing:0.5px}
.reel-del{position:absolute;top:14px;right:14px;background:rgba(26,18,9,0.6);border:1px solid rgba(201,168,76,0.3);color:var(--gold);border-radius:50%;width:32px;height:32px;font-size:14px;display:none;align-items:center;justify-content:center;cursor:pointer}
.reel-info{position:absolute;bottom:0;left:0;right:68px;padding:60px 14px 22px;background:linear-gradient(to top,rgba(26,18,9,0.85),transparent);pointer-events:none}
.reel-uname{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);font-style:italic;margin-bottom:4px}
.reel-cap{font-size:12px;color:rgba(255,255,255,0.85);line-height:1.5;margin-bottom:5px}
.reel-song{font-size:10px;color:rgba(201,168,76,0.7);display:flex;align-items:center;gap:5px}

/* ── WALL PAGE ── */
.wall-tb{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.12);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.wall-tb-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--dark)}
.wall-add-btn{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:20px;color:var(--gold);font-weight:600;font-size:11px;padding:7px 15px;letter-spacing:0.5px;cursor:pointer}
.wall-upload-box{margin:14px;border:1.5px dashed rgba(201,168,76,0.3);border-radius:18px;background:#fff;overflow:hidden;display:none}
.wall-upload-box.open{display:block}
.wall-prev-ph{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;background:linear-gradient(135deg,var(--cream),var(--cream2))}
.wall-prev-ph .icon{font-size:44px}
.wall-prev-ph span{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text3)}
.wall-prev-img{position:relative;width:100%;aspect-ratio:1;overflow:hidden}
.wall-prev-img img{width:100%;height:100%;object-fit:cover}
.wall-form{padding:14px 16px 18px;display:flex;flex-direction:column;gap:10px}
.w-inp{border:1px solid var(--cream3);border-radius:12px;padding:12px 14px;font-size:13px;outline:none;width:100%;background:var(--cream);color:var(--text);transition:border-color 0.2s}
.w-inp:focus{border-color:var(--gold)}
.w-inp::placeholder{color:var(--text3);font-style:italic}
.w-prog{height:3px;background:var(--cream3);border-radius:2px;overflow:hidden;display:none}
.w-prog-bar{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));width:0%;transition:width 0.3s}
.w-submit{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:13px;width:100%;letter-spacing:1px;cursor:pointer}
.w-submit:disabled{opacity:0.45}
.wall-sec-title{padding:18px 16px 10px;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--dark2);display:flex;align-items:center;gap:10px}
.wall-sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.3),transparent)}
/* Wall posts as full cards like home */
#wall-feed{padding:0}

/* ── PROFILE PAGE ── */
.prof-tb{padding:14px 16px;border-bottom:1px solid var(--cream3);display:flex;align-items:center;justify-content:space-between;background:#fff}
.prof-tb-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.prof-tb button{background:none;border:1px solid var(--cream3);border-radius:20px;font-size:11px;color:var(--text3);padding:5px 12px;font-weight:500;cursor:pointer}
.prof-hero{background:linear-gradient(160deg,var(--dark),var(--dark2));padding:28px 16px 24px;text-align:center;position:relative;overflow:hidden}
.prof-hero::before{content:'✦';position:absolute;top:12px;left:18px;color:rgba(201,168,76,0.15);font-size:40px}
.prof-hero::after{content:'✦';position:absolute;bottom:12px;right:18px;color:rgba(201,168,76,0.10);font-size:28px}
.p-av-ring{width:88px;height:88px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));margin:0 auto 14px;cursor:pointer;position:relative}
.p-av-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--dark)}
.p-av-empty{width:100%;height:100%;border-radius:50%;border:3px solid var(--dark);background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);font-style:italic}
.p-av-edit{position:absolute;bottom:0;right:0;width:22px;height:22px;background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:11px}
.p-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--gold);margin-bottom:5px}
.p-bio{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.7;max-width:280px;margin:0 auto 12px}
.p-meta{font-size:11px;color:rgba(201,168,76,0.6);margin:2px 0}
.prof-stats{display:flex;border-top:1px solid var(--cream3);background:#fff}
.stat{flex:1;text-align:center;padding:15px 0;border-right:1px solid var(--cream3)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--dark)}
.stat-l{font-size:8px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.p-btns{display:flex;gap:10px;margin:14px 14px 0}
.p-btns button{flex:1;padding:10px;border:1px solid var(--cream3);border-radius:10px;font-weight:600;font-size:12px;background:#fff;color:var(--text);cursor:pointer}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:14px}
.pgrid-item{aspect-ratio:1;overflow:hidden;background:var(--cream2)}
.pgrid-item img{width:100%;height:100%;object-fit:cover}

/* ── EDIT PROFILE MODAL ── */
.ep-overlay{position:fixed;inset:0;background:rgba(26,18,9,0.7);z-index:600;display:none;align-items:flex-end;justify-content:center}
.ep-overlay.on{display:flex}
.ep-sheet{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;padding:20px 18px 36px;animation:slideUp 0.28s ease}
.ep-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark);margin-bottom:16px;text-align:center}
.ep-inp{width:100%;border:1px solid var(--cream3);border-radius:12px;padding:12px 14px;font-size:13px;outline:none;background:var(--cream);color:var(--text);margin-bottom:10px;transition:border-color 0.2s}
.ep-inp:focus{border-color:var(--gold)}
.ep-inp::placeholder{color:var(--text3);font-style:italic}
.ep-save{width:100%;background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:13px;letter-spacing:1px;cursor:pointer;margin-top:4px}
.ep-cancel{width:100%;background:none;border:none;color:var(--text3);font-size:12px;padding:10px;cursor:pointer;margin-top:4px}

/* ── UPLOAD MODAL ── */
.up-overlay{position:fixed;inset:0;background:rgba(26,18,9,0.7);z-index:600;display:none;align-items:flex-end;justify-content:center}
.up-overlay.on{display:flex}
.up-sheet{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp 0.3s ease}
.up-handle{display:flex;justify-content:center;padding:10px 0 4px}
.up-handle-bar{width:36px;height:3px;border-radius:2px;background:var(--cream3)}
.up-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 12px;border-bottom:1px solid var(--cream3)}
.up-head-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.up-close{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer}
.up-body{padding:16px}
.pick-area{border:1.5px dashed rgba(201,168,76,0.3);border-radius:16px;background:var(--cream);overflow:hidden;margin-bottom:14px;cursor:pointer;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative}
.pick-area img,.pick-area video{width:100%;max-height:300px;object-fit:cover;border-radius:16px}
.pick-icon{font-size:40px}
.pick-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text3)}
.pick-sub{font-size:11px;color:var(--cream3)}
.change-hint{position:absolute;bottom:8px;right:8px;background:rgba(26,18,9,0.65);border:1px solid rgba(201,168,76,0.4);color:var(--gold);font-size:10px;border-radius:10px;padding:3px 9px}
/* multi photo strip */
.multi-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding:2px}
.multi-thumb{position:relative;flex-shrink:0;width:78px;height:78px;border-radius:10px;overflow:hidden;background:var(--cream2)}
.multi-thumb img{width:100%;height:100%;object-fit:cover}
.multi-del{position:absolute;top:3px;right:3px;background:rgba(26,18,9,0.7);border:none;color:var(--gold);border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.multi-add{flex-shrink:0;width:78px;height:78px;border-radius:10px;border:1.5px dashed rgba(201,168,76,0.35);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--gold3);cursor:pointer}
.u-inp{width:100%;border:1px solid var(--cream3);border-radius:12px;padding:12px 14px;font-size:13px;outline:none;background:var(--cream);color:var(--text);margin-bottom:10px;resize:none;transition:border-color 0.2s}
.u-inp:focus{border-color:var(--gold)}
.u-inp::placeholder{color:var(--text3);font-style:italic}
.u-prog{height:3px;background:var(--cream3);border-radius:2px;overflow:hidden;display:none;margin-bottom:10px}
.u-prog-bar{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));width:0%;transition:width 0.3s}
.u-status{font-size:11px;color:var(--text3);text-align:center;font-style:italic;min-height:16px;margin-bottom:8px}
.u-submit{width:100%;background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:14px;letter-spacing:1px;cursor:pointer}
.u-submit:disabled{opacity:0.45}

/* ── ADMIN LOGIN ── */
.login-ov{position:fixed;inset:0;background:rgba(26,18,9,0.97);backdrop-filter:blur(20px);z-index:800;display:none;align-items:center;justify-content:center;padding:24px}
.login-ov.on{display:flex}
.login-box{width:100%;max-width:320px;text-align:center}
.login-star{font-size:28px;color:var(--gold);margin-bottom:18px;animation:pulse 2s infinite}
.login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:var(--gold);margin-bottom:4px}
.login-sub{font-size:9px;color:var(--gold3);letter-spacing:3px;text-transform:uppercase;margin-bottom:26px}

// ── Helpers ──
function es(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function couple(){return es(CFG.bride)+" &amp; "+es(CFG.groom);}

function timeAgo(ts){
  if(!ts)return"";
  var t=ts&&ts.seconds?ts.seconds*1000:(ts&&ts.toMillis?ts.toMillis():+ts);
  var s=Math.floor((Date.now()-t)/1000);
  if(s<60)return"just now";
  if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}
function tsMs(ts){
  if(!ts)return 0;
  if(ts.seconds)return ts.seconds*1000;
  if(ts.toMillis)return ts.toMillis();
  return +ts;
}

// ── Cloudinary upload ──
function uploadToCloudinary(file, onProgress){
  return new Promise(function(resolve, reject){
    var type = file.type&&file.type.startsWith("video") ? "video" : "image";
    var url = "https://api.cloudinary.com/v1_1/"+CLOUDINARY.cloud+"/"+type+"/upload";
    var fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", CLOUDINARY.preset);
    var xhr = new XMLHttpRequest();
    xhr.open("POST", url);
    xhr.upload.onprogress = function(e){
      if(e.lengthComputable && onProgress) onProgress(e.loaded/e.total*100);
    };
    xhr.onload = function(){
      try{
        var r = JSON.parse(xhr.responseText);
        if(r.secure_url) resolve(r.secure_url);
        else reject(new Error(r.error&&r.error.message||"Upload failed"));
      }catch(e){reject(new Error("Parse error"));}
    };
    xhr.onerror = function(){reject(new Error("Network error"));};
    xhr.send(fd);
  });
}

function renderStories(){
  var h="";

// ── Build a post card HTML ──
function buildCard(p, collection){
  var lk=LIKES[p.id]||0, liked=MY_LIKES[p.id], cm=CMTS[p.id]||[];
  var last=cm.length?cm[cm.length-1]:null;
  var t=timeAgo(p.time);
  // image section
  var imgs=p.images||[];
  var ci=SLIDE[p.id]||0;
  var imgH="";
  if(imgs.length){
    imgH='<div class="card-img" ondblclick="doDoubleTap(\''+p.id+'\',\''+collection+'\')">'
      +'<img src="'+es(imgs[ci])+'" loading="lazy" onerror="this.style.display=\'none\'"/>';
    if(imgs.length>1){
      imgH+='<div class="slide-count">'+(ci+1)+"/"+imgs.length+"</div>";
      imgH+='<div class="slide-dots">';
      for(var i=0;i<imgs.length;i++) imgH+='<div class="dot '+(i===ci?"on":"off")+'"></div>';
      imgH+='</div>';
      if(ci>0) imgH+='<button class="slide-prev" onclick="slideImg(\''+p.id+'\',\''+collection+'\',-1)">‹</button>';
      if(ci<imgs.length-1) imgH+='<button class="slide-next" onclick="slideImg(\''+p.id+'\',\''+collection+'\',1)">›</button>';
    }
    imgH+='<span id="hrt-'+p.id+'"></span></div>';
  }
  // avatar
  var avH = CFG.avatarUrl
    ? '<img src="'+es(CFG.avatarUrl)+'" onerror="this.remove()"/>'
    : inits();
  // wall guest name
  var displayName = (collection==="guestWall") ? (p.guestName||"Guest") : couple();
  var isWall = collection==="guestWall";

  return '<div class="card" id="card-'+p.id+'">'
    +'<div class="card-head">'
    +'<div class="card-av">'+avH+'</div>'
    +'<div style="flex:1">'
    +'<div class="card-name">'+es(isWall?p.guestName||"Guest":CFG.bride+" & "+CFG.groom)+'</div>'
    +'<div class="card-time">'+t+'</div>'
    +'</div>'
    +(IS_ADMIN?'<button class="card-del" onclick="deletePost(\''+p.id+'\',\''+collection+'\')" style="display:block">🗑</button>':"")
    +'</div>'
    +imgH
    +(p.msg&&isWall?'<div style="padding:8px 14px 0;font-size:13px;color:var(--text2);font-style:italic">'+es(p.msg)+'</div>':"")
    +'<div class="card-actions">'
    +'<div class="action-row">'
    +'<button class="act" onclick="toggleLike(\''+p.id+'\',\''+collection+'\')">'+(liked?"❤️":"🤍")+'</button>'
    +'<button class="act" style="font-size:22px" onclick="openCmt(\''+p.id+'\',\''+collection+'\')">💬</button>'
    +'<button class="act" style="font-size:20px" onclick="shareAlbum()">📤</button>'
    +'</div>'
    +(lk?'<div class="like-count">'+lk.toLocaleString()+' like'+(lk!==1?'s':'')+'</div>':"")
    +(p.caption&&!isWall?'<div class="caption"><strong>'+couple()+'</strong> '+es(p.caption)+'</div>':"")
    +(cm.length?'<button class="view-cmts" onclick="openCmt(\''+p.id+'\',\''+collection+'\')">View all '+cm.length+' comment'+(cm.length!==1?'s':'')+'</button>':"")
    +(last?'<div class="last-cmt"><strong>'+es(last.name)+'</strong> '+es(last.text)+'</div>':"")
    +'<div class="card-time-small">'+t+'</div>'
    +'</div></div>';
}

function slideImg(id, coll, dir){
  var p = (coll==="posts"?POSTS:WALL).find(function(x){return x.id===id;});
  if(!p)return;
  var imgs=p.images||[];
  SLIDE[id]=Math.max(0,Math.min((SLIDE[id]||0)+dir,imgs.length-1));
  var el=document.getElementById("card-"+id);
  if(el)el.outerHTML=buildCard(p,coll);
}

function doDoubleTap(id,coll){

// ── Likes ──
function toggleLike(id, coll){
  if(!db) return;
  var was=MY_LIKES[id];
  LIKES[id]=Math.max(0,(LIKES[id]||0)+(was?-1:1));
  MY_LIKES[id]=!was;
  // re-render card
  var p=(coll==="reels"?REELS:coll==="guestWall"?WALL:POSTS).find(function(x){return x.id===id;});
  if(p){
    if(coll==="reels"){renderReels();}
    else{
      var el=document.getElementById("card-"+id);
      if(el)el.outerHTML=buildCard(p,coll);
    }
  }
  // save to firebase
  db.collection("likes").doc(id).set({count:firebase.firestore.FieldValue.increment(was?-1:1)},{merge:true});
  db.collection("userLikes_"+_uid).doc(id).set({liked:!was});
}

function loadLikes(){
  if(!db)return Promise.resolve();
  return db.collection("likes").get().then(function(s){
    s.forEach(function(d){LIKES[d.id]=d.data().count||0;});
    return db.collection("userLikes_"+_uid).get();
  }).then(function(s){
    s.forEach(function(d){if(d.data().liked===true)MY_LIKES[d.id]=true;});
  }).catch(function(e){console.warn("loadLikes:",e);});
}

// ── Comments ──
function openCmt(id, coll){
  _activeCmtId=id; _activeCmtColl=coll;
  document.getElementById("cmt-ov").classList.add("on");
  document.getElementById("cmt-name").value="";
  document.getElementById("cmt-text").value="";
  renderCmtList(id);
  // real-time listener
  if(_unsubCmt)_unsubCmt();
  if(db){
    _unsubCmt=db.collection(coll).doc(id).collection("comments")
      .onSnapshot(function(snap){
        var arr=[];
        snap.forEach(function(d){var dat=d.data();arr.push({name:dat.name||"Guest",text:dat.text,time:tsMs(dat.time)});});
        arr.sort(function(a,b){return a.time-b.time;});
        CMTS[id]=arr;
        renderCmtList(id);
        // update comment count on card
        var card=document.getElementById("card-"+id);
        if(card){
          var p=(coll==="reels"?REELS:coll==="guestWall"?WALL:POSTS).find(function(x){return x.id===id;});
          if(p){if(coll==="reels"){renderReels();}else{card.outerHTML=buildCard(p,coll);}}
        }
      },function(e){console.warn("cmt listener:",e);});
  }
}
function closeCmt(){
  document.getElementById("cmt-ov").classList.remove("on");
  if(_unsubCmt){_unsubCmt();_unsubCmt=null;}
  _activeCmtId=null;_activeCmtColl=null;
}
function closeCmtBg(e){if(e.target.id==="cmt-ov")closeCmt();}
function renderCmtList(id){
  var cm=CMTS[id]||[];
  var el=document.getElementById("cmt-list");if(!el)return;
  if(!cm.length){el.innerHTML='<div class="cmt-empty">Be the first to comment ✦</div>';return;}
  el.innerHTML=cm.map(function(c){
    return'<div class="cmt-item"><div class="cmt-av">'+es((c.name||"G")[0].toUpperCase())+'</div>'
      +'<div><div class="cmt-body"><strong>'+es(c.name)+'</strong> '+es(c.text)+'</div>'
      +'<div class="cmt-time">'+timeAgo(c.time)+'</div></div></div>';
  }).join("");
  el.scrollTop=el.scrollHeight;
}
function sendCmt(){
  if(!_activeCmtId||!db)return;
  var name=(document.getElementById("cmt-name").value||"").trim()||"Guest";
  var text=(document.getElementById("cmt-text").value||"").trim();
  if(!text)return;
  document.getElementById("cmt-text").value="";
  db.collection(_activeCmtColl).doc(_activeCmtId).set({_exists:true},{merge:true});
  db.collection(_activeCmtColl).doc(_activeCmtId).collection("comments").add({
    name:name, text:text, time:firebase.firestore.FieldValue.serverTimestamp()
  });
}

function buildUploadBody(){
  document.getElementById("up-title").textContent=_upMode==="reel"?"Add Reel":"Add Post";
  var h="";
  if(_upMode==="post"){
    h+='<div class="multi-strip" id="multi-strip">'+buildStrip()+'</div>';

    h+='<textarea class="u-inp" id="up-cap" rows="3" placeholder="Write a caption..."></textarea>';
  } else {
    h+='<div class="pick-area" id="pick-area" onclick="document.getElementById(\'up-file\').click()">'
      +'<div class="pick-icon">🎬</div>'
      +'<div class="pick-title">Tap to choose video</div>'
      +'<div class="pick-sub">MP4, MOV from your phone</div>'
      +'</div>';
    h+='<input type="file" id="up-file" accept="video/*" style="display:none" onchange="onReelFile(event)"/>';
    h+='<textarea class="u-inp" id="up-cap" rows="2" placeholder="Caption..."></textarea>';
    h+='<input class="u-inp" id="up-song" placeholder="🎵 Song name (optional)"/>';
  }
  h+='<div class="u-prog" id="u-prog"><div class="u-prog-bar" id="u-prog-bar"></div></div>';
  h+='<div class="u-status" id="u-status"></div>';
  h+='<button class="u-submit" id="u-submit" onclick="doUpload()">Upload ✦</button>';
  document.getElementById("up-body").innerHTML=h;
}
function buildStrip(){
  var h="";
  _uploadFiles.forEach(function(f,i){
    h+='<div class="multi-thumb"><img src="'+URL.createObjectURL(f)+'"/>'
      +'<button class="multi-del" onclick="removeFile('+i+')">✕</button></div>';
  });
  h+='<div class="multi-add" onclick="document.getElementById(\'up-file\').click()">'+(_uploadFiles.length?'+':"📷")+'</div>';
  return h;
}
function removeFile(i){_uploadFiles.splice(i,1);document.getElementById("multi-strip").innerHTML=buildStrip();}
function onPostFiles(e){
  Array.from(e.target.files).forEach(function(f){_uploadFiles.push(f);});
  document.getElementById("multi-strip").innerHTML=buildStrip();
  e.target.value="";
}
function onReelFile(e){
  var f=e.target.files[0];if(!f)return;
  _uploadFiles=[f];
  var url=URL.createObjectURL(f);
  document.getElementById("pick-area").innerHTML=
    '<video src="'+url+'" style="width:100%;max-height:260px;border-radius:16px" muted></video>'
    +'<div class="change-hint">change</div>';
}

function setStatus(s){var el=document.getElementById("u-status");if(el)el.textContent=s;}
function setProgress(p){var el=document.getElementById("u-prog-bar");if(el)el.style.width=p+"%";}

async function doUpload(){
  if(!db)return;
  var btn=document.getElementById("u-submit");
  var cap=(document.getElementById("up-cap")||{}).value||"";
  btn.disabled=true;
  document.getElementById("u-prog").style.display="block";

  try{
    if(_upMode==="post"){
      if(!_uploadFiles.length){alert("Choose at least one photo.");btn.disabled=false;return;}
      var urls=[];
      for(var i=0;i<_uploadFiles.length;i++){
        setStatus("Uploading photo "+(i+1)+" of "+_uploadFiles.length+"...");
        setProgress(0);
        var url=await uploadToCloudinary(_uploadFiles[i],function(p){setProgress(p);});
        urls.push(url);
      }
      setStatus("Saving...");
      await db.collection("posts").add({
        type:"post", images:urls, caption:cap.trim(),
        time:firebase.firestore.FieldValue.serverTimestamp()
      });
      setStatus("Posted! ✦");
    } else {
      if(!_uploadFiles.length){alert("Choose a video.");btn.disabled=false;return;}
      var song=(document.getElementById("up-song")||{}).value||"";
      setStatus("Uploading video...");setProgress(0);
      var vidUrl=await uploadToCloudinary(_uploadFiles[0],function(p){setProgress(p);});
      // thumbnail
      var thumbUrl="";
      var thumb=await getThumb(_uploadFiles[0]);
      if(thumb){setStatus("Uploading thumbnail...");thumbUrl=await uploadToCloudinary(thumb,null);}
      setStatus("Saving...");
      await db.collection("reels").add({
        type:"reel", videoUrl:vidUrl, thumbUrl:thumbUrl,
        caption:cap.trim(), song:song.trim(),
        time:firebase.firestore.FieldValue.serverTimestamp()
      });
      setStatus("Reel posted! ✦");
    }
    setTimeout(closeUpload,900);
  }catch(e){
    console.error(e);setStatus("Error: "+e.message);btn.disabled=false;
  }
}

function getThumb(file){
  return new Promise(function(resolve){
    try{
      var v=document.createElement("video");v.muted=true;v.preload="metadata";
      var url=URL.createObjectURL(file);v.src=url;v.currentTime=1;
      v.addEventListener("seeked",function(){
        var c=document.createElement("canvas");c.width=v.videoWidth||640;c.height=v.videoHeight||360;
        c.getContext("2d").drawImage(v,0,0);
        c.toBlob(function(b){URL.revokeObjectURL(url);resolve(b);},"image/jpeg",0.8);
      });
      v.addEventListener("error",function(){URL.revokeObjectURL(url);resolve(null);});
    }catch(e){resolve(null);}
  });
}

  document.getElementById("ep-groom").value=CFG.groom||"";
  document.getElementById("ep-date").value=CFG.date||"";
  document.getElementById("ep-location").value=CFG.location||"";
  document.getElementById("ep-photographer").value=CFG.photographer||"";
  document.getElementById("ep-bio").value=CFG.bio||"";
  document.getElementById("ep-ov").classList.add("on");
}
function closeEditProfile(){document.getElementById("ep-ov").classList.remove("on");}
async function saveProfile(){
  CFG.bride=document.getElementById("ep-bride").value.trim()||CFG.bride;
  CFG.groom=document.getElementById("ep-groom").value.trim()||CFG.groom;
  CFG.date=document.getElementById("ep-date").value.trim();
  CFG.location=document.getElementById("ep-location").value.trim();
  CFG.photographer=document.getElementById("ep-photographer").value.trim();
  CFG.bio=document.getElementById("ep-bio").value.trim();
  if(db){
    await db.collection("config").doc("profile").set({
      bride:CFG.bride,groom:CFG.groom,date:CFG.date,
      location:CFG.location,photographer:CFG.photographer,bio:CFG.bio
    },{merge:true});
  }
  closeEditProfile();
  updateTB();renderHome();renderReels();renderProfile();
}

// ── Avatar upload ──
function openAvatarUpload(){if(IS_ADMIN)document.getElementById("av-file").click();}
async function uploadAvatar(e){
  var f=e.target.files[0];if(!f)return;
  try{
    var url=await uploadToCloudinary(f,null);
    CFG.avatarUrl=url;
    if(db) await db.collection("config").doc("profile").set({avatarUrl:url},{merge:true});
    updateTB();renderProfile();
  }catch(e){console.error(e);alert("Avatar upload failed.");}
  document.getElementById("av-file").value="";
}

// ── Share ──
function shareAlbum(){
  var title=(CFG.bride||"")+" & "+(CFG.groom||"")+" Wedding Album";
  if(navigator.share){navigator.share({url:window.location.href,title:title});}
  else{try{navigator.clipboard.writeText(window.location.href);}catch(e){}alert("Link copied! Share on WhatsApp 💝");}
}

// ── Firebase listeners ──
function startListening(){
  if(!db)return;

  // Posts (photos only)
  if(_unsubPosts)_unsubPosts();
  _unsubPosts=db.collection("posts").onSnapshot(function(snap){
    POSTS=[];
    snap.forEach(function(d){POSTS.push(Object.assign({id:d.id},d.data()));});
    POSTS.sort(function(a,b){return tsMs(b.time)-tsMs(a.time);});
    renderHome();renderProfile();
  },function(e){console.error("posts:",e);});

  // Reels (videos only)
  if(_unsubReels)_unsubReels();
  _unsubReels=db.collection("reels").onSnapshot(function(snap){
    REELS=[];
    snap.forEach(function(d){REELS.push(Object.assign({id:d.id},d.data()));});
    REELS.sort(function(a,b){return tsMs(b.time)-tsMs(a.time);});
    renderReels();
  },function(e){console.error("reels:",e);});

  // Stories
  if(_unsubStories)_unsubStories();
  _unsubStories=db.collection("stories").onSnapshot(function(snap){
    STORIES=[];
    snap.forEach(function(d){STORIES.push(Object.assign({id:d.id},d.data()));});
    STORIES.sort(function(a,b){return tsMs(a.time)-tsMs(b.time);});
    renderStories();
  },function(e){console.error("stories:",e);});
}

function listenWall(){
  if(!db)return;
  if(_unsubWall)_unsubWall();
  _unsubWall=db.collection("guestWall").onSnapshot(function(snap){
    WALL=[];
    snap.forEach(function(d){WALL.push(Object.assign({id:d.id},d.data()));});
    WALL.sort(function(a,b){return tsMs(b.time)-tsMs(a.time);});
    renderWallFeed();
  },function(e){console.error("wall:",e);});
}

// Load config (profile, avatar) from Firestore
function loadConfig(){
  if(!db)return;
  db.collection("config").doc("profile").get().then(function(doc){
    if(doc.exists){
      var d=doc.data();
      if(d.bride)CFG.bride=d.bride;
      if(d.groom)CFG.groom=d.groom;
      if(d.date)CFG.date=d.date;
      if(d.location)CFG.location=d.location;
      if(d.photographer)CFG.photographer=d.photographer;
      if(d.bio)CFG.bio=d.bio;
      if(d.avatarUrl)CFG.avatarUrl=d.avatarUrl;
      updateTB();renderProfile();
    }
  }).catch(function(e){console.warn("loadConfig:",e);});
}

// ── BOOT ──
function boot(){
  document.getElementById("ls").style.display="none";
  document.getElementById("app").style.display="block";
  applyAdmin();
  updateTB();
  loadLikes().then(function(){
    startListening();
  });
  loadConfig();
}

setTimeout(boot, 500);
</script>
