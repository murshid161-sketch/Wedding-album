<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Shibila & Murshid</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#C9A84C;--gold2:#E8C97A;--gold3:#8B6914;--cream:#FAF7F2;--cream2:#F2EDE4;--cream3:#E0D5C5;--dark:#1A1209;--dark2:#2D200A;--dark3:#4A3520;--text:#2A1F10;--text2:#6B5230;--text3:#9B7D52;--red:#c0392b;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--cream);overflow-x:hidden;color:var(--text)}
::-webkit-scrollbar{display:none}
button,input,textarea{font-family:'Montserrat',sans-serif}
img{display:block}
#ls{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.ls-star{font-size:32px;color:var(--gold);margin-bottom:20px;animation:pulse 2s infinite}
.ls-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--gold);margin-bottom:4px;text-align:center}
.ls-bar{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto;animation:barPulse 2s infinite}
.ls-txt{font-size:9px;color:var(--gold3);letter-spacing:4px;text-transform:uppercase}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(26,18,9,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,0.2);display:flex;z-index:200}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 16px;opacity:0.3;transition:opacity 0.2s;cursor:pointer}
.nb.on{opacity:1}
.nb-i{font-size:20px;line-height:1}
.nb-l{font-size:8px;font-weight:600;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.pg{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:var(--cream);padding-bottom:80px}
.pg.on{display:block}
.tb{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.12);display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.tb-right{display:flex;align-items:center;gap:8px}
.admin-tag{font-size:8px;background:var(--gold);color:var(--dark);border-radius:8px;padding:2px 7px;font-weight:700;letter-spacing:1px;display:none}
.av-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--gold);background:var(--dark2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);font-style:italic;overflow:hidden;cursor:pointer;flex-shrink:0}
.av-btn img{width:100%;height:100%;object-fit:cover}
#fab{position:fixed;bottom:88px;right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold3),var(--gold));border:none;color:var(--dark);font-size:26px;display:none;align-items:center;justify-content:center;z-index:150;box-shadow:0 4px 20px rgba(201,168,76,0.5);cursor:pointer}
#fab.on{display:flex}
.stories{background:#fff;border-bottom:1px solid var(--cream3);padding:12px 0}
.stories-scroll{display:flex;gap:12px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
.s-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.s-ring{width:60px;height:60px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2))}
.s-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2.5px solid #fff}
.s-ring-e{width:100%;height:100%;border-radius:50%;border:2.5px solid #fff;background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-size:18px}
.s-lbl{font-size:9px;color:var(--text2);max-width:60px;text-align:center;line-height:1.3;font-weight:500}
.card{background:#fff;border-bottom:6px solid var(--cream);animation:fadeUp 0.3s ease}
.card-head{display:flex;align-items:center;gap:10px;padding:12px 14px}
.card-av{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);font-style:italic}
.card-av img{width:100%;height:100%;object-fit:cover}
.card-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--dark);font-weight:600}
.card-time{font-size:10px;color:var(--text3)}
.card-del{background:none;border:none;color:var(--red);font-size:16px;opacity:0.6;padding:4px;margin-left:auto;cursor:pointer}
.card-img{position:relative;user-select:none;-webkit-user-select:none}
.card-img img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.sl-p,.sl-n{position:absolute;top:50%;transform:translateY(-50%);background:rgba(26,18,9,0.5);border:1px solid rgba(201,168,76,0.4);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;z-index:2;color:var(--gold);cursor:pointer;font-size:16px}
.sl-p{left:10px}.sl-n{right:10px}
.sl-cnt{position:absolute;top:10px;right:10px;background:rgba(26,18,9,0.6);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:3px 9px;font-size:10px;color:var(--gold);font-weight:600}
.sl-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.dot{height:4px;border-radius:2px;transition:all 0.25s}
.dot.on{width:18px;background:var(--gold)}.dot.off{width:4px;background:rgba(201,168,76,0.4)}
.hpop{position:absolute;top:50%;left:50%;font-size:80px;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop 0.9s ease forwards}
.card-acts{padding:10px 14px 12px}
.act-row{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.act{background:none;border:none;font-size:24px;line-height:1;transition:transform 0.15s;padding:2px;cursor:pointer}
.act:active{transform:scale(0.82)}
.lk-cnt{font-weight:600;font-size:12px;color:var(--dark);margin-bottom:4px}
.caption{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:3px}
.caption strong{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--dark)}
.vcmts{background:none;border:none;padding:0;font-size:11px;color:var(--text3);display:block;margin-top:2px;cursor:pointer}
.lcmt{font-size:12px;color:var(--text2);margin-top:4px}
.lcmt strong{font-family:'Cormorant Garamond',serif;font-style:italic}
.ct-sm{font-size:9px;color:var(--cream3);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
#pg-reels{background:var(--dark)}
.r-tb{position:sticky;top:0;z-index:100;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,18,9,0.85);backdrop-filter:blur(12px)}
.r-tb span{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:22px;font-style:italic}
.rcard{position:relative;height:88vh;background:#0d0a06;margin-bottom:3px;overflow:hidden}
.rcard img,.rcard video{width:100%;height:100%;object-fit:cover;opacity:0.88}
.r-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.r-play{width:62px;height:62px;border-radius:50%;background:rgba(201,168,76,0.15);backdrop-filter:blur(8px);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:22px;padding-left:4px}
.r-side{position:absolute;right:12px;bottom:140px;display:flex;flex-direction:column;gap:22px;align-items:center}
.r-act{display:flex;flex-direction:column;align-items:center;gap:4px}
.r-act button{background:none;border:none;font-size:28px;cursor:pointer;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7))}
.r-act span{color:var(--gold);font-size:11px;font-weight:600}
.r-del{position:absolute;top:14px;right:14px;background:rgba(26,18,9,0.6);border:1px solid rgba(201,168,76,0.3);color:var(--gold);border-radius:50%;width:32px;height:32px;font-size:14px;display:none;align-items:center;justify-content:center;cursor:pointer}
.r-info{position:absolute;bottom:0;left:0;right:68px;padding:60px 14px 22px;background:linear-gradient(to top,rgba(26,18,9,0.85),transparent);pointer-events:none}
.r-uname{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);font-style:italic;margin-bottom:4px}
.r-cap{font-size:12px;color:rgba(255,255,255,0.85);line-height:1.5;margin-bottom:5px}
.r-song{font-size:10px;color:rgba(201,168,76,0.7);display:flex;align-items:center;gap:5px}
.spin{animation:spin 4s linear infinite;display:inline-block}
.wall-tb{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.12);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.wall-tb-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--dark)}
.wall-add-btn{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:20px;color:var(--gold);font-weight:600;font-size:11px;padding:7px 15px;cursor:pointer}
.wall-box{margin:14px;border:1.5px dashed rgba(201,168,76,0.3);border-radius:18px;background:#fff;overflow:hidden;display:none}
.wall-box.on{display:block}
.wall-ph{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;background:linear-gradient(135deg,var(--cream),var(--cream2))}
.wall-ph .icon{font-size:44px}
.wall-ph span{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text3)}
.wall-pi{position:relative;width:100%;aspect-ratio:1;overflow:hidden}
.wall-pi img{width:100%;height:100%;object-fit:cover}
.wall-form{padding:14px 16px 18px;display:flex;flex-direction:column;gap:10px}
.w-inp{border:1px solid var(--cream3);border-radius:12px;padding:12px 14px;font-size:13px;outline:none;width:100%;background:var(--cream);color:var(--text);transition:border-color 0.2s}
.w-inp:focus{border-color:var(--gold)}
.w-inp::placeholder{color:var(--text3);font-style:italic}
.w-prog{height:3px;background:var(--cream3);border-radius:2px;overflow:hidden;display:none}
.w-pb{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));width:0%;transition:width 0.3s}
.w-sub{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:13px;width:100%;letter-spacing:1px;cursor:pointer}
.w-sub:disabled{opacity:0.45}
.wall-sec{padding:18px 16px 10px;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--dark2);display:flex;align-items:center;gap:10px}
.wall-sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.3),transparent)}
.prof-tb{padding:14px 16px;border-bottom:1px solid var(--cream3);display:flex;align-items:center;justify-content:space-between;background:#fff}
.prof-tb-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.prof-tb button{background:none;border:1px solid var(--cream3);border-radius:20px;font-size:11px;color:var(--text3);padding:5px 12px;cursor:pointer}
.prof-hero{background:linear-gradient(160deg,var(--dark),var(--dark2));padding:28px 16px 24px;text-align:center;position:relative;overflow:hidden}
.prof-hero::before{content:'✦';position:absolute;top:12px;left:18px;color:rgba(201,168,76,0.15);font-size:40px}
.prof-hero::after{content:'✦';position:absolute;bottom:12px;right:18px;color:rgba(201,168,76,0.10);font-size:28px}
.p-ring{width:88px;height:88px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));margin:0 auto 14px;cursor:pointer;position:relative}
.p-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--dark)}
.p-ring-e{width:100%;height:100%;border-radius:50%;border:3px solid var(--dark);background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);font-style:italic}
.p-edit-badge{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px}
.p-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--gold);margin-bottom:5px}
.p-bio{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.7;max-width:280px;margin:0 auto 12px}
.p-meta{font-size:11px;color:rgba(201,168,76,0.6);margin:2px 0}
.prof-stats{display:flex;border-top:1px solid var(--cream3);background:#fff}
.stat{flex:1;text-align:center;padding:15px 0;border-right:1px solid var(--cream3)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--dark)}
.stat-l{font-size:8px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.p-btns{display:flex;gap:10px;margin:14px 14px 0}
.p-btns button{flex:1;padding:10px;border:1px solid var(--cream3);border-radius:10px;font-weight:600;font-size:12px;background:#fff;color:var(--text);cursor:pointer}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:14px}
.pgrid-item{aspect-ratio:1;overflow:hidden;background:var(--cream2)}
.pgrid-item img{width:100%;height:100%;object-fit:cover}
/* Login */
.lo{position:fixed;inset:0;background:rgba(26,18,9,0.97);backdrop-filter:blur(20px);z-index:800;display:none;align-items:center;justify-content:center;padding:24px}
.lo.on{display:flex}
.lo-box{width:100%;max-width:320px;text-align:center}
.lo-star{font-size:28px;color:var(--gold);margin-bottom:18px;animation:pulse 2s infinite}
.lo-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:var(--gold);margin-bottom:4px}
.lo-sub{font-size:9px;color:var(--gold3);letter-spacing:3px;text-transform:uppercase;margin-bottom:26px}
.lo-inp{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:14px 18px;font-size:14px;color:#fff;outline:none;margin-bottom:12px;letter-spacing:1px;text-align:center}
.lo-inp::placeholder{color:rgba(201,168,76,0.3);letter-spacing:2px}
.lo-btn{width:100%;background:linear-gradient(135deg,var(--gold3),var(--gold));border:none;border-radius:12px;color:var(--dark);font-weight:700;font-size:13px;padding:14px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:10px}
.lo-err{font-size:12px;color:var(--red);height:16px;margin-bottom:6px}
.lo-cancel{background:none;border:none;color:rgba(201,168,76,0.35);font-size:12px;cursor:pointer}
/* Upload */
.up-ov{position:fixed;inset:0;background:rgba(26,18,9,0.7);z-index:600;display:none;align-items:flex-end;justify-content:center}
.up-ov.on{display:flex}
.up-sheet{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp 0.3s ease}
.up-handle{display:flex;justify-content:center;padding:10px 0 4px}
.up-hbar{width:36px;height:3px;border-radius:2px;background:var(--cream3)}
.up-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 12px;border-bottom:1px solid var(--cream3)}
.up-head-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.up-close{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer}
.up-body{padding:16px}
.pick{border:1.5px dashed rgba(201,168,76,0.3);border-radius:16px;background:var(--cream);overflow:hidden;margin-bottom:14px;cursor:pointer;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative}
.pick img,.pick video{width:100%;max-height:300px;object-fit:cover;border-radius:16px}
.p-icon{font-size:40px}
.p-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text3)}
.p-sub{font-size:11px;color:var(--cream3)}
.chint{position:absolute;bottom:8px;right:8px;background:rgba(26,18,9,0.65);border:1px solid rgba(201,168,76,0.4);color:var(--gold);font-size:10px;border-radius:10px;padding:3px 9px}
.mstrip{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding:2px}
.mthumb{position:relative;flex-shrink:0;width:78px;height:78px;border-radius:10px;overflow:hidden;background:var(--cream2)}
.mthumb img{width:100%;height:100%;object-fit:cover}
.mdel{position:absolute;top:3px;right:3px;background:rgba(26,18,9,0.7);border:none;color:var(--gold);border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.madd{flex-shrink:0;width:78px;height:78px;border-radius:10px;border:1.5px dashed rgba(201,168,76,0.35);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--gold3);cursor:pointer}
.u-inp{width:100%;border:1px solid var(--cream3);border-radius:12px;padding:12px 14px;font-size:13px;outline:none;background:var(--cream);color:var(--text);margin-bottom:10px;resize:none;transition:border-color 0.2s}
.u-inp:focus{border-color:var(--gold)}
.u-inp::placeholder{color:var(--text3);font-style:italic}
.u-prog{height:3px;background:var(--cream3);border-radius:2px;overflow:hidden;display:none;margin-bottom:10px}
.u-pb{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));width:0%;transition:width 0.3s}
.u-stat{font-size:11px;color:var(--text3);text-align:center;font-style:italic;min-height:16px;margin-bottom:8px}
.u-sub{width:100%;background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:14px;letter-spacing:1px;cursor:pointer}
.u-sub:disabled{opacity:0.45}
/* Edit Profile */
.ep-ov{position:fixed;inset:0;background:rgba(26,18,9,0.7);z-index:600;display:none;align-items:flex-end;justify-content:center}
.ep-ov.on{display:flex}
.ep-sheet{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;padding:20px 18px 36px;animation:slideUp 0.28s ease}
.ep-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark);margin-bottom:16px;text-align:center}
.ep-inp{width:100%;border:1px solid var(--cream3);border-radius:12px;padding:12px 14px;font-size:13px;outline:none;background:var(--cream);color:var(--text);margin-bottom:10px;transition:border-color 0.2s}
.ep-inp:focus{border-color:var(--gold)}
.ep-inp::placeholder{color:var(--text3);font-style:italic}
.ep-save{width:100%;background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:13px;letter-spacing:1px;cursor:pointer;margin-top:4px}
.ep-cancel{width:100%;background:none;border:none;color:var(--text3);font-size:12px;padding:10px;cursor:pointer}
/* Comments */
.cm-ov{position:fixed;inset:0;background:rgba(26,18,9,0.6);z-index:500;display:none;align-items:flex-end;justify-content:center}
.cm-ov.on{display:flex}
.cm-sheet{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;max-height:82vh;display:flex;flex-direction:column;animation:slideUp 0.28s ease}
.cm-handle{display:flex;justify-content:center;padding:10px 0 4px;flex-shrink:0}
.cm-hbar{width:36px;height:3px;border-radius:2px;background:var(--cream3)}
.cm-head{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;border-bottom:1px solid var(--cream3);flex-shrink:0}
.cm-head-t{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--dark)}
.cm-head button{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer}
.cm-list{flex:1;overflow-y:auto;padding:12px 16px}

#vp{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:450;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#vp video{width:100%;max-width:480px;max-height:75vh;border-radius:12px;outline:none}
#vp-close{position:absolute;top:14px;right:14px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-size:20px;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--text3);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--cream3)}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes barPulse{0%,100%{opacity:0.3;width:40px}50%{opacity:1;width:80px}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes heartPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}15%{transform:translate(-50%,-50%) scale(1.4)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0}}
</style>

<body>
<div id="ls"><div class="ls-star">✦</div><div class="ls-name" id="ls-name">Wedding Album</div><div class="ls-bar"></div><div class="ls-txt">Loading memories...</div></div>
<div class="lo" id="lo"><div class="lo-box"><div class="lo-star">✦</div><div class="lo-title">Admin Access</div><div class="lo-sub">Couple's Portal</div><input class="lo-inp" type="password" id="lo-pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/><div class="lo-err" id="lo-err"></div><button class="lo-btn" onclick="doLogin()">Enter</button><button class="lo-cancel" onclick="closeLogin()">Cancel</button></div></div>

<div class="cm-ov" id="cm-ov" onclick="if(event.target.id==='cm-ov')closeCmt()"><div class="cm-sheet"><div class="cm-handle"><div class="cm-hbar"></div></div><div class="cm-head"><span class="cm-head-t">Comments</span><button onclick="closeCmt()">✕</button></div><div class="cm-list" id="cm-list"></div><div class="cm-ia"><input class="cm-ni" id="cm-name" placeholder="Your name..."/><div class="cm-row"><input id="cm-txt" placeholder="Write a comment..." onkeydown="if(event.key==='Enter')sendCmt()"/><button class="cm-send" onclick="sendCmt()">Post</button></div></div></div></div>
<div id="sv"><img id="sv-img" src="" alt=""/><div id="sv-prog"></div><div id="sv-info"><img id="sv-av" src="" alt="" onerror="this.style.display='none'"/><div><div class="sv-name" id="sv-nm"></div><div class="sv-sub" id="sv-sb"></div></div></div><button id="sv-close" onclick="document.getElementById('sv').style.display='none'">✕</button><div id="sv-bot"><div class="sv-lbl" id="sv-lb"></div><div class="sv-dt" id="sv-dt"></div></div></div>
<div id="vp"><button id="vp-close" onclick="closeVP()">✕</button><video id="vp-v" controls playsinline></video></div>

<div id="app" style="display:none">
  <div class="pg on" id="pg-home">
    <div class="tb"><div style="width:32px"></div><span class="tb-title" id="ht">Wedding Album</span><div class="tb-right"><span class="admin-tag" id="atag">ADMIN</span><div class="av-btn" id="topav" onclick="handleAvTap()"><span id="topinits">✦</span></div></div></div>
    <div class="stories" id="sr"><div class="stories-scroll" id="ss"></div></div>
    <div id="hfeed"></div>
  </div>
  <div class="pg" id="pg-reels">
    <div class="r-tb"><span>Reels</span><span style="font-size:10px;color:var(--gold3);letter-spacing:2px">✦ MOMENTS</span></div>
    <div id="rfeed"></div>
  </div>
  <div class="pg" id="pg-wall">
    <div class="wall-tb"><span class="wall-tb-title">Guest Wall</span><button class="wall-add-btn" onclick="toggleWallBox()">+ Share</button></div>
    <div class="wall-box" id="wall-box">
      <div id="wall-prev" class="wall-ph" onclick="document.getElementById('wf').click()"><div class="icon">📷</div><span>Tap to choose a photo</span></div>
      <input type="file" id="wf" accept="image/*" style="display:none" onchange="onWallFile(event)"/>
      <div class="wall-form"><input class="w-inp" id="wname" placeholder="Your name *" maxlength="40"/><input class="w-inp" id="wmsg" placeholder="A message for the couple... (optional)" maxlength="150"/><div class="w-prog" id="wprog"><div class="w-pb" id="wpb"></div></div><button class="w-sub" id="wsub" onclick="submitWall()">Share Your Memory 💝</button></div>
    </div>

    <div id="wfeed"></div>
  </div>
  <div class="pg" id="pg-profile">
    <div class="prof-tb"><span class="prof-tb-title" id="ptitle">The Album</span><button onclick="shareAlbum()">📤 Share</button></div>
    <div class="prof-hero">
      <div class="p-ring" id="pring" onclick="IS_ADMIN&&openAv()"><div class="p-ring-e" id="pring-e">✦</div><div class="p-edit-badge" id="pedit">✏️</div></div>
      <input type="file" id="avf" accept="image/*" style="display:none" onchange="uploadAv(event)"/>

      <div class="stat"><div class="stat-n" id="st-l">0</div><div class="stat-l">Likes</div></div>
      <div class="stat"><div class="stat-n" id="st-c">0</div><div class="stat-l">Comments</div></div>
      <div class="stat"><div class="stat-n" id="st-w">0</div><div class="stat-l">Wall</div></div>
    </div>
    <div class="p-btns"><button id="abtn" onclick="IS_ADMIN?logoutAdmin():openLogin()">🔐 Admin Login</button><button id="ebtn" style="display:none" onclick="openEP()">✏️ Edit Profile</button></div>
    <div class="pgrid" id="pgrid"></div>
  </div>
  <nav id="nav">
    <button class="nb on" id="nb-home" onclick="goTo('home')"><span class="nb-i">🏠</span><span class="nb-l">Home</span></button>
    <button class="nb" id="nb-reels" onclick="goTo('reels')"><span class="nb-i">🎬</span><span class="nb-l">Reels</span></button>
    <button class="nb" id="nb-wall" onclick="goTo('wall')"><span class="nb-i">📸</span><span class="nb-l">Wall</span></button>
    <button class="nb" id="nb-profile" onclick="goTo('profile')"><span class="nb-i">💑</span><span class="nb-l">Profile</span></button>
  </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ══ CONFIG ══
var CFG={password:"@Qwe456uio",bride:"Shibila",groom:"Murshid",date:"November 12",location:"Shriyas Palace, Aloor",photographer:"White Mirror Wedding",bio:"Two hearts, one beautiful journey. Welcome to our wedding album.",avatarUrl:""};
var CLD={cloud:"dormnrhdf",preset:"ml_default"};
// ══ FIREBASE ══
var db=null;
try{
  firebase.initializeApp({apiKey:"AIzaSyC6PC66hCpxTXTDIWCMDpl-MMFisbHWGa8",authDomain:"wedding-album-murshid-shibila.firebaseapp.com",projectId:"wedding-album-murshid-shibila",storageBucket:"wedding-album-murshid-shibila.firebasestorage.app",messagingSenderId:"621379710275",appId:"1:621379710275:web:cbf0861442676500a613f6"});
  db=firebase.firestore();
}catch(e){console.error("FB:",e);}

// ══ STATE ══
var IS_ADMIN=sessionStorage.getItem("wg-admin")==="1";
var POSTS=[],REELS=[],STORIES=[],WALL=[];
var LK={},MLK={},CM={},SL={};
var _uid=(function(){var u=localStorage.getItem("wg-uid");if(!u){u="u"+Math.random().toString(36).slice(2,9);localStorage.setItem("wg-uid",u);}return u;})();
var _cid=null,_ccoll=null,_unsub=null,_wchosen=null,_ufiles=[];

// ══ UTILS ══
function es(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function cp(){return es(CFG.bride)+" &amp; "+es(CFG.groom);}
function inits(){return((CFG.bride||"B")[0]+(CFG.groom||"G")[0]).toUpperCase();}
function tms(t){if(!t)return 0;if(t.seconds)return t.seconds*1000;if(t.toMillis)return t.toMillis();return+t;}
function ago(t){var s=Math.floor((Date.now()-tms(t))/1000);if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";}
function gv(id){var e=document.getElementById(id);return e?e.value:"";}
function avH(){return CFG.avatarUrl?'<img src="'+es(CFG.avatarUrl)+'" onerror="this.remove()"/>':inits();}

// ══ CLOUDINARY ══
function cldUp(file,onProg){
  return new Promise(function(res,rej){
    var t=file.type&&file.type.startsWith("video")?"video":"image";
    var fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLD.preset);
    var xhr=new XMLHttpRequest();
    xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLD.cloud+"/"+t+"/upload");
    xhr.upload.onprogress=function(e){if(e.lengthComputable&&onProg)onProg(e.loaded/e.total*100);};
    xhr.onload=function(){try{var r=JSON.parse(xhr.responseText);r.secure_url?res(r.secure_url):rej(new Error(r.error&&r.error.message||"Upload failed"));}catch(e){rej(e);}};
    xhr.onerror=function(){rej(new Error("Network error"));};
    xhr.send(fd);
  });
}

// ══ ADMIN ══
function openLogin(){document.getElementById("lo").classList.add("on");document.getElementById("lo-pw").value="";document.getElementById("lo-err").textContent="";setTimeout(function(){document.getElementById("lo-pw").focus();},200);}
function closeLogin(){document.getElementById("lo").classList.remove("on");}
function doLogin(){var pw=document.getElementById("lo-pw").value;if(pw===CFG.password){IS_ADMIN=true;sessionStorage.setItem("wg-admin","1");closeLogin();applyAdmin();}else{document.getElementById("lo-err").textContent="Wrong password";document.getElementById("lo-pw").value="";}}
function logoutAdmin(){IS_ADMIN=false;sessionStorage.removeItem("wg-admin");applyAdmin();}
function handleAvTap(){IS_ADMIN?goTo("profile"):openLogin();}
function applyAdmin(){
  var s=IS_ADMIN;
  document.getElementById("atag").style.display=s?"inline":"none";
  document.getElementById("abtn").textContent=s?"🔓 Logout Admin":"🔐 Admin Login";
  document.getElementById("ebtn").style.display=s?"block":"none";
  var fab=document.getElementById("fab");s?fab.classList.add("on"):fab.classList.remove("on");
  var pe=document.getElementById("pedit");if(pe)pe.style.display=s?"flex":"none";
  renderHome();renderReels();renderProfile();
}

// ══ NAV ══
function goTo(pg){
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on");});
  document.querySelectorAll(".nb").forEach(function(b){b.classList.remove("on");});
  document.getElementById("pg-"+pg).classList.add("on");
  document.getElementById("nb-"+pg).classList.add("on");
  var fab=document.getElementById("fab");
  ((pg==="home"||pg==="reels")&&IS_ADMIN)?fab.classList.add("on"):fab.classList.remove("on");
  if(pg==="wall")listenWall();
  if(pg==="profile")renderProfile();
}

// ══ TOP BAR ══
function updateTB(){
  document.getElementById("ht").innerHTML='<span style="font-family:\'Cormorant Garamond\',serif;font-style:italic">'+es(CFG.bride)+'</span><span style="color:var(--gold);margin:0 6px">✦</span><span style="font-family:\'Cormorant Garamond\',serif;font-style:italic">'+es(CFG.groom)+"</span>";
  document.getElementById("topinits").textContent=inits();
  document.getElementById("ls-name").textContent=(CFG.bride||"")+" & "+(CFG.groom||"");
  if(CFG.avatarUrl){var av=document.getElementById("topav");av.innerHTML='<img src="'+es(CFG.avatarUrl)+'" onerror="this.remove()"/>';}
}

// ══ STORIES ══
var SC=[["#8B6914","#C9A84C"],["#2d5a3d","#52b788"],["#6b3a2a","#b5634a"],["#4a3a6b","#8070b0"],["#3a5a6b","#60a0b0"],["#6b4a2a","#b0844a"],["#5a2a4a","#a06080"],["#2a4a3a","#50906a"]];
function renderStories(){
  var h="";
  if(STORIES.length){STORIES.forEach(function(s,i){var g=SC[i%SC.length];h+='<div class="s-item" onclick="openSV('+i+')">'+'<div class="s-ring" style="background:linear-gradient(135deg,'+g[0]+','+g[1]+')">'+'<img src="'+es(s.imgUrl||"")+'" onerror="this.outerHTML=\'<div class=&quot;s-ring-e&quot;>✦</div>\'"/>'+'</div><div class="s-lbl">'+es(s.label)+'</div></div>';});}
  else{[["💒","Ceremony"],["🥂","Reception"],["💑","Couple"],["👨‍👩‍👧","Family"],["🎊","Friends"],["✨","Moments"]].forEach(function(s,i){var g=SC[i];h+='<div class="s-item"><div class="s-ring" style="background:linear-gradient(135deg,'+g[0]+','+g[1]+')">'+'<div class="s-ring-e">'+s[0]+'</div></div><div class="s-lbl">'+s[1]+'</div></div>';});}
  document.getElementById("ss").innerHTML=h;
}
function openSV(i){var s=STORIES[i];if(!s)return;var g=SC[i%SC.length];document.getElementById("sv-img").src=s.imgUrl||"";document.getElementById("sv-prog").style.background="linear-gradient(90deg,"+g[0]+","+g[1]+")";document.getElementById("sv-av").src=CFG.avatarUrl||"";document.getElementById("sv-nm").innerHTML=cp();document.getElementById("sv-sb").textContent=s.label||"";document.getElementById("sv-lb").textContent=s.label||"";document.getElementById("sv-dt").textContent=(CFG.date||"")+(CFG.location?" · "+CFG.location:"");document.getElementById("sv").style.display="block";}

// ══ BUILD CARD ══
function buildCard(p,coll){
  var lk=LK[p.id]||0,liked=MLK[p.id],cm=CM[p.id]||[],last=cm.length?cm[cm.length-1]:null;
  var imgs=p.images||[];var ci=SL[p.id]||0;var isWall=coll==="guestWall";
  var imgH="";
  if(imgs.length){
    imgH='<div class="card-img" ondblclick="dbl(\''+p.id+'\',\''+coll+'\')">'+'<img src="'+es(imgs[ci])+'" loading="lazy" onerror="this.style.display=\'none\'"/>';
    if(imgs.length>1){imgH+='<div class="sl-cnt">'+(ci+1)+"/"+imgs.length+"</div>"+'<div class="sl-dots">';for(var i=0;i<imgs.length;i++)imgH+='<div class="dot '+(i===ci?"on":"off")+'"></div>';imgH+='</div>';if(ci>0)imgH+='<button class="sl-p" onclick="sl(\''+p.id+'\',\''+coll+'\',-1)">‹</button>';if(ci<imgs.length-1)imgH+='<button class="sl-n" onclick="sl(\''+p.id+'\',\''+coll+'\',1)">›</button>';}
    imgH+='<span id="hp-'+p.id+'"></span></div>';
  }
  return'<div class="card" id="cd-'+p.id+'">'
    +'<div class="card-head"><div class="card-av">'+avH()+'</div>'
    +'<div style="flex:1"><div class="card-name">'+es(isWall?p.guestName||"Guest":CFG.bride+" & "+CFG.groom)+'</div>'
    +'<div class="card-time">'+ago(p.time)+'</div></div>'
    +(IS_ADMIN?'<button class="card-del" onclick="delPost(\''+p.id+'\',\''+coll+'\')">🗑</button>':"")
    +'</div>'+imgH
    +(p.msg&&isWall?'<div style="padding:8px 14px 0;font-size:13px;color:var(--text2);font-style:italic">'+es(p.msg)+'</div>':"")
    +'<div class="card-acts"><div class="act-row">'
    +'<button class="act" onclick="tgLike(\''+p.id+'\',\''+coll+'\')">'+(liked?"❤️":"🤍")+'</button>'
    +'<button class="act" style="font-size:22px" onclick="openCmt(\''+p.id+'\',\''+coll+'\')">💬</button>'
    +'<button class="act" style="font-size:20px" onclick="shareAlbum()">📤</button>'
    +'</div>'
    +(lk?'<div class="lk-cnt">'+lk.toLocaleString()+' like'+(lk!==1?'s':'')+'</div>':"")
    +(p.caption&&!isWall?'<div class="caption"><strong>'+cp()+'</strong> '+es(p.caption)+'</div>':"")
    +(cm.length?'<button class="vcmts" onclick="openCmt(\''+p.id+'\',\''+coll+'\')">View all '+cm.length+' comment'+(cm.length!==1?'s':'')+'</button>':"")
    +(last?'<div class="lcmt"><strong>'+es(last.name)+'</strong> '+es(last.text)+'</div>':"")
    +'<div class="ct-sm">'+ago(p.time)+'</div>'
    +'</div></div>';
}

function sl(id,coll,dir){var arr=coll==="posts"?POSTS:coll==="reels"?REELS:WALL;var p=arr.find(function(x){return x.id===id;});if(!p)return;var imgs=p.images||[];SL[id]=Math.max(0,Math.min((SL[id]||0)+dir,imgs.length-1));var el=document.getElementById("cd-"+id);if(el)el.outerHTML=buildCard(p,coll);}
function dbl(id,coll){if(!MLK[id])tgLike(id,coll);var el=document.getElementById("hp-"+id);if(el){el.innerHTML='<div class="hpop">❤️</div>';setTimeout(function(){el.innerHTML="";},900);}}
function delPost(id,coll){if(!IS_ADMIN||!db)return;if(!confirm("Delete this post?"))return;db.collection(coll).doc(id).delete();}

// ══ RENDER HOME ══
function renderHome(){
  updateTB();renderStories();
  var el=document.getElementById("hfeed");
  if(!POSTS.length){el.innerHTML='<div class="empty"><div class="empty-icon">📸</div><div class="empty-title">No posts yet</div><div class="empty-sub">'+(IS_ADMIN?"Tap + to add your first photo":"Photos will appear here soon")+'</div></div>';return;}
  el.innerHTML=POSTS.map(function(p){return buildCard(p,"posts");}).join("");
}

// ══ RENDER REELS ══
function renderReels(){
  var el=document.getElementById("rfeed");
  if(!REELS.length){el.innerHTML='<div class="empty"><div class="empty-icon">🎬</div><div class="empty-title" style="color:var(--gold)">No reels yet</div><div class="empty-sub" style="color:rgba(201,168,76,0.4)">'+(IS_ADMIN?"Tap + to upload a video":"Videos will appear here soon")+'</div></div>';return;}
  el.innerHTML=REELS.map(function(r){
    var lk=LK[r.id]||0,liked=MLK[r.id],cm=CM[r.id]||[];
    return'<div class="rcard" id="rc-'+r.id+'">'
      +(r.thumbUrl?'<img src="'+es(r.thumbUrl)+'" loading="lazy"/>'
        :'<div style="width:100%;height:100%;background:linear-gradient(135deg,#0d0a06,#1a1209);display:flex;align-items:center;justify-content:center;font-size:48px">🎬</div>')
      +'<div class="r-center" onclick="openVP(\''+es(r.videoUrl||"")+'\')"><div class="r-play">▶</div></div>'
      +'<span id="hp-'+r.id+'"></span>'
      +(IS_ADMIN?'<button class="r-del" style="display:flex" onclick="delPost(\''+r.id+'\',\'reels\')">🗑</button>':"")
      +'<div class="r-side">'
      +'<div class="r-act"><button onclick="tgLike(\''+r.id+'\',\'reels\')" ondblclick="dbl(\''+r.id+'\',\'reels\')">'+(liked?"❤️":"🤍")+'</button>'+(lk?'<span>'+lk+'</span>':"")+'</div>'
      +'<div class="r-act"><button onclick="openCmt(\''+r.id+'\',\'reels\')">💬</button>'+(cm.length?'<span>'+cm.length+'</span>':"")+'</div>'
      +'<div class="r-act"><button onclick="shareAlbum()">📤</button></div>'
      +'</div>'
      +'<div class="r-info"><div class="r-uname">'+cp()+'</div><div class="r-cap">'+es(r.caption||"")+'</div>'
      +(r.song?'<div class="r-song"><span class="spin">🎵</span>'+es(r.song)+'</div>':"")
      +'</div></div>';
  }).join("");
}

// ══ RENDER WALL FEED ══
function renderWallFeed(){
  var el=document.getElementById("wfeed");
  document.getElementById("st-w").textContent=WALL.length;
  if(!WALL.length){el.innerHTML='<div class="empty"><div class="empty-icon">🌸</div><div class="empty-title">Be the first to share</div><div class="empty-sub">Tap "+ Share" to add your photo</div></div>';return;}
  el.innerHTML=WALL.map(function(p){return buildCard(p,"guestWall");}).join("");
}

// ══ RENDER PROFILE ══
function renderProfile(){
  document.getElementById("ptitle").innerHTML=cp();
  document.getElementById("pname").innerHTML=cp();
  document.getElementById("pbio").textContent=CFG.bio||"";
  document.getElementById("ploc").textContent=CFG.location?"📍 "+CFG.location:"";
  document.getElementById("pdate").textContent=CFG.date?"💕 "+CFG.date:"";
  document.getElementById("ppho").textContent=CFG.photographer?"📸 "+CFG.photographer:"";
  var ring=document.getElementById("pring");
  ring.innerHTML=(CFG.avatarUrl?'<img src="'+es(CFG.avatarUrl)+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--dark)"/>'
    :'<div class="p-ring-e">'+inits()+'</div>')
    +(IS_ADMIN?'<div class="p-edit-badge" style="display:flex">✏️</div>':"");
  var tl=Object.values(LK).reduce(function(a,b){return a+b;},0);
  var tc=Object.values(CM).reduce(function(a,b){return a+b.length;},0);
  document.getElementById("st-p").textContent=POSTS.length;
  document.getElementById("st-l").textContent=tl;
  document.getElementById("st-c").textContent=tc;
  document.getElementById("st-w").textContent=WALL.length;
  document.getElementById("abtn").textContent=IS_ADMIN?"🔓 Logout Admin":"🔐 Admin Login";
  document.getElementById("ebtn").style.display=IS_ADMIN?"block":"none";
  var imgs=[];POSTS.forEach(function(p){(p.images||[]).forEach(function(img){if(imgs.length<12)imgs.push(img);});});
  document.getElementById("pgrid").innerHTML=imgs.length?imgs.map(function(s){return'<div class="pgrid-item"><img src="'+es(s)+'" loading="lazy" onerror="this.style.display=\'none\'"/></div>';}).join(""):'<div style="grid-column:1/-1;text-align:center;padding:40px;font-family:\'Cormorant Garamond\',serif;font-style:italic;color:var(--text3)">Photos appear here</div>';
}

// ══ LIKES ══
function loadLikes(){
  if(!db)return Promise.resolve();
  return db.collection("likes").get().then(function(s){
    s.forEach(function(d){LK[d.id]=d.data().count||0;});
  }).then(function(){
    return db.collection("ul_"+_uid).get();
  }).then(function(s){
    s.forEach(function(d){if(d.data().liked===true)MLK[d.id]=true;});
  }).catch(function(e){console.warn("loadLikes:",e);});
}
function tgLike(id,coll){
  var was=MLK[id];
  LK[id]=Math.max(0,(LK[id]||0)+(was?-1:1));MLK[id]=!was;
  // re-render
  if(coll==="reels")renderReels();
  else{var p=(coll==="guestWall"?WALL:POSTS).find(function(x){return x.id===id;});if(p){var el=document.getElementById("cd-"+p.id);if(el)el.outerHTML=buildCard(p,coll);}}
  renderProfile();
  if(!db)return;
  db.collection("likes").doc(id).set({count:firebase.firestore.FieldValue.increment(was?-1:1)},{merge:true});
  db.collection("ul_"+_uid).doc(id).set({liked:!was});
}

// ══ COMMENTS ══
function openCmt(id,coll){
  _cid=id;_ccoll=coll;
  document.getElementById("cm-ov").classList.add("on");
  document.getElementById("cm-name").value="";document.getElementById("cm-txt").value="";
  renderCmtList(id);
  if(_unsub)_unsub();
  if(db){_unsub=db.collection(coll).doc(id).collection("comments").onSnapshot(function(snap){var arr=[];snap.forEach(function(d){var dat=d.data();arr.push({name:dat.name||"Guest",text:dat.text,time:tms(dat.time)});});arr.sort(function(a,b){return a.time-b.time;});CM[id]=arr;renderCmtList(id);},{});}
}
function closeCmt(){document.getElementById("cm-ov").classList.remove("on");if(_unsub){_unsub();_unsub=null;}_cid=null;_ccoll=null;}
function renderCmtList(id){
  var cm=CM[id]||[];var el=document.getElementById("cm-list");if(!el)return;
  if(!cm.length){el.innerHTML='<div class="cm-empty">Be the first to comment ✦</div>';return;}
  el.innerHTML=cm.map(function(c){return'<div class="cm-item"><div class="cm-av">'+es((c.name||"G")[0].toUpperCase())+'</div><div><div class="cm-body"><strong>'+es(c.name)+'</strong> '+es(c.text)+'</div><div class="cm-time">'+ago(c.time)+'</div></div></div>';}).join("");
  el.scrollTop=el.scrollHeight;
}
function sendCmt(){
  if(!_cid||!db)return;
  var name=(document.getElementById("cm-name").value||"").trim()||"Guest";
  var text=(document.getElementById("cm-txt").value||"").trim();
  if(!text)return;
  document.getElementById("cm-txt").value="";
  db.collection(_ccoll).doc(_cid).set({_e:true},{merge:true});
  db.collection(_ccoll).doc(_cid).collection("comments").add({name:name,text:text,time:firebase.firestore.FieldValue.serverTimestamp()});
}

// ══ VIDEO ══
function openVP(url){if(!url){alert("Video not available.");return;}var v=document.getElementById("vp-v");v.src=url;v.play();document.getElementById("vp").style.display="flex";document.body.style.overflow="hidden";}
function closeVP(){var v=document.getElementById("vp-v");v.pause();v.src="";document.getElementById("vp").style.display="none";document.body.style.overflow="";}

// ══ UPLOAD ══
var _upMode="post";
function openUpload(){
  if(!IS_ADMIN){openLogin();return;}
  var pg=document.querySelector(".pg.on");
  _upMode=(pg&&pg.id==="pg-reels")?"reel":"post";
  _ufiles=[];
  document.getElementById("up-ov").classList.add("on");
  document.body.style.overflow="hidden";
  buildUpBody();
}
function closeUpload(){document.getElementById("up-ov").classList.remove("on");document.body.style.overflow="";_ufiles=[];}
function buildUpBody(){
  document.getElementById("up-title").textContent=_upMode==="reel"?"Add Reel":"Add Post";
  var h="";
  if(_upMode==="post"){
    h+='<div class="mstrip" id="mstrip">'+buildStrip()+'</div>';
    h+='<input type="file" id="uf" accept="image/*" multiple style="display:none" onchange="onPostF(event)"/>';
    h+='<textarea class="u-inp" id="ucap" rows="3" placeholder="Write a caption..."></textarea>';
  }else{
    h+='<div class="pick" id="pick" onclick="document.getElementById(\'uf\').click()"><div class="p-icon">🎬</div><div class="p-title">Tap to choose video</div><div class="p-sub">MP4, MOV from your phone</div></div>';
    h+='<input type="file" id="uf" accept="video/*" style="display:none" onchange="onReelF(event)"/>';
    h+='<textarea class="u-inp" id="ucap" rows="2" placeholder="Caption..."></textarea>';
    h+='<input class="u-inp" id="usong" placeholder="🎵 Song name (optional)"/>';
  }
  h+='<div class="u-prog" id="uprog"><div class="u-pb" id="upb"></div></div>';
  h+='<div class="u-stat" id="ustat"></div>';
  h+='<button class="u-sub" id="usub" onclick="doUpload()">Upload ✦</button>';
  document.getElementById("up-body").innerHTML=h;
}
function buildStrip(){var h="";_ufiles.forEach(function(f,i){h+='<div class="mthumb"><img src="'+URL.createObjectURL(f)+'"/><button class="mdel" onclick="rmF('+i+')">✕</button></div>';});h+='<div class="madd" onclick="document.getElementById(\'uf\').click()">'+(_ufiles.length?"+":'📷')+'</div>';return h;}
function rmF(i){_ufiles.splice(i,1);document.getElementById("mstrip").innerHTML=buildStrip();}
function onPostF(e){Array.from(e.target.files).forEach(function(f){_ufiles.push(f);});document.getElementById("mstrip").innerHTML=buildStrip();e.target.value="";}
function onReelF(e){var f=e.target.files[0];if(!f)return;_ufiles=[f];var url=URL.createObjectURL(f);document.getElementById("pick").innerHTML='<video src="'+url+'" style="width:100%;max-height:260px;border-radius:16px" muted></video><div class="chint">change</div>';}
function setStat(s){var e=document.getElementById("ustat");if(e)e.textContent=s;}
function setProg(p){var e=document.getElementById("upb");if(e)e.style.width=p+"%";}

async function doUpload(){
  if(!db)return;
  var btn=document.getElementById("usub");btn.disabled=true;
  document.getElementById("uprog").style.display="block";
  var cap=(gv("ucap")||"").trim();
  try{
    if(_upMode==="post"){
      if(!_ufiles.length){alert("Choose at least one photo.");btn.disabled=false;return;}
      var urls=[];
      for(var i=0;i<_ufiles.length;i++){
        setStat("Uploading photo "+(i+1)+" of "+_ufiles.length+"...");setProg(0);
        var url=await cldUp(_ufiles[i],function(p){setProg(p);});
        urls.push(url);
      }
      setStat("Saving...");
      await db.collection("posts").add({images:urls,caption:cap,time:firebase.firestore.FieldValue.serverTimestamp()});
      setStat("Posted! ✦");
      // Immediately fetch and render
      fetchPosts();
    }else{
      if(!_ufiles.length){alert("Choose a video.");btn.disabled=false;return;}
      var song=(gv("usong")||"").trim();
      setStat("Uploading video...");setProg(0);
      var vurl=await cldUp(_ufiles[0],function(p){setProg(p);});
      var thumb=await getThumb(_ufiles[0]);var turl="";
      if(thumb){setStat("Uploading thumbnail...");turl=await cldUp(thumb,null);}
      setStat("Saving...");
      await db.collection("reels").add({videoUrl:vurl,thumbUrl:turl,caption:cap,song:song,time:firebase.firestore.FieldValue.serverTimestamp()});
      setStat("Reel posted! ✦");
      fetchReels();
    }
    setTimeout(closeUpload,900);
  }catch(e){console.error(e);setStat("Error: "+e.message);btn.disabled=false;}
}

function getThumb(file){return new Promise(function(res){try{var v=document.createElement("video");v.muted=true;v.preload="metadata";var url=URL.createObjectURL(file);v.src=url;v.currentTime=1;v.addEventListener("seeked",function(){var c=document.createElement("canvas");c.width=v.videoWidth||640;c.height=v.videoHeight||360;c.getContext("2d").drawImage(v,0,0);c.toBlob(function(b){URL.revokeObjectURL(url);res(b);},"image/jpeg",0.8);});v.addEventListener("error",function(){URL.revokeObjectURL(url);res(null);});}catch(e){res(null);}});}

// ══ WALL ══
function toggleWallBox(){var b=document.getElementById("wall-box");b.classList.toggle("on");if(b.classList.contains("on"))setTimeout(function(){b.scrollIntoView({behavior:"smooth",block:"nearest"});},100);}
function onWallFile(e){var f=e.target.files[0];if(!f)return;_wchosen=f;var url=URL.createObjectURL(f);document.getElementById("wall-prev").outerHTML='<div id="wall-prev" class="wall-pi" onclick="document.getElementById(\'wf\').click()"><img src="'+url+'"/><div class="chint">change</div></div>';}
async function submitWall(){
  if(!db)return;
  var name=(gv("wname")||"").trim();var msg=(gv("wmsg")||"").trim();
  if(!name){alert("Please enter your name 😊");document.getElementById("wname").focus();return;}
  if(!_wchosen){alert("Please choose a photo 📷");return;}
  var btn=document.getElementById("wsub");btn.disabled=true;btn.textContent="Uploading...";
  document.getElementById("wprog").style.display="block";
  try{
    var url=await cldUp(_wchosen,function(p){document.getElementById("wpb").style.width=p+"%";});
    await db.collection("guestWall").add({guestName:name,msg:msg,images:[url],time:firebase.firestore.FieldValue.serverTimestamp()});
    _wchosen=null;document.getElementById("wname").value="";document.getElementById("wmsg").value="";
    document.getElementById("wprog").style.display="none";document.getElementById("wpb").style.width="0%";
    document.getElementById("wall-prev").outerHTML='<div id="wall-prev" class="wall-ph" onclick="document.getElementById(\'wf\').click()"><div class="icon">📷</div><span>Tap to choose a photo</span></div>';
    btn.textContent="Share Your Memory 💝";btn.disabled=false;
    document.getElementById("wall-box").classList.remove("on");
  }catch(e){console.error(e);btn.disabled=false;btn.textContent="Share Your Memory 💝";alert("Upload failed. Please try again.");}
}

// ══ PROFILE EDIT ══
function openEP(){document.getElementById("ep-bride").value=CFG.bride||"";document.getElementById("ep-groom").value=CFG.groom||"";document.getElementById("ep-date").value=CFG.date||"";document.getElementById("ep-loc").value=CFG.location||"";document.getElementById("ep-photo").value=CFG.photographer||"";document.getElementById("ep-bio").value=CFG.bio||"";document.getElementById("ep-ov").classList.add("on");}
async function saveProfile(){
  CFG.bride=gv("ep-bride")||CFG.bride;CFG.groom=gv("ep-groom")||CFG.groom;CFG.date=gv("ep-date");CFG.location=gv("ep-loc");CFG.photographer=gv("ep-photo");CFG.bio=gv("ep-bio");
  if(db)await db.collection("config").doc("profile").set({bride:CFG.bride,groom:CFG.groom,date:CFG.date,location:CFG.location,photographer:CFG.photographer,bio:CFG.bio},{merge:true});
  document.getElementById("ep-ov").classList.remove("on");updateTB();renderHome();renderReels();renderProfile();
}
function openAv(){document.getElementById("avf").click();}
async function uploadAv(e){var f=e.target.files[0];if(!f)return;try{var url=await cldUp(f,null);CFG.avatarUrl=url;if(db)await db.collection("config").doc("profile").set({avatarUrl:url},{merge:true});updateTB();renderProfile();}catch(e){alert("Avatar upload failed.");}document.getElementById("avf").value="";}

// ══ SHARE ══
function shareAlbum(){var t=CFG.bride+" & "+CFG.groom+" Wedding Album";if(navigator.share)navigator.share({url:window.location.href,title:t});else{try{navigator.clipboard.writeText(window.location.href);}catch(e){}alert("Link copied! Share on WhatsApp 💝");}}

// ══ FETCH DATA ══
function fetchPosts(){
  if(!db)return;
  db.collection("posts").get().then(function(snap){
    POSTS=[];
    snap.forEach(function(d){POSTS.push(Object.assign({id:d.id},d.data()));});
    POSTS.sort(function(a,b){return tms(b.time)-tms(a.time);});
    renderHome();renderProfile();
  }).catch(function(e){console.error("fetchPosts error:",e);});
}
function fetchReels(){
  if(!db)return;
  db.collection("reels").get().then(function(snap){
    REELS=[];
    snap.forEach(function(d){REELS.push(Object.assign({id:d.id},d.data()));});
    REELS.sort(function(a,b){return tms(b.time)-tms(a.time);});
    renderReels();
  }).catch(function(e){console.error("fetchReels error:",e);});
}
function fetchStories(){
  if(!db)return;
  db.collection("stories").get().then(function(snap){
    STORIES=[];
    snap.forEach(function(d){STORIES.push(Object.assign({id:d.id},d.data()));});
    STORIES.sort(function(a,b){return tms(a.time)-tms(b.time);});
    renderStories();
  }).catch(function(e){console.error("fetchStories error:",e);});
}
function listenWall(){
  if(!db)return;
  db.collection("guestWall").get().then(function(snap){
    WALL=[];
    snap.forEach(function(d){WALL.push(Object.assign({id:d.id},d.data()));});
    WALL.sort(function(a,b){return tms(b.time)-tms(a.time);});
    renderWallFeed();
  }).catch(function(e){console.error("fetchWall error:",e);});
}
function loadConfig(){
  if(!db)return;
  db.collection("config").doc("profile").get().then(function(doc){
    if(!doc.exists)return;
    var d=doc.data();
    if(d.bride)CFG.bride=d.bride;if(d.groom)CFG.groom=d.groom;if(d.date)CFG.date=d.date;
    if(d.location)CFG.location=d.location;if(d.photographer)CFG.photographer=d.photographer;
    if(d.bio)CFG.bio=d.bio;if(d.avatarUrl)CFG.avatarUrl=d.avatarUrl;
    updateTB();renderHome();renderProfile();
  }).catch(function(e){console.warn("loadConfig:",e);});
}

// ══ BOOT ══
function boot(){
  document.getElementById("ls").style.display="none";
  document.getElementById("app").style.display="block";
  applyAdmin();updateTB();
  if(db){
    loadConfig();
    // Run all fetches independently - don't chain
    fetchPosts();
    fetchReels();
    fetchStories();
    // Load likes separately in background
    loadLikes().then(function(){
      renderHome();
      renderReels();
    }).catch(function(){});
  } else {
    renderHome();renderReels();renderProfile();
  }
}
setTimeout(boot,400);
</script>
