<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Murshid & Shibila — Wedding Album</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-dark:#9A7A30;
  --cream:#FAF7F2;--cream-dark:#F0EAE0;--cream-deep:#E8DDD0;
  --dark:#1A1209;--dark2:#2C200F;--dark3:#3E2E18;
  --text:#4A3728;--text-light:#7A6455;--text-muted:#A89282;
  --white:#FFFFFF;--error:#C0392B;
}
html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--cream);overflow-x:hidden;color:var(--dark)}
::-webkit-scrollbar{display:none}
body{scrollbar-width:none}
button{cursor:pointer;font-family:'Montserrat',sans-serif;border:none;background:none}
input,textarea{font-family:'Montserrat',sans-serif}
img{display:block;max-width:100%}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
.load-ornament{width:60px;height:60px;position:relative}
.load-ornament::before,.load-ornament::after{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid transparent}
.load-ornament::before{border-top-color:var(--gold);border-right-color:var(--gold);animation:spinL 1.2s linear infinite}
.load-ornament::after{border-bottom-color:var(--gold-light);border-left-color:var(--gold-light);animation:spinL 0.8s linear infinite reverse;inset:8px}
.load-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold)}
.load-names{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--gold-light);letter-spacing:2px;text-align:center;line-height:1.4}
.load-sub{font-size:9px;letter-spacing:4px;color:rgba(201,168,76,0.5);text-transform:uppercase}
@keyframes spinL{to{transform:rotate(360deg)}}

/* APP WRAPPER */
#app{display:none;max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--dark);border-top:1px solid rgba(201,168,76,0.15);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0 12px;opacity:0.38;transition:all 0.2s;position:relative;color:var(--cream)}
.nav-btn.active{opacity:1;color:var(--gold-light)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:30%;right:30%;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:0 0 2px 2px}
.nav-icon{width:24px;height:24px;display:block;flex-shrink:0}
.nav-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:inherit;line-height:1}

/* PAGES */
.page{display:none;min-height:100vh;background:var(--cream);padding-bottom:68px}
.page.active{display:block}

/* TOP BAR */
.top-bar{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.top-bar-logo{display:flex;flex-direction:column;align-items:center}
.top-bar-names{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--dark);letter-spacing:0.5px}
.top-bar-amp{color:var(--gold)}
.top-bar-date{font-size:8px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-top:1px}
.top-bar-right{display:flex;align-items:center;gap:10px}
.avatar-btn{background:none;border:none;padding:0;width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0}
.avatar-btn img{width:100%;height:100%;object-fit:cover}
.notif-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* STORIES */
#stories-row{background:var(--white);border-bottom:1px solid rgba(201,168,76,0.12);padding:12px 0}
#stories-scroll{display:flex;gap:12px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
#stories-scroll::-webkit-scrollbar{display:none}
.story-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2.5px;flex-shrink:0}
.story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2.5px solid var(--white)}
.story-ring.gradient-1{background:linear-gradient(135deg,var(--gold-dark),var(--gold-light))}
.story-ring.gradient-2{background:linear-gradient(135deg,#8B4513,var(--gold))}
.story-ring.gradient-3{background:linear-gradient(135deg,var(--dark2),var(--gold-dark))}
.story-ring.gradient-4{background:linear-gradient(135deg,#6B3A2A,#C9A84C)}
.story-ring.add-story{background:var(--cream-dark);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}
.story-label{font-size:9px;font-weight:500;color:var(--text-light);max-width:62px;text-align:center;line-height:1.3;letter-spacing:0.3px}

/* SECTION HEADERS */
.section-header{padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.section-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--dark)}
.section-ornament{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:10px;letter-spacing:1px}

/* POST CARDS */
.post-card{background:var(--white);margin-bottom:2px;border-bottom:6px solid var(--cream)}
.post-header{display:flex;align-items:center;gap:10px;padding:10px 14px}
.post-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;flex-shrink:0;background:var(--cream-dark)}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-meta-name{font-weight:600;font-size:12px;color:var(--dark);letter-spacing:0.3px}
.post-meta-italic{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold-dark)}
.post-meta-time{font-size:10px;color:var(--text-muted);margin-top:1px}
.post-more{background:none;border:none;font-size:20px;color:var(--text-muted);margin-left:auto;padding:4px}

/* CAROUSEL */
.post-img-wrap{position:relative;user-select:none;-webkit-user-select:none;background:var(--cream-dark)}
.post-img-wrap img{width:100%;object-fit:cover;display:block}
/* ratio classes applied dynamically from first image */
.post-img-wrap.ratio-square img{aspect-ratio:1/1}
.post-img-wrap.ratio-portrait img{aspect-ratio:4/5}
.post-img-wrap.ratio-landscape img{aspect-ratio:1.91/1}
.post-img-wrap.ratio-loading{min-height:280px}
.post-img-wrap.ratio-loading img{min-height:280px}
.c-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(26,18,9,0.55);border:1px solid rgba(201,168,76,0.4);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-size:16px;z-index:2;backdrop-filter:blur(4px)}
.c-prev{left:10px}.c-next{right:10px}
.c-count{position:absolute;top:12px;right:12px;background:rgba(26,18,9,0.6);border:1px solid rgba(201,168,76,0.3);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--gold-light);font-weight:600;letter-spacing:1px}
.c-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.dot{height:4px;border-radius:2px;transition:all 0.25s}
.dot.on{width:20px;background:var(--gold)}.dot.off{width:4px;background:rgba(255,255,255,0.5)}
.heart-anim{position:absolute;top:50%;left:50%;font-size:80px;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop 0.85s ease forwards;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5))}
@keyframes heartPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0.2)}15%{transform:translate(-50%,-50%) scale(1.3)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05)}}

/* POST ACTIONS */
.post-actions{padding:10px 14px 14px}
.action-row{display:flex;align-items:center;gap:2px;margin-bottom:8px}
.action-btn{background:none;border:none;font-size:24px;line-height:1;padding:6px;transition:transform 0.15s;display:flex;align-items:center;justify-content:center}
.action-btn:active{transform:scale(0.82)}
.action-btn.liked{animation:likePoP 0.3s ease}
@keyframes likePoP{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.action-spacer{flex:1}
.like-count{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:5px}
.like-count span{color:var(--gold-dark)}
.post-caption{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:3px}
.post-caption strong{font-weight:600;color:var(--dark)}
.post-song{font-size:11px;color:var(--text-muted);font-style:italic;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.view-cmts-btn{background:none;border:none;padding:0;font-size:11px;color:var(--text-muted);margin-top:2px;font-weight:500;letter-spacing:0.3px}
.last-cmt{font-size:12px;color:var(--text);margin-top:5px;line-height:1.5}
.post-time-label{font-size:9px;color:var(--text-muted);margin-top:5px;text-transform:uppercase;letter-spacing:1px}
.admin-del-btn{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:8px;color:var(--error);font-size:11px;font-weight:600;padding:4px 10px;margin-top:8px;display:flex;align-items:center;gap:4px}

/* GOLD DIVIDER */
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 16px;opacity:0.4}

/* REELS PAGE */
#reels-page{background:#0D0A06;padding-bottom:68px}
#reels-topbar{position:sticky;top:0;z-index:100;background:rgba(13,10,6,0.9);backdrop-filter:blur(12px);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,168,76,0.15)}
#reels-topbar .rt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--gold-light)}
.reel-card{position:relative;height:86vh;overflow:hidden;background:#0D0A06;margin-bottom:4px}
.reel-card img{width:100%;height:100%;object-fit:cover;opacity:0.85}
.reel-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-play-btn{width:64px;height:64px;border-radius:50%;background:rgba(201,168,76,0.15);backdrop-filter:blur(8px);border:1.5px solid rgba(201,168,76,0.5);display:flex;align-items:center;justify-content:center;font-size:22px;padding-left:3px;color:var(--gold-light)}
.reel-actions{position:absolute;right:14px;bottom:140px;display:flex;flex-direction:column;gap:20px;align-items:center}
.reel-action{display:flex;flex-direction:column;align-items:center;gap:3px}
.reel-action button{background:none;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 1px 6px rgba(0,0,0,0.7))}
.reel-action span{color:rgba(250,247,242,0.9);font-size:11px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,0.8);letter-spacing:0.5px}
.reel-info{position:absolute;bottom:0;left:0;right:72px;padding:80px 16px 20px;background:linear-gradient(to top,rgba(13,10,6,0.85),transparent);pointer-events:none}
.reel-uname{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--gold-light);margin-bottom:5px}
.reel-cap{font-size:12px;color:rgba(250,247,242,0.9);line-height:1.6;margin-bottom:6px}
.reel-song{font-size:10px;color:rgba(201,168,76,0.7);display:flex;align-items:center;gap:5px;letter-spacing:0.5px}
.spin-music{display:inline-block;animation:spinL 4s linear infinite}
.reel-del-wrap{position:absolute;top:14px;right:14px;z-index:10}
.reel-del-btn{background:rgba(192,57,43,0.7);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;padding:5px 10px}

/* WALL PAGE */
#wall-page{background:var(--cream);padding-bottom:68px}
#wall-topbar{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
#wall-topbar-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--dark)}
.wall-add-btn{background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;border-radius:20px;color:var(--dark);font-weight:700;font-size:11px;padding:7px 16px;letter-spacing:0.5px;display:flex;align-items:center;gap:5px}
#wall-feed{padding-bottom:8px}
.wall-card{background:var(--white);margin-bottom:2px;border-bottom:6px solid var(--cream)}
.wall-card-header{display:flex;align-items:center;gap:10px;padding:10px 14px}
.wall-guest-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--dark2),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold-light);flex-shrink:0;border:2px solid rgba(201,168,76,0.3)}
.wall-card-img-wrap{position:relative;background:var(--cream-dark)}
.wall-card-img-wrap img{width:100%;object-fit:cover;display:block}
.wall-card-img-wrap.ratio-portrait img{aspect-ratio:4/5}
.wall-card-img-wrap.ratio-landscape img{aspect-ratio:1.91/1}
.wall-card-img-wrap.ratio-square img{aspect-ratio:1/1}
.wall-card-img-wrap.ratio-loading{min-height:280px}
.wall-card-img-wrap.ratio-loading img{min-height:280px}
.wall-card-actions{padding:10px 14px 14px}
.wall-empty{padding:80px 20px;text-align:center;color:var(--text-muted)}
.wall-empty-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--gold-dark);margin-bottom:6px;margin-top:12px}

/* PROFILE PAGE */
#profile-page{background:var(--cream);padding-bottom:68px}
.prof-hero{background:linear-gradient(160deg,var(--dark) 0%,var(--dark2) 60%,var(--dark3) 100%);padding:30px 20px 24px;position:relative;overflow:hidden}
.prof-hero::before{content:'♦';position:absolute;top:-20px;right:-20px;font-size:200px;color:rgba(201,168,76,0.03);pointer-events:none}
.prof-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4}
.prof-av-wrap{width:88px;height:88px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));margin:0 auto 16px;cursor:pointer;position:relative}
.prof-av-wrap img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--dark)}
.prof-av-overlay{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(26,18,9,0.5);opacity:0;transition:opacity 0.2s;font-size:18px;margin:2.5px}
.prof-av-wrap:hover .prof-av-overlay,.prof-av-wrap:active .prof-av-overlay{opacity:1}
.prof-couple{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--gold-light);text-align:center;margin-bottom:4px}
.prof-amp{color:var(--gold-dark);margin:0 4px}
.prof-date-loc{font-size:10px;letter-spacing:2px;color:rgba(201,168,76,0.55);text-align:center;text-transform:uppercase;margin-bottom:4px}
.prof-bio{font-size:12px;color:rgba(250,247,242,0.7);text-align:center;line-height:1.7;margin-bottom:14px;max-width:320px;margin-left:auto;margin-right:auto;font-style:italic}
.prof-meta{display:flex;flex-direction:column;gap:3px;align-items:center;margin-bottom:14px}
.prof-meta-item{font-size:10px;color:rgba(201,168,76,0.6);letter-spacing:1px}
.prof-stats{display:flex;justify-content:space-around;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:14px;margin-bottom:14px}
.stat{text-align:center}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold-light);font-weight:600;line-height:1}
.stat-lbl{font-size:9px;letter-spacing:1.5px;color:rgba(201,168,76,0.5);text-transform:uppercase;margin-top:3px}
.prof-btns{display:flex;gap:10px}
.prof-btn{flex:1;border:1px solid rgba(201,168,76,0.35);border-radius:10px;color:var(--gold-light);font-size:11px;font-weight:600;padding:9px;letter-spacing:0.5px;background:rgba(201,168,76,0.07);transition:all 0.2s}
.prof-btn:active{background:rgba(201,168,76,0.15)}

/* PHOTO GRID */
.pgrid-header{padding:16px 16px 10px;display:flex;align-items:center;gap:8px}
.pgrid-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--dark)}
.pgrid-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);opacity:0.4}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.pgrid-item{aspect-ratio:1;overflow:hidden;background:var(--cream-dark)}
.pgrid-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
.pgrid-item img:hover{transform:scale(1.04)}
.pgrid-empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--text-muted)}

/* STORY VIEWER */
#sv{position:fixed;inset:0;background:#000;z-index:600;display:none;max-width:480px;margin:0 auto;overflow:hidden;touch-action:pan-y}
#sv-slides{position:absolute;inset:0;display:flex;transition:none}
.sv-slide{flex-shrink:0;width:100%;height:100%;position:relative}
.sv-slide img{width:100%;height:100%;object-fit:cover;opacity:0.9}
.sv-slide-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark),var(--dark2));font-size:80px}
/* progress bars row */
#sv-bars{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;gap:3px;padding:10px 10px 0}
.sv-bar{flex:1;height:2.5px;border-radius:2px;background:rgba(255,255,255,0.3);overflow:hidden}
.sv-bar-fill{height:100%;background:rgba(255,255,255,0.9);width:0;border-radius:2px}
.sv-bar-fill.done{width:100%}
.sv-bar-fill.active{animation:svBarAnim 5s linear forwards}
@keyframes svBarAnim{from{width:0}to{width:100%}}
/* header */
#sv-head{position:absolute;top:18px;left:0;right:0;padding:0 12px;display:flex;align-items:center;gap:10px;z-index:9}
#sv-head img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,0.6);flex-shrink:0}
.sv-hname{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:#fff}
.sv-hsub{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:1px}
#sv-close-btn{background:none;border:none;color:rgba(255,255,255,0.75);font-size:24px;margin-left:auto;line-height:1;padding:4px;flex-shrink:0}
/* tap zones */
#sv-tap-left{position:absolute;top:0;left:0;width:38%;height:100%;z-index:8;cursor:pointer}
#sv-tap-right{position:absolute;top:0;right:0;width:38%;height:100%;z-index:8;cursor:pointer}
/* bottom info */
#sv-bot{position:absolute;bottom:0;left:0;right:0;padding:80px 20px 48px;text-align:center;background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);pointer-events:none;z-index:7}
.sv-bot-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--gold-light);margin-bottom:4px}
.sv-bot-meta{font-size:10px;color:rgba(201,168,76,0.5);letter-spacing:2px;text-transform:uppercase}
/* slide-in/out transitions */
#sv-slides.sv-going-right{animation:svSlideRight 0.28s cubic-bezier(0.4,0,0.2,1) forwards}
#sv-slides.sv-going-left{animation:svSlideLeft 0.28s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes svSlideRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes svSlideLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}

/* VIDEO MODAL */
#vid-modal{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:700;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;max-width:480px;margin:0 auto}
#vid-modal iframe{width:100%;max-width:480px;height:65vh;border:none;border-radius:12px;background:#000}
#vid-close-btn{position:absolute;top:16px;right:16px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:var(--gold-light);font-size:20px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}

// ─── IMAGE COMPRESSION ───────────────────────────────────────
// Smart compress: keeps full resolution up to MAX_PX on longest side,
// then encodes at high quality. Only kicks in if file is large.
var MAX_PX = 2048;      // max dimension — enough for any phone screen
var MAX_MB = 4;         // compress if original exceeds this
var QUALITY = 0.92;     // JPEG quality — visually lossless on mobile

function compressImage(file){
  return new Promise(function(resolve){
    // Skip compression for small files — send as-is
    if(file.size <= MAX_MB * 1024 * 1024){resolve(file);return;}

    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var W = img.naturalWidth, H = img.naturalHeight;
        var scale = 1;

        // Only downscale if the image is larger than MAX_PX on longest side
        if(W > MAX_PX || H > MAX_PX){
          scale = Math.min(MAX_PX / W, MAX_PX / H);
        }

        var cw = Math.round(W * scale);
        var ch = Math.round(H * scale);

        var canvas = document.createElement("canvas");
        canvas.width = cw;
        canvas.height = ch;
        var ctx = canvas.getContext("2d");

        // Smooth scaling for downscaling
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0, cw, ch);

        canvas.toBlob(function(blob){
          if(!blob){resolve(file);return;}
          // If compression made it larger somehow, use original
          if(blob.size >= file.size){resolve(file);return;}
          // Return as a File with same name
          var compressed = new File([blob], file.name, {type:"image/jpeg",lastModified:Date.now()});
          console.log("Compressed: "+Math.round(file.size/1024)+"KB → "+Math.round(blob.size/1024)+"KB ("+Math.round(blob.size/file.size*100)+"%)");
          resolve(compressed);
        }, "image/jpeg", QUALITY);
      };
      img.onerror = function(){resolve(file);};
      img.src = e.target.result;
    };
    reader.onerror = function(){resolve(file);};
    reader.readAsDataURL(file);
  });
}

// ─── CLOUDINARY UPLOAD ───────────────────────────────────────
function cloudUpload(file, isVideo, onProgress){
  // For images: compress first, then upload
  var prepareFile = isVideo ? Promise.resolve(file) : compressImage(file);

  return prepareFile.then(function(readyFile){
    return new Promise(function(resolve,reject){
      var type = isVideo ? "video" : "image";
      var url = "https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/"+type+"/upload";
      var fd = new FormData();
      fd.append("file", readyFile);
      fd.append("upload_preset", UPLOAD_PRESET);
      var xhr = new XMLHttpRequest();
      xhr.open("POST", url);
      xhr.upload.onprogress = function(e){
        if(e.lengthComputable && onProgress)onProgress(Math.round(e.loaded/e.total*100));
      };
      xhr.onload = function(){
        if(xhr.status===200){
          try{resolve(JSON.parse(xhr.responseText));}
          catch(e){reject(e);}
        } else {reject(new Error("Upload failed: "+xhr.status));}
      };
      xhr.onerror = function(){reject(new Error("Network error"));};
      xhr.send(fd);
    });
  });
}

function extractVideoThumb(file){
  return new Promise(function(resolve){
    var video = document.createElement("video");
    video.preload = "metadata";
    var url = URL.createObjectURL(file);
    video.src = url;
    video.muted = true;
    video.playsInline = true;
    video.currentTime = 1;
    video.onseeked = function(){
      var canvas = document.createElement("canvas");
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 360;
      canvas.getContext("2d").drawImage(video,0,0,canvas.width,canvas.height);
      canvas.toBlob(function(blob){URL.revokeObjectURL(url);resolve(blob);}, "image/jpeg", 0.8);
    };
    video.onerror = function(){URL.revokeObjectURL(url);resolve(null);};
  });
}

function tgLike(id, collection){
  var wasLiked = USER_LIKES[id];
  USER_LIKES[id] = !wasLiked;
  LIKES[id] = Math.max(0,(LIKES[id]||0)+(wasLiked?-1:1));
  // Firestore update
  db.collection("likes").doc(id).set({count: firebase.firestore.FieldValue.increment(wasLiked?-1:1)},{merge:true}).catch(function(){});
  if(wasLiked){
    db.collection("ul_"+userId).doc(id).delete().catch(function(){});
  } else {
    db.collection("ul_"+userId).doc(id).set({liked:true}).catch(function(){});
  }
  // Re-render
  if(collection==="posts")renderFeed();
  else if(collection==="reels")renderReels();
  else if(collection==="guestWall")renderWall();
}

// ─── STORY VIEWER (Instagram-style) ──────────────────────────
var svIndex = 0;      // current story index
var svTimer = null;
var svPaused = false;
var svTouchStartX = 0;
var svTouchStartY = 0;
var svTouchStartTime = 0;
var svAllStories = []; // merged real + default stories

function buildSvStories(){
  if(STORIES.length>0){
    svAllStories = STORIES.map(function(s){return{label:s.label||"Story",imageUrl:s.imageUrl||"",emoji:s.emoji||"✨"};});
  } else {
    svAllStories = DEFAULT_STORIES.map(function(s){return{label:s.label,imageUrl:"",emoji:s.emoji};});
  }
}

function openStory(i){
  buildSvStories();
  svIndex = i;
  $id("sv-av").src = PROFILE.avatarUrl||"";
  $id("sv").style.display = "block";
  document.body.style.overflow = "hidden";
  svRender(false);
  svAttachTouch();
}

function openDefaultStory(label, emoji){
  buildSvStories();
  var idx = DEFAULT_STORIES.findIndex(function(s){return s.label===label;});
  svIndex = idx>=0 ? idx : 0;
  $id("sv-av").src = PROFILE.avatarUrl||"";
  $id("sv").style.display = "block";
  document.body.style.overflow = "hidden";
  svRender(false);
  svAttachTouch();
}

function svRender(animDir){
  // animDir: 0=none, 1=coming from right (going forward), -1=coming from left (going back)
  clearTimeout(svTimer);
  var stories = svAllStories;
  var s = stories[svIndex];
  if(!s){closeSV();return;}

  // Build progress bars
  var barsHtml = "";
  for(var i=0;i<stories.length;i++){
    var cls = i<svIndex?"done":i===svIndex?"active":"";
    barsHtml += '<div class="sv-bar"><div class="sv-bar-fill '+cls+'" id="svb-'+i+'"></div></div>';
  }
  $id("sv-bars").innerHTML = barsHtml;

  // Build slide content with animation
  var slideHtml = '<div class="sv-slide">';
  if(s.imageUrl){
    slideHtml += '<img src="'+es(s.imageUrl)+'" onerror="this.style.display=\'none\'"/>';
  } else {
    slideHtml += '<div class="sv-slide-emoji">'+s.emoji+'</div>';
  }
  slideHtml += '</div>';

  var slidesEl = $id("sv-slides");
  slidesEl.innerHTML = slideHtml;

  // Animate entrance
  if(animDir===1){
    // Coming from right: slide in from right
    slidesEl.style.transform = "translateX(100%)";
    slidesEl.style.transition = "none";
    slidesEl.offsetHeight; // force reflow
    slidesEl.style.transition = "transform 0.28s cubic-bezier(0.4,0,0.2,1)";
    slidesEl.style.transform = "translateX(0)";
  } else if(animDir===-1){
    // Coming from left: slide in from left
    slidesEl.style.transform = "translateX(-100%)";
    slidesEl.style.transition = "none";
    slidesEl.offsetHeight;
    slidesEl.style.transition = "transform 0.28s cubic-bezier(0.4,0,0.2,1)";
    slidesEl.style.transform = "translateX(0)";
  } else {
    slidesEl.style.transform = "translateX(0)";
    slidesEl.style.transition = "none";
  }

  // Header info
  $id("sv-label-sub").textContent = s.label;
  $id("sv-bot-label").textContent = s.label;

  // Auto-advance after 5s
  svTimer = setTimeout(function(){svNav(1);}, 5000);
}

function svNav(dir){
  var stories = svAllStories;
  var next = svIndex + dir;
  if(next < 0){closeSV();return;}
  if(next >= stories.length){closeSV();return;}
  svIndex = next;
  svRender(dir); // pass direction for animation
}

function closeSV(){
  clearTimeout(svTimer);
  $id("sv").style.display = "none";
  document.body.style.overflow = "";
  svDetachTouch();
}

// Touch handling for swipe & hold-to-pause
function svAttachTouch(){
  var el = $id("sv");
  el.addEventListener("touchstart", svTouchStart, {passive:true});
  el.addEventListener("touchend", svTouchEnd, {passive:true});
  el.addEventListener("touchmove", svTouchMove, {passive:true});
  el.addEventListener("mousedown", svMouseDown);
  el.addEventListener("mouseup", svMouseUp);
}
function svDetachTouch(){
  var el = $id("sv");
  el.removeEventListener("touchstart", svTouchStart);
  el.removeEventListener("touchend", svTouchEnd);
  el.removeEventListener("touchmove", svTouchMove);
  el.removeEventListener("mousedown", svMouseDown);
  el.removeEventListener("mouseup", svMouseUp);
}

function svTouchStart(e){
  svTouchStartX = e.touches[0].clientX;
  svTouchStartY = e.touches[0].clientY;
  svTouchStartTime = Date.now();
  // Hold to pause
  svPaused = true;
  clearTimeout(svTimer);
  var fill = document.querySelector("#sv-bars .sv-bar-fill.active");
  if(fill) fill.style.animationPlayState = "paused";
}
function svTouchMove(e){
  // keep paused during hold
}
function svTouchEnd(e){
  var dx = e.changedTouches[0].clientX - svTouchStartX;
  var dy = e.changedTouches[0].clientY - svTouchStartY;
  var dt = Date.now() - svTouchStartTime;
  svPaused = false;

  // Resume bar animation
  var fill = document.querySelector("#sv-bars .sv-bar-fill.active");
  if(fill) fill.style.animationPlayState = "running";

  // Detect horizontal swipe (more horizontal than vertical, > 40px, fast)
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40 && dt < 400){
    if(dx < 0){
      // Swipe left → next story
      svNav(1);
    } else {
      // Swipe right → previous story
      svNav(-1);
    }
    return;
  }
  // Short tap (no swipe): tap zones handle nav, so resume timer
  if(dt < 350 && Math.abs(dx) < 10 && Math.abs(dy) < 10){
    // Nav handled by tap zone divs
    return;
  }
  // Long hold released: resume
  svTimer = setTimeout(function(){svNav(1);}, 5000 - (Date.now() - svTouchStartTime));
}

function svMouseDown(e){
  // Only for tap-zone clicks, hold to pause on desktop
  if(e.target.id === "sv-tap-left" || e.target.id === "sv-tap-right") return;
  svPaused = true;
  clearTimeout(svTimer);
  var fill = document.querySelector("#sv-bars .sv-bar-fill.active");
  if(fill) fill.style.animationPlayState = "paused";
}
function svMouseUp(){
  if(!svPaused) return;
  svPaused = false;
  var fill = document.querySelector("#sv-bars .sv-bar-fill.active");
  if(fill) fill.style.animationPlayState = "running";
  svTimer = setTimeout(function(){svNav(1);}, 3000);
}

var carouselIdx = {};
var postRatios = {}; // cached ratio class per post id

function getRatioClass(w, h){
  var r = w / h;
  if(r > 1.2) return "ratio-landscape";   // wider than tall → landscape
  if(r < 0.9) return "ratio-portrait";    // taller than wide → portrait
  return "ratio-square";                  // roughly square
}

function detectAndApplyRatio(postId, imgUrl){
  // Already detected
  if(postRatios[postId] && postRatios[postId] !== "ratio-loading") return;
  postRatios[postId] = "ratio-loading";
  var img = new Image();
  img.onload = function(){
    var cls = getRatioClass(img.naturalWidth, img.naturalHeight);
    postRatios[postId] = cls;
    // Apply to the rendered wrap if it exists
    var wrap = document.querySelector("#pc-"+postId+" .post-img-wrap");
    if(wrap){
      wrap.classList.remove("ratio-loading","ratio-square","ratio-portrait","ratio-landscape");
      wrap.classList.add(cls);
    }
  };
  img.onerror = function(){
    postRatios[postId] = "ratio-square";
  };
  img.src = imgUrl;
}

function dtapWall(id){
  if(!USER_LIKES[id]) tgWallLike(id);
  var el = $id("whrt-"+id);
  if(el){el.innerHTML='<div class="heart-anim">❤️</div>';setTimeout(function(){if(el)el.innerHTML="";},900);}
}

function tgWallLike(id){
  var wasLiked = USER_LIKES[id];
  USER_LIKES[id] = !wasLiked;
  LIKES[id] = Math.max(0,(LIKES[id]||0)+(wasLiked?-1:1));
  db.collection("likes").doc(id).set({count:firebase.firestore.FieldValue.increment(wasLiked?-1:1)},{merge:true}).catch(function(){});
  if(wasLiked){db.collection("ul_"+userId).doc(id).delete().catch(function(){});}
  else{db.collection("ul_"+userId).doc(id).set({liked:true}).catch(function(){});}
  renderWall();
}

var wallFile = null;
var wallPreUpload = { url:"", done:false, error:false };

function previewWall(input){
  wallFile = input.files[0];
  if(!wallFile) return;
  wallPreUpload = { url:"", done:false, error:false };
  // Show local preview
  var reader = new FileReader();
  reader.onload = function(e){
    $id("wup-preview").innerHTML = '<img class="preview-img" src="'+e.target.result+'"/>';
  };
  reader.readAsDataURL(wallFile);
  // Show progress & start background upload
  var wrap = $id("wup-prog-wrap"); if(wrap) wrap.style.display = "block";
  var txt = $id("wup-zone-txt"); if(txt) txt.innerHTML = "<strong>Photo selected</strong><br>Uploading in background...";
  cloudUpload(wallFile, false, function(pct){
    var fill = $id("wup-prog-fill"); if(fill) fill.style.width = pct + "%";
  }).then(function(res){
    wallPreUpload.url = res.secure_url;
    wallPreUpload.done = true;
    var fill = $id("wup-prog-fill"); if(fill) fill.style.width = "100%";
    var txt2 = $id("wup-zone-txt"); if(txt2) txt2.innerHTML = "<strong>✓ Ready to share</strong>";
  }).catch(function(){
    wallPreUpload.error = true;
    var txt2 = $id("wup-zone-txt"); if(txt2) txt2.innerHTML = "<strong style='color:var(--error)'>Upload failed</strong><br>Tap to try again";
    var fill = $id("wup-prog-fill"); if(fill){ fill.style.width="100%"; fill.style.background="var(--error)"; }
  });
}

function submitWall(){
  var name = ($id("wname")||{}).value || "Guest";
  var msg = ($id("wmsg")||{}).value || "";
  if(!wallFile){ toast("Please choose a photo"); return; }
  var btn = $id("wup-btn");
  if(wallPreUpload.error){ toast("Upload failed. Please reselect the photo."); return; }
  if(!wallPreUpload.done){
    if(btn){ btn.disabled=true; btn.textContent="Uploading..."; }
    var poll = setInterval(function(){
      if(wallPreUpload.done){ clearInterval(poll); doSaveWall(name, msg, btn); }
      if(wallPreUpload.error){ clearInterval(poll); toast("Upload failed."); if(btn){btn.disabled=false;btn.textContent="Share Memory";} }
    }, 300);
    return;
  }
  doSaveWall(name, msg, btn);
}

function doSaveWall(name, msg, btn){
  if(btn){ btn.disabled=true; btn.textContent="Sharing..."; }
  db.collection("guestWall").add({
    guestName: name, message: msg, imageUrl: wallPreUpload.url,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    closeModal(); wallFile=null; toast("Shared! 🌸"); fetchWall();
  }).catch(function(){
    toast("Failed. Try again."); if(btn){ btn.disabled=false; btn.textContent="Share Memory"; }
  });
}

var cmtListener = null;
function openComments(postId, collection){
  var h = buildSheet("Comments",
    '<div class="clist" id="clist"><div class="cempty">Loading...</div></div>'
    +'<div class="c-input-area">'
    +'<input class="c-name-input" id="cn" placeholder="Your name (optional)"/>'
    +'<div class="c-input-row">'
    +'<input class="c-text-input" id="ct" placeholder="Write a comment..." onkeydown="if(event.key===\'Enter\')addComment(\''+postId+'\',\''+collection+'\')"/>'
    +'<button class="c-send-btn" onclick="addComment(\''+postId+'\',\''+collection+'\')">Post</button>'
    +'</div></div>'
  );
  showModal(h);
  // Real-time listener for comments
  if(cmtListener)cmtListener();
  cmtListener = db.collection(collection).doc(postId).collection("comments")
    .orderBy("createdAt","asc").onSnapshot(function(snap){
      var cm = [];
      snap.forEach(function(d){cm.push({id:d.id,...d.data()});});
      COMMENTS_COUNT[postId] = cm.length;
      updateStats();
      var cl = $id("clist");
      if(!cl)return;
      if(!cm.length){cl.innerHTML='<div class="cempty">✨ Be the first to comment!</div>';return;}
      cl.innerHTML = cm.map(function(c){
        var ts = c.createdAt && c.createdAt.toMillis ? c.createdAt.toMillis() : Date.now();
        return '<div class="citem">'
          +'<div class="cavatar">'+es((c.name||"G")[0].toUpperCase())+'</div>'
          +'<div><div class="ctext"><strong>'+es(c.name||"Guest")+'</strong> '+es(c.text||"")+'</div>'
          +'<div class="ctime">'+ta(ts)+'</div></div>'
          +(isAdmin?'<button style="margin-left:auto;background:none;border:none;font-size:14px;color:var(--error);cursor:pointer" onclick="deleteComment(\''+collection+'\',\''+postId+'\',\''+c.id+'\')">×</button>':"")
          +'</div>';
      }).join("");
      cl.scrollTop = cl.scrollHeight;
    }, function(e){console.warn("cmt listener",e);});
}

function addComment(postId, collection){
  var nm = ($id("cn")||{}).value||"Guest";
  var tx = ($id("ct")||{}).value||"";
  if(!tx.trim())return;
  db.collection(collection).doc(postId).collection("comments").add({
    name:nm.trim(), text:tx.trim(),
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    var ct=$id("ct");if(ct)ct.value="";
  }).catch(function(){toast("Could not post comment");});
}

function deleteComment(collection, postId, cId){
  db.collection(collection).doc(postId).collection("comments").doc(cId).delete()
    .then(function(){toast("Deleted");}).catch(function(){});
}

function openPostUpload(){
  postFiles = [];

    '<div class="form-group"><label class="form-label">Caption</label>'

    +'<div class="upload-zone-icon">🖼️</div>'

    +'</div>'

    +'</div>'

  );

function previewPosts(input){
  postFiles = Array.from(input.files).slice(0,5);
  postPreUpload = { urls: [], done: false, error: false, progress: 0, total: postFiles.length };
  var prev = $id("pup-preview");
  if(!prev) return;
  prev.innerHTML = "";
  postFiles.forEach(function(f){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = document.createElement("img");
      img.className = "preview-img"; img.src = e.target.result;
      prev.appendChild(img);
    };
    reader.readAsDataURL(f);
  });
  // Show progress bar immediately
  var wrap = $id("pup-prog-wrap"); if(wrap) wrap.style.display = "block";
  var txt = $id("pup-zone-txt"); if(txt) txt.innerHTML = "<strong>"+postFiles.length+" photo"+(postFiles.length>1?"s":"")+" selected</strong><br>Uploading in background...";
  // Start background uploads
  bgUploadPosts(0);
}

function bgUploadPosts(i){
  if(i >= postFiles.length){
    postPreUpload.done = true;
    var fill = $id("pup-prog-fill"); if(fill) fill.style.width = "100%";
    var txt = $id("pup-zone-txt"); if(txt) txt.innerHTML = "<strong>✓ Ready to post</strong><br>"+postFiles.length+" photo"+(postFiles.length>1?"s":"")+" uploaded";
    return;
  }
  cloudUpload(postFiles[i], false, function(pct){
    var overall = ((i * 100) + pct) / postFiles.length;
    var fill = $id("pup-prog-fill"); if(fill) fill.style.width = overall + "%";
  }).then(function(res){
    postPreUpload.urls.push(res.secure_url);
    bgUploadPosts(i + 1);
  }).catch(function(){
    postPreUpload.error = true;
    var txt = $id("pup-zone-txt"); if(txt) txt.innerHTML = "<strong style='color:var(--error)'>Upload failed</strong><br>Tap to try again";
    var fill = $id("pup-prog-fill"); if(fill){ fill.style.width="100%"; fill.style.background="var(--error)"; }
  });
}

function submitPost(){
  if(!postFiles.length){ toast("Choose at least 1 photo"); return; }
  var cap = ($id("pcap")||{}).value || "";
  var btn = $id("pup-btn");
  if(postPreUpload.error){
    // Retry upload first
    if(btn){ btn.disabled=true; btn.textContent="Retrying upload..."; }
    postPreUpload = { urls:[], done:false, error:false, progress:0, total:postFiles.length };
    var fill=$id("pup-prog-fill"); if(fill){fill.style.width="0";fill.style.background="";}
    bgUploadPosts(0);
    // Poll until done
    var poll = setInterval(function(){
      if(postPreUpload.done){ clearInterval(poll); doSavePost(cap, btn); }
      if(postPreUpload.error){ clearInterval(poll); if(btn){btn.disabled=false;btn.textContent="Share Photos";} }
    }, 400);
    return;
  }
  if(!postPreUpload.done){
    // Still uploading — wait for it
    if(btn){ btn.disabled=true; btn.textContent="Uploading..."; }
    var poll = setInterval(function(){
      if(postPreUpload.done){ clearInterval(poll); doSavePost(cap, btn); }
      if(postPreUpload.error){ clearInterval(poll); toast("Upload failed. Try again."); if(btn){btn.disabled=false;btn.textContent="Share Photos";} }
    }, 300);
    return;
  }
  doSavePost(cap, btn);
}

function doSavePost(cap, btn){
  if(btn){ btn.disabled=true; btn.textContent="Posting..."; }
  db.collection("posts").add({
    images: postPreUpload.urls, caption: cap,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    closeModal(); postFiles=[]; toast("Posted! 🎉"); fetchPosts();
  }).catch(function(){
    toast("Failed to save"); if(btn){ btn.disabled=false; btn.textContent="Share Photos"; }
  });
}

function previewReel(input){
  reelFile = input.files[0]; if(!reelFile) return;
  reelPreUpload = { videoUrl:"", thumbUrl:"", done:false, error:false };
  $id("rup-icon").textContent = "🎬";
  $id("rup-txt").innerHTML = "<strong>"+es(reelFile.name)+"</strong><br>Uploading in background...";
  var wrap = $id("rup-prog-wrap"); if(wrap) wrap.style.display = "block";
  // Background upload: thumb + video simultaneously
  var thumbDone = false, videoDone = false, thumbUrl = "", videoUrl = "";
  function checkBothDone(){
    if(thumbDone && videoDone){
      reelPreUpload.videoUrl = videoUrl;
      reelPreUpload.thumbUrl = thumbUrl;
      reelPreUpload.done = true;
      var fill = $id("rup-prog-fill"); if(fill) fill.style.width = "100%";
      $id("rup-txt").innerHTML = "<strong>✓ Ready to post</strong><br>"+es(reelFile.name);
    }
  }
  // Upload video in background
  cloudUpload(reelFile, true, function(pct){
    var fill = $id("rup-prog-fill"); if(fill) fill.style.width = (pct * 0.85) + "%";
  }).then(function(res){
    videoUrl = res.secure_url; videoDone = true; checkBothDone();
  }).catch(function(){
    reelPreUpload.error = true;
    $id("rup-txt").innerHTML = "<strong style='color:var(--error)'>Upload failed</strong><br>Tap to try again";
    var fill = $id("rup-prog-fill"); if(fill){ fill.style.width="100%"; fill.style.background="var(--error)"; }
  });
  // Extract and upload thumbnail in background
  extractVideoThumb(reelFile).then(function(blob){
    if(!blob){ thumbDone = true; checkBothDone(); return; }
    return cloudUpload(blob, false, null).then(function(tRes){
      thumbUrl = tRes.secure_url; thumbDone = true; checkBothDone();
    }).catch(function(){ thumbDone = true; checkBothDone(); });
  }).catch(function(){ thumbDone = true; checkBothDone(); });
}

function submitReel(){
  if(!reelFile){ toast("Choose a video"); return; }
  var cap = ($id("rcap")||{}).value || "";
  var song = ($id("rsong")||{}).value || "";
  var btn = $id("rup-btn");
  if(reelPreUpload.error){
    toast("Upload failed. Please reselect the video."); return;
  }
  if(!reelPreUpload.done){
    if(btn){ btn.disabled=true; btn.textContent="Uploading..."; }
    var poll = setInterval(function(){
      if(reelPreUpload.done){ clearInterval(poll); doSaveReel(cap, song, btn); }
      if(reelPreUpload.error){ clearInterval(poll); toast("Upload failed."); if(btn){btn.disabled=false;btn.textContent="Upload Reel";} }
    }, 300);
    return;
  }
  doSaveReel(cap, song, btn);
}

function doSaveReel(cap, song, btn){
  if(btn){ btn.disabled=true; btn.textContent="Posting..."; }
  db.collection("reels").add({
    videoUrl: reelPreUpload.videoUrl, thumbUrl: reelPreUpload.thumbUrl,
    caption: cap, song: song,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    closeModal(); reelFile=null; toast("Reel uploaded! 🎬"); fetchReels();
  }).catch(function(){
    toast("Failed to save"); if(btn){ btn.disabled=false; btn.textContent="Upload Reel"; }
  });
}

// ─── STORY UPLOAD ────────────────────────────────────────────
var storyFile=null;
function openStoryUpload(){
  storyFile=null;
  var h=buildSheet("Add Story",
    '<div class="form-group"><label class="form-label">Label</label>'
    +'<input class="form-input" id="slabel" placeholder="e.g. Ceremony, Reception..."/></div>'
    +'<div class="form-group"><label class="form-label">Photo</label>'
    +'<div class="upload-zone" onclick="$id(\'sup-file\').click()">'
    +'<input type="file" id="sup-file" accept="image/*" style="display:none" onchange="previewStory(this)"/>'
    +'<div class="upload-zone-icon">📖</div>'
    +'<div class="upload-zone-text"><strong>Tap to choose photo</strong></div>'
    +'</div><div class="preview-grid" id="sup-preview"></div>'
    +'<div class="progress-bar-wrap" id="sup-prog-wrap"><div class="progress-bar-fill" id="sup-prog-fill"></div></div>'
    +'</div>'
    +'<button class="btn-primary" onclick="submitStory()">Add Story</button>'
  );
  showModal(h);
}
function previewStory(input){
  storyFile=input.files[0];if(!storyFile)return;
  var r=new FileReader();r.onload=function(e){$id("sup-preview").innerHTML='<img class="preview-img" src="'+e.target.result+'"/>';};r.readAsDataURL(storyFile);
}
function submitStory(){
  var label=($id("slabel")||{}).value||"Story";
  if(!storyFile){toast("Choose a photo");return;}
  var btn=document.querySelector(".btn-primary");if(btn){btn.disabled=true;btn.textContent="Uploading...";}
  var wrap=$id("sup-prog-wrap");if(wrap)wrap.style.display="block";
  cloudUpload(storyFile,false,function(pct){
    var fill=$id("sup-prog-fill");if(fill)fill.style.width=pct+"%";
  })
    .then(function(res){return db.collection("stories").add({label:label,imageUrl:res.secure_url,createdAt:firebase.firestore.FieldValue.serverTimestamp()});})
    .then(function(){closeModal();storyFile=null;toast("Story added! ✨");fetchStories();})
    .catch(function(){toast("Upload failed");if(btn){btn.disabled=false;btn.textContent="Add Story";}});
}

// ─── EDIT PROFILE ────────────────────────────────────────────
function openEditProfile(){
  var h=buildSheet("Edit Profile",
    '<div class="form-group"><label class="form-label">Bio</label>'
    +'<textarea class="form-input" id="ebio" rows="3" placeholder="Wedding bio...">'+es(PROFILE.bio||"")+'</textarea></div>'
    +'<div class="form-group"><label class="form-label">Date</label>'
    +'<input class="form-input" id="edate" value="'+es(PROFILE.date||COUPLE.date)+'"/></div>'
    +'<div class="form-group"><label class="form-label">Location</label>'
    +'<input class="form-input" id="eloc" value="'+es(PROFILE.location||COUPLE.location)+'"/></div>'
    +'<div class="form-group"><label class="form-label">Photographer</label>'
    +'<input class="form-input" id="ephoto" value="'+es(PROFILE.photographer||COUPLE.photographer)+'"/></div>'
    +'<button class="btn-primary" onclick="saveProfile()">Save Changes</button>'
  );
  showModal(h);
}
function saveProfile(){
  var data={
    bio:($id("ebio")||{}).value||"",
    date:($id("edate")||{}).value||COUPLE.date,
    location:($id("eloc")||{}).value||COUPLE.location,
    photographer:($id("ephoto")||{}).value||COUPLE.photographer
  };
  if(PROFILE.avatarUrl)data.avatarUrl=PROFILE.avatarUrl;
  db.collection("config").doc("profile").set(data,{merge:true})
    .then(function(){PROFILE={...PROFILE,...data};updateProfileUI();closeModal();toast("Profile updated ✓");})
    .catch(function(){toast("Save failed");});
}

// ─── DELETE ───────────────────────────────────────────────────
function deletePost(id){
  if(!confirm("Delete this post?"))return;
  db.collection("posts").doc(id).delete().then(function(){toast("Deleted");fetchPosts();}).catch(function(){toast("Failed");});
}
function deleteReel(id){
  if(!confirm("Delete this reel?"))return;
  db.collection("reels").doc(id).delete().then(function(){toast("Deleted");fetchReels();}).catch(function(){toast("Failed");});
}
function deleteWall(id){
  if(!confirm("Delete this wall post?"))return;
  db.collection("guestWall").doc(id).delete().then(function(){toast("Deleted");fetchWall();}).catch(function(){toast("Failed");});
}

// ─── SHARE ────────────────────────────────────────────────────
function shareAlbum(){
  var data={url:window.location.href,title:"Murshid & Shibila — Wedding Album"};
  if(navigator.share){navigator.share(data);}
  else{try{navigator.clipboard.writeText(window.location.href);}catch(e){}toast("Link copied! Share on WhatsApp 📱");}
}

// ─── MODAL HELPERS ────────────────────────────────────────────
function buildSheet(title, body){
  return '<div class="overlay" id="overlay-bg" onclick="overlayBgClose(event)">'
    +'<div class="sheet">'
    +'<div class="sheet-handle"><div class="sheet-handle-bar"></div></div>'
    +'<div class="sheet-header">'
    +'<span class="sheet-header-title">'+title+'</span>'
    +'<button class="sheet-close" onclick="closeModal()">✕</button>'
    +'</div>'
    +'<div class="sheet-body">'+body+'</div>'
    +'</div></div>';
}
function showModal(h){
  if(cmtListener&&!h.includes("clist")){cmtListener();cmtListener=null;}
  $id("modal-root").innerHTML=h;
}
function closeModal(){
  if(cmtListener){cmtListener();cmtListener=null;}
  $id("modal-root").innerHTML="";
}
function overlayBgClose(e){if(e.target.id==="overlay-bg")closeModal();}

// ─── BOOT ─────────────────────────────────────────────────────
function boot(){
  // Load independently
  fetchPosts();
  fetchReels();
  fetchStories();
  fetchWall();
  loadProfile();
  // Load likes after a delay
  setTimeout(loadLikes, 1500);
  // Show app
  setTimeout(function(){
    $id("loading-screen").style.display="none";
    $id("app").style.display="block";
    if(isAdmin){$id("fab").style.display="flex";}
    renderFeed();
    renderProfile();
  }, 1200);
}

boot();
</script>
