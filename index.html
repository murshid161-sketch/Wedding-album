<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Wedding Album</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#fafafa;overflow-x:hidden}
::-webkit-scrollbar{display:none}
button{cursor:pointer;font-family:'Inter',sans-serif}
input,textarea{font-family:'Inter',sans-serif}
img{display:block}
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);border-top:1px solid #efefef;display:flex;z-index:100}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 14px;opacity:0.4;transition:opacity 0.2s}
.nav-btn.active{opacity:1}
.nav-btn .ni{font-size:22px}
.nav-btn .nl{font-size:9px;font-weight:700;color:#333;letter-spacing:0.3px}
.page{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:#fafafa;padding-bottom:70px}
.page.active{display:block}
.top-bar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.96);backdrop-filter:blur(14px);border-bottom:1px solid #efefef;display:flex;align-items:center;justify-content:space-between;padding:11px 16px}
.top-bar-title{font-family:'Palatino Linotype',Georgia,serif;font-size:21px;font-style:italic;color:#1a0505}
.plus-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #262626;background:none;font-size:20px;display:flex;align-items:center;justify-content:center;color:#262626}
.avatar-btn{background:none;border:none;padding:0}
.avatar-btn img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #c9915a}
#stories-row{background:#fff;border-bottom:1px solid #efefef;padding:10px 0}
#stories-scroll{display:flex;gap:14px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.story-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2.5px}
.story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2.5px solid #fff}
.story-label{font-size:9.5px;color:#444;max-width:62px;text-align:center;line-height:1.2}
.post-card{background:#fff;border-bottom:8px solid #f0f0f0}
.post-header{display:flex;align-items:center;gap:10px;padding:10px 14px}
.post-avatar{width:36px;height:36px;border-radius:50%;border:2px solid #c9915a;overflow:hidden;flex-shrink:0}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-meta-name{font-weight:600;font-size:13px}
.post-meta-time{font-size:11px;color:#999}
.reel-badge{font-size:11px;background:#f0f0f0;border-radius:10px;padding:3px 8px;color:#666}
.post-img-wrap{position:relative;user-select:none;-webkit-user-select:none}
.post-img-wrap img{width:100%;aspect-ratio:1;object-fit:cover}
.carousel-prev,.carousel-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.85);border:none;border-radius:50%;width:28px;height:28px;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:2}
.carousel-prev{left:8px}
.carousel-next{right:8px}
.carousel-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);border-radius:12px;padding:2px 9px;font-size:11px;color:#fff;font-weight:600}
.carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.dot{height:6px;border-radius:3px;transition:all 0.25s}
.dot.on{width:18px;background:#fff}
.dot.off{width:6px;background:rgba(255,255,255,0.55)}
.heart-anim{position:absolute;top:50%;left:50%;font-size:86px;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop 0.9s ease forwards}
.reel-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-play-btn{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,0.18);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:22px;padding-left:4px}
.post-actions{padding:10px 14px 12px}
.action-row{display:flex;gap:14px;align-items:center;margin-bottom:8px}
.action-btn{background:none;border:none;font-size:26px;line-height:1;transition:transform 0.15s}
.action-btn:active{transform:scale(0.85)}
.like-count{font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:4px}
.post-caption{font-size:13px;line-height:1.55;margin-bottom:3px}
.view-cmts{background:none;border:none;padding:0;font-size:12px;color:#999;margin-top:2px;display:block}
.last-cmt{font-size:12px;color:#555;margin-top:4px}
.post-time{font-size:10px;color:#c0c0c0;margin-top:4px;text-transform:uppercase}
.song-tag{padding:6px 14px 0;font-size:11px;color:#555;font-style:italic}
#reels-page{background:#000}
#reels-topbar{position:sticky;top:0;z-index:10;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between}
#reels-topbar span{color:#fff;font-weight:700;font-size:18px}
#reels-topbar button{background:none;border:none;color:#fff;font-size:26px}
.reel-card{position:relative;height:88vh;background:#111;margin-bottom:3px;overflow:hidden}
.reel-card img{width:100%;height:100%;object-fit:cover;opacity:0.82}
.reel-center-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.reel-center-btn{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,0.14);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;padding-left:4px}
.reel-right-actions{position:absolute;right:12px;bottom:130px;display:flex;flex-direction:column;gap:22px;align-items:center}
.reel-action{display:flex;flex-direction:column;align-items:center;gap:3px}
.reel-action button{background:none;border:none;font-size:30px;line-height:1;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.6))}
.reel-action span{color:#fff;font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.7)}
.reel-bottom{position:absolute;bottom:0;left:0;right:65px;padding:60px 14px 22px;background:linear-gradient(to top,rgba(0,0,0,0.72),transparent);pointer-events:none}
.reel-uname{font-weight:700;font-size:13px;color:#fff;margin-bottom:5px}
.reel-cap{font-size:13px;color:rgba(255,255,255,0.9);line-height:1.5;margin-bottom:6px}
.reel-song{font-size:11px;color:rgba(255,255,255,0.55);display:flex;align-items:center;gap:5px}
.spin{animation:spin 4s linear infinite;display:inline-block}
.profile-topbar{padding:13px 16px;border-bottom:1px solid #efefef;display:flex;align-items:center;justify-content:space-between}
.profile-topbar span{font-family:'Palatino Linotype',serif;font-size:19px;font-style:italic}
.profile-topbar button{background:none;border:none;font-size:22px}
.profile-header{padding:20px 16px 14px}
.profile-row{display:flex;align-items:center;gap:22px;margin-bottom:16px}
.pav-ring{width:88px;height:88px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#b5534a,#c9915a,#e08040);flex-shrink:0}
.pav-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid #fff}
.profile-stats{display:flex;flex:1;justify-content:space-around}
.stat-val{font-weight:700;font-size:18px;color:#1a1a1a}
.stat-label{font-size:11px;color:#888;text-align:center}
.pname{font-family:'Palatino Linotype',serif;font-style:italic;font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.pbio{font-size:13px;color:#555;line-height:1.65;margin-bottom:3px}
.pmeta{font-size:12px;color:#888;margin-top:2px}
.pbtns{display:flex;gap:8px;margin-top:14px}
.pbtns button{flex:1;padding:8px;background:#f0f0f0;border:1px solid #dbdbdb;border-radius:8px;font-weight:600;font-size:13px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;border-top:1px solid #efefef}
.pgrid-item{aspect-ratio:1;overflow:hidden;background:#f0ece6}
.pgrid-item img{width:100%;height:100%;object-fit:cover}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;max-height:90vh;overflow-y:auto;animation:slideUp 0.28s ease}
.mhandle{display:flex;justify-content:center;padding:10px 0 4px}
.mhandle-bar{width:38px;height:4px;border-radius:2px;background:#e0e0e0}
.mheader{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 14px;border-bottom:1px solid #f0f0f0}
.mheader button{background:none;border:none;font-size:15px;color:#555;font-weight:500}
.mheader span{font-weight:700;font-size:15px}
.mbody{padding:20px 18px 40px}
.uoption{width:100%;display:flex;align-items:center;gap:16px;padding:16px;background:#fafafa;border:1px solid #efefef;border-radius:14px;cursor:pointer;margin-bottom:12px;text-align:left}
.uoption-icon{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#5c1e12,#c9915a);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.uoption-title{font-weight:700;font-size:15px;margin-bottom:3px}
.uoption-desc{font-size:12px;color:#888;line-height:1.4}
.flabel{font-size:11px;font-weight:600;color:#888;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;display:block}
.finput{width:100%;border:1px solid #dbdbdb;border-radius:10px;padding:11px 13px;font-size:13px;outline:none;margin-bottom:14px}
.finput:focus{border-color:#c9915a}
.hint-box{font-size:12px;color:#888;margin-bottom:14px;line-height:1.7;background:#f8f8f8;border-radius:10px;padding:12px 14px}
.add-photo-btn{width:100%;padding:10px;background:none;border:1.5px dashed #dbdbdb;border-radius:10px;font-size:13px;color:#999;margin-bottom:14px}
.sbtn{width:100%;padding:13px;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px}
.sbtn.post{background:linear-gradient(135deg,#5c1e12,#c9915a)}
.sbtn.reel{background:linear-gradient(135deg,#0d0d0d,#3a3a3a)}
.link-row{display:flex;gap:8px;margin-bottom:10px}
.link-row input{flex:1;border:1px solid #dbdbdb;border-radius:10px;padding:11px 13px;font-size:13px;outline:none}
.link-remove{background:none;border:1px solid #dbdbdb;border-radius:10px;padding:0 12px;font-size:18px;color:#999}
.preview-img{margin-bottom:16px;border-radius:10px;overflow:hidden;aspect-ratio:1;background:#f0f0f0;max-height:260px}
.preview-img img{width:100%;height:100%;object-fit:cover}
.clist{flex:1;overflow-y:auto;padding:12px 16px}
.citem{display:flex;gap:10px;margin-bottom:16px}
.cavatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#b5534a,#c9915a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.ctext{font-size:13px;color:#333}
.ctime{font-size:10px;color:#bbb;margin-top:3px}
.cempty{text-align:center;padding:36px 0;color:#ccc}
.cinput-area{padding:10px 14px 22px;border-top:1px solid #f5f5f5;background:#fafafa}
.cinput-area input{width:100%;border:1px solid #efefef;border-radius:20px;padding:8px 14px;font-size:13px;outline:none;margin-bottom:8px;background:#fff}
.csend-row{display:flex;gap:8px}
.csend-row input{flex:1;border:1px solid #efefef;border-radius:20px;padding:10px 14px;font-size:13px;outline:none;background:#fff}
.csend-btn{border:none;border-radius:20px;padding:0 18px;color:#fff;font-weight:700;font-size:13px;background:#3897f0}
.csend-btn:disabled{background:#c0dcf7;cursor:default}
#story-viewer{position:fixed;inset:0;background:#000;z-index:300;display:none}
#story-viewer img.sbg{width:100%;height:100%;object-fit:cover;opacity:0.88}
#story-prog{position:absolute;top:0;left:0;right:0;height:3px}
#story-top{position:absolute;top:14px;left:16px;display:flex;align-items:center;gap:10px}
#story-top img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #fff}
.sname{color:#fff;font-weight:600;font-size:13px}
.ssubl{color:rgba(255,255,255,0.6);font-size:11px}
#story-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#fff;font-size:28px;z-index:10}
#story-bot{position:absolute;bottom:60px;left:20px;right:20px}
.shead{font-family:'Palatino Linotype',serif;font-size:20px;font-style:italic;color:#fff;margin-bottom:4px}
.sdate{font-size:12px;color:rgba(255,255,255,0.6)}
@keyframes heartPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}15%{transform:translate(-50%,-50%) scale(1.4)}80%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="page active" id="home-page">
  <div class="top-bar">
    <button class="plus-btn" onclick="openUpload()">+</button>
    <span class="top-bar-title" id="home-title">Priya &amp; Rahul</span>
    <button class="avatar-btn" onclick="goTo('profile')"><img id="top-avatar" src="https://images.unsplash.com/photo-1606800052052-a08af7148866?w=200&q=80" alt=""/></button>
  </div>
  <div id="stories-row"><div id="stories-scroll"></div></div>
  <div id="feed"></div>
</div>

<div class="page" id="reels-page">
  <div id="reels-topbar"><span>Reels</span><button onclick="openUpload('reel')">+</button></div>
  <div id="reels-feed"></div>
</div>

<div class="page" id="profile-page">
  <div class="profile-topbar">
    <span id="profile-title">Priya &amp; Rahul</span>
    <button onclick="openUpload('profile')">✏️</button>
  </div>
  <div class="profile-header">
    <div class="profile-row">
      <div class="pav-ring"><img id="profile-avatar" src="https://images.unsplash.com/photo-1606800052052-a08af7148866?w=200&q=80" alt=""/></div>
      <div class="profile-stats">
        <div><div class="stat-val" id="stat-posts">0</div><div class="stat-label">Posts</div></div>
        <div><div class="stat-val" id="stat-likes">0</div><div class="stat-label">Likes</div></div>
        <div><div class="stat-val" id="stat-cmts">0</div><div class="stat-label">Comments</div></div>
      </div>
    </div>
    <div class="pname" id="pname">Priya &amp; Rahul</div>
    <div class="pbio" id="pbio">We said yes ✨ · Thrissur · 14.02.2025</div>
    <div class="pmeta" id="ploc">📍 Thrissur, Kerala</div>
    <div class="pmeta" id="pdate">💕 14 February 2025</div>
    <div class="pmeta" id="pphoto">📸 Lens &amp; Light Studio</div>
    <div class="pbtns">
      <button onclick="openUpload('profile')">Edit Profile</button>
      <button onclick="shareAlbum()">📤 Share Album</button>
    </div>
  </div>
  <div class="pgrid" id="photo-grid"></div>
</div>

<nav id="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goTo('home')"><span class="ni">🏠</span><span class="nl">Home</span></button>
  <button class="nav-btn" id="nav-reels" onclick="goTo('reels')"><span class="ni">▶️</span><span class="nl">Reels</span></button>
  <button class="nav-btn" id="nav-profile" onclick="goTo('profile')"><span class="ni">💑</span><span class="nl">Profile</span></button>
</nav>

<div id="modal-root"></div>

<div id="story-viewer">
  <img class="sbg" id="story-img" src="" alt=""/>
  <div id="story-prog"></div>
  <div id="story-top">
    <img id="story-av" src="" alt=""/>
    <div><div class="sname" id="story-couple"></div><div class="ssubl" id="story-subl"></div></div>
  </div>
  <button id="story-close" onclick="closeStory()">×</button>
  <div id="story-bot"><div class="shead" id="story-lbl"></div><div class="sdate" id="story-dt"></div></div>
</div>

<script>
// ── STATE
var ST={
  profile:ld('wg-profile')||{bride:'Priya',groom:'Rahul',date:'14 February 2025',location:'Thrissur, Kerala',photographer:'Lens & Light Studio',bio:'We said yes \u2728 \u00b7 Thrissur \u00b7 14.02.2025',avatarUrl:'https://images.unsplash.com/photo-1606800052052-a08af7148866?w=200&q=80'},
  posts:ld('wg-posts')||[
    {id:'dp1',type:'post',caption:'She woke up like this \ud83d\udcab #bridegoals #keralawedding',time:Date.now()-7200000,images:['https://images.unsplash.com/photo-1537633552985-df8429e8048b?w=800&q=85','https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=85','https://images.unsplash.com/photo-1591604466107-ec97de577aff?w=800&q=85']},
    {id:'dp2',type:'reel',caption:'The moment he first saw her \ud83e\udd79\u2764\ufe0f #firstlook',time:Date.now()-10800000,thumb:'https://images.unsplash.com/photo-1606800052052-a08af7148866?w=800&q=85',song:'Ival Ival \u2013 AR Rahman'},
    {id:'dp3',type:'post',caption:'Two families, one beautiful beginning \ud83c\udf3a #weddingday',time:Date.now()-14400000,images:['https://images.unsplash.com/photo-1606800052052-a08af7148866?w=800&q=85','https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=800&q=85','https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=800&q=85']},
    {id:'dp4',type:'reel',caption:"Amma's tears said everything \ud83e\udd79 #family",time:Date.now()-18000000,thumb:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=800&q=85',song:'Malare \u2013 Premam'},
    {id:'dp5',type:'post',caption:'The man of the day \ud83d\udd7a #groomsday',time:Date.now()-21600000,images:['https://images.unsplash.com/photo-1600091166971-7f9faad6c498?w=800&q=85','https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=85']},
    {id:'dp6',type:'reel',caption:'The flower shower \ud83c\udf3c\u2728 #ceremony',time:Date.now()-25200000,thumb:'https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=800&q=85',song:'Nenjodu Kalanthu \u2013 Vinnaithaandi'},
  ],
  likes:ld('wg-likes')||{},
  liked:ld('wg-liked')||{},
  comments:ld('wg-comments')||{},
  ci:{}
};

function ld(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function couple(){return es(ST.profile.bride)+' &amp; '+es(ST.profile.groom);}
function tago(ts){var s=Math.floor((Date.now()-ts)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function drid(url){if(!url)return null;var pp=[/\/file\/d\/([a-zA-Z0-9_-]{20,})/,/[?&]id=([a-zA-Z0-9_-]{20,})/,/\/d\/([a-zA-Z0-9_-]{20,})/];for(var i=0;i<pp.length;i++){var m=url.match(pp[i]);if(m)return m[1];}if(/^[a-zA-Z0-9_-]{20,}$/.test(url.trim()))return url.trim();return null;}
function dthumb(id,sz){return 'https://drive.google.com/thumbnail?id='+id+'&sz='+(sz||'w800');}

// ── NAV
function goTo(pg){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById(pg+'-page').classList.add('active');
  document.getElementById('nav-'+pg).classList.add('active');
  if(pg==='home'){renderFeed();}
  if(pg==='reels'){renderReels();}
  if(pg==='profile'){renderProfile();}
}

// ── STORIES
var STRS=[
  {l:'Bride \ud83d\udc70',g:['#b5534a','#e08040']},
  {l:'Groom \ud83e\udd35',g:['#2d6a4f','#52b788']},
  {l:'Together \ud83d\udc91',g:['#7a5040','#c4875a']},
  {l:'Family \ud83c\udf38',g:['#9b3a7a','#e06fa0']},
  {l:'Friends \ud83c\udf89',g:['#7a5a35','#c9994a']},
  {l:'Ceremony \ud83d\ude4f',g:['#5c1e12','#9a4e22']},
];
var SRIMGS=[
  'https://images.unsplash.com/photo-1537633552985-df8429e8048b?w=120',
  'https://images.unsplash.com/photo-1600091166971-7f9faad6c498?w=120',
  'https://images.unsplash.com/photo-1606800052052-a08af7148866?w=120',
  'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=120',
  'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=120',
  'https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=120'
];

function renderStories(){
  var fp=ST.posts.find(function(p){return p.type==='post'&&p.images&&p.images.length;});
  if(fp)SRIMGS[0]=fp.images[0];
  var h='';
  STRS.forEach(function(s,i){
    h+='<div class="story-item" onclick="showStory('+i+')">'
      +'<div class="story-ring" style="background:linear-gradient(135deg,'+s.g[0]+','+s.g[1]+')">'
      +'<img src="'+SRIMGS[i]+'" onerror="this.style.display=\'none\'"/></div>'
      +'<div class="story-label">'+es(s.l)+'</div></div>';
  });
  document.getElementById('stories-scroll').innerHTML=h;
}

// ── FEED
function renderFeed(){
  updateTopBar();
  renderStories();
  var el=document.getElementById('feed');
  if(!ST.posts.length){el.innerHTML='<div style="text-align:center;padding:80px 20px;color:#bbb"><div style="font-size:48px;margin-bottom:12px">\ud83d\udcf8</div><div style="font-weight:600;margin-bottom:6px">No posts yet</div><div style="font-size:13px">Tap + to add your first post</div></div>';return;}
  el.innerHTML=ST.posts.map(mkPost).join('');
}

function mkPost(post){
  var isReel=post.type==='reel';
  var ci=ST.ci[post.id]||0;
  var src=isReel?(post.thumb||''):(post.images&&post.images[ci])||'';
  var lk=ST.likes[post.id]||0;
  var ld2=ST.liked[post.id]?true:false;
  var cmts=ST.comments[post.id]||[];
  var last=cmts.length?cmts[cmts.length-1]:null;

  var imgHTML='';
  if(src){
    imgHTML='<div class="post-img-wrap" ondblclick="dtapLike(\''+post.id+'\')">'
      +'<img src="'+es(src)+'" loading="lazy" onerror="this.parentNode.style.display=\'none\'"/>';
    if(isReel){
      imgHTML+='<div class="reel-play-overlay" onclick="goTo(\'reels\')">'
        +'<div class="reel-play-btn">\u25b6</div></div>';
    } else if(post.images&&post.images.length>1){
      imgHTML+='<div class="carousel-count">'+(ci+1)+'/'+post.images.length+'</div>';
      imgHTML+='<div class="carousel-dots">';
      for(var i=0;i<post.images.length;i++)imgHTML+='<div class="dot '+(i===ci?'on':'off')+'"></div>';
      imgHTML+='</div>';
      if(ci>0)imgHTML+='<button class="carousel-prev" onclick="slidePost(\''+post.id+'\',-1)">\u2039</button>';
      if(ci<post.images.length-1)imgHTML+='<button class="carousel-next" onclick="slidePost(\''+post.id+'\',1)">\u203a</button>';
    }
    imgHTML+='<span id="hrt-'+post.id+'"></span></div>';
  }

  return '<div class="post-card" id="pc-'+post.id+'">'
    +'<div class="post-header">'
    +'<div class="post-avatar"><img src="'+es(ST.profile.avatarUrl)+'" onerror="this.style.background=\'#f0d0b0\'"/></div>'
    +'<div style="flex:1"><div class="post-meta-name">'+couple()+'</div><div class="post-meta-time">'+tago(post.time)+'</div></div>'
    +(isReel?'<span class="reel-badge">\ud83c\udfac Reel</span>':'')
    +'</div>'
    +imgHTML
    +(isReel&&post.song?'<div class="song-tag">\ud83c\udfb5 '+es(post.song)+'</div>':'')
    +'<div class="post-actions">'
    +'<div class="action-row">'
    +'<button class="action-btn" onclick="toggleLike(\''+post.id+'\')">'+(ld2?'\u2764\ufe0f':'\ud83e\udd0d')+'</button>'
    +'<button class="action-btn" style="font-size:24px" onclick="openCmts(\''+post.id+'\')">\ud83d\udcac</button>'
    +'<button class="action-btn" style="font-size:22px" onclick="shareAlbum()">\ud83d\udce4</button>'
    +'</div>'
    +(lk?'<div class="like-count">'+lk.toLocaleString()+' like'+(lk!==1?'s':'')+'</div>':'')
    +'<div class="post-caption"><strong>'+couple()+'</strong> '+es(post.caption)+'</div>'
    +(cmts.length?'<button class="view-cmts" onclick="openCmts(\''+post.id+'\')">View all '+cmts.length+' comment'+(cmts.length!==1?'s':'')+'</button>':'')
    +(last?'<div class="last-cmt"><strong>'+es(last.name)+'</strong> '+es(last.text)+'</div>':'')
    +'<div class="post-time">'+tago(post.time)+'</div>'
    +'</div></div>';
}

function slidePost(id,dir){
  var post=ST.posts.find(function(p){return p.id===id;});
  if(!post)return;
  var ci=ST.ci[id]||0;
  ST.ci[id]=Math.max(0,Math.min(ci+dir,(post.images||[]).length-1));
  var el=document.getElementById('pc-'+id);
  if(el)el.outerHTML=mkPost(post);
}

// ── LIKES
function toggleLike(id){
  var w=ST.liked[id];
  ST.likes[id]=Math.max(0,(ST.likes[id]||0)+(w?-1:1));
  ST.liked[id]=!w;
  sv('wg-likes',ST.likes);sv('wg-liked',ST.liked);
  var page=document.getElementById('home-page').classList.contains('active')?'home':document.getElementById('reels-page').classList.contains('active')?'reels':'profile';
  if(page==='home')renderFeed();
  if(page==='reels')renderReels();
  renderProfile();
}
function dtapLike(id){
  if(!ST.liked[id])toggleLike(id);
  var el=document.getElementById('hrt-'+id);
  if(el){el.innerHTML='<div class="heart-anim">\u2764\ufe0f</div>';setTimeout(function(){el.innerHTML='';},900);}
}

// ── REELS
function renderReels(){
  var reels=ST.posts.filter(function(p){return p.type==='reel';});
  var el=document.getElementById('reels-feed');
  if(!reels.length){el.innerHTML='<div style="text-align:center;padding:80px 20px;color:#555"><div style="font-size:48px;margin-bottom:12px">\ud83c\udfac</div><div style="color:#aaa;font-weight:600;margin-bottom:6px">No reels yet</div><div style="font-size:13px;color:#666">Tap + to add your first reel</div></div>';return;}
  el.innerHTML=reels.map(function(r){
    var lk=ST.likes[r.id]||0;
    var ld2=ST.liked[r.id]?true:false;
    var cmts=ST.comments[r.id]||[];
    return '<div class="reel-card" ondblclick="dtapReel(\''+r.id+'\')">'
      +(r.thumb?'<img src="'+es(r.thumb)+'" loading="lazy"/>':'<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a0808,#5c2020);display:flex;align-items:center;justify-content:center;font-size:48px">\ud83c\udfac</div>')
      +'<div class="reel-center-play"><div class="reel-center-btn">\u25b6</div></div>'
      +'<span id="hrtr-'+r.id+'"></span>'
      +'<div class="reel-right-actions">'
      +'<div class="reel-action"><button onclick="toggleLike(\''+r.id+'\')">'+(ld2?'\u2764\ufe0f':'\ud83e\udd0d')+'</button>'+(lk?'<span>'+lk+'</span>':'')+'</div>'
      +'<div class="reel-action"><button onclick="openCmts(\''+r.id+'\')">\ud83d\udcac</button>'+(cmts.length?'<span>'+cmts.length+'</span>':'')+'</div>'
      +'<div class="reel-action"><button onclick="shareAlbum()">\ud83d\udce4</button></div>'
      +'</div>'
      +'<div class="reel-bottom">'
      +'<div class="reel-uname">'+couple()+'</div>'
      +'<div class="reel-cap">'+es(r.caption)+'</div>'
      +(r.song?'<div class="reel-song"><span class="spin">\ud83c\udfb5</span>'+es(r.song)+'</div>':'')
      +'</div></div>';
  }).join('');
}
function dtapReel(id){
  if(!ST.liked[id])toggleLike(id);
  var el=document.getElementById('hrtr-'+id);
  if(el){el.innerHTML='<div class="heart-anim">\u2764\ufe0f</div>';setTimeout(function(){el.innerHTML='';},900);}
}

// ── PROFILE
function renderProfile(){
  var p=ST.profile;
  document.getElementById('profile-title').innerHTML=couple();
  document.getElementById('pname').innerHTML=couple();
  document.getElementById('pbio').textContent=p.bio||'';
  document.getElementById('ploc').textContent='\ud83d\udccd '+(p.location||'');
  document.getElementById('pdate').textContent='\ud83d\udc95 '+(p.date||'');
  document.getElementById('pphoto').textContent='\ud83d\udcf8 '+(p.photographer||'');
  document.getElementById('profile-avatar').src=p.avatarUrl||'';
  var tl=Object.values(ST.likes).reduce(function(a,b){return a+b;},0);
  var tc=Object.values(ST.comments).reduce(function(a,b){return a+b.length;},0);
  document.getElementById('stat-posts').textContent=ST.posts.length;
  document.getElementById('stat-likes').textContent=tl;
  document.getElementById('stat-cmts').textContent=tc;
  var imgs=[];
  ST.posts.filter(function(p){return p.type==='post';}).forEach(function(p){(p.images||[]).forEach(function(img){if(imgs.length<12)imgs.push(img);});});
  var grid=document.getElementById('photo-grid');
  grid.innerHTML=imgs.length?imgs.map(function(s){return '<div class="pgrid-item"><img src="'+es(s)+'" loading="lazy" onerror="this.style.display=\'none\'"/></div>';}).join(''):'<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#ccc"><div style="font-size:40px;margin-bottom:12px">\ud83d\uddbc\ufe0f</div><p style="font-size:13px">Your photos appear here</p></div>';
}

function updateTopBar(){
  document.getElementById('home-title').innerHTML=couple();
  document.getElementById('top-avatar').src=ST.profile.avatarUrl||'';
}

// ── STORY
function showStory(i){
  var s=STRS[i];
  var fp=ST.posts.find(function(p){return p.type==='post'&&p.images&&p.images.length;});
  var img=i===0&&fp?fp.images[0]:SRIMGS[i];
  document.getElementById('story-img').src=img;
  document.getElementById('story-prog').style.background='linear-gradient(90deg,'+s.g[0]+','+s.g[1]+')';
  document.getElementById('story-av').src=ST.profile.avatarUrl||'';
  document.getElementById('story-couple').innerHTML=couple();
  document.getElementById('story-subl').textContent=s.l;
  document.getElementById('story-lbl').textContent=s.l;
  document.getElementById('story-dt').textContent=(ST.profile.date||'')+' \u00b7 '+(ST.profile.location||'');
  document.getElementById('story-viewer').style.display='block';
}
function closeStory(){document.getElementById('story-viewer').style.display='none';}

// ── SHARE
function shareAlbum(){
  if(navigator.share){navigator.share({url:window.location.href,title:ST.profile.bride+' & '+ST.profile.groom+' Wedding Album'});}
  else{try{navigator.clipboard.writeText(window.location.href);}catch(e){}alert('Link copied! Share on WhatsApp \ud83d\udccb');}
}

// ── UPLOAD
var uStep=null,uLinks=[''];
function openUpload(t){uStep=t||null;uLinks=[''];drawUpload();}
function drawUpload(){
  var h='<div class="modal-overlay" id="umod" onclick="closeUifBg(event)">'
    +'<div class="modal-sheet">'
    +'<div class="mhandle"><div class="mhandle-bar"></div></div>'
    +'<div class="mheader">'
    +'<button onclick="'+(uStep?'uBack()':'closeU()')+'">'+( uStep?'\u2190 Back':'Cancel')+'</button>'
    +'<span>'+(!uStep?'New':uStep==='post'?'New Post':uStep==='reel'?'New Reel':'Edit Profile')+'</span>'
    +'<div style="width:50px"></div></div>';

  if(!uStep){
    h+='<div class="mbody">'
      +uOpt('post','\ud83d\uddbc\ufe0f','Post','Add photos from Google Drive (carousel)')
      +uOpt('reel','\ud83c\udfac','Reel','Add a video from Google Drive with a song')
      +uOpt('profile','\ud83d\udc64','Edit Profile','Update couple photo & wedding details')
      +'</div>';
  }
  if(uStep==='post'||uStep==='reel'){
    h+='<div class="mbody"><div class="hint-box">\ud83d\udcc2 <strong>Get Drive link:</strong><br>1. Open Google Drive<br>2. Right-click '+(uStep==='reel'?'video':'photo')+' \u2192 Share<br>3. Set "Anyone with link"<br>4. Copy link \u2192 Paste below</div>';
    if(uStep==='post'){
      uLinks.forEach(function(lk,i){
        h+='<div class="link-row"><input placeholder="Photo '+(i+1)+' \u2014 Paste Drive link" value="'+es(lk)+'" oninput="uLinks['+i+']=this.value;uprev()"/>'
          +(uLinks.length>1?'<button class="link-remove" onclick="uLinks.splice('+i+',1);drawUpload()">\u00d7</button>':'')
          +'</div>';
      });
      if(uLinks.length<10)h+='<button class="add-photo-btn" onclick="uLinks.push(\'\');drawUpload()">+ Add another photo</button>';
    } else {
      h+='<input class="finput" id="rl0" placeholder="Paste Google Drive video link" value="'+es(uLinks[0]||'')+'" oninput="uLinks[0]=this.value;uprev()"/>';
      h+='<input class="finput" id="rsong" placeholder="\ud83c\udfb5 Song \u2014 e.g. Malare \u00b7 Premam"/>';
    }
    h+='<div id="uprev"></div>';
    h+='<textarea class="finput" id="ucap" placeholder="'+(uStep==='reel'?'Caption\u2026 \u2764\ufe0f #keralawedding':'Caption\u2026 \u2728 #keralawedding')+'" rows="3" style="resize:none"></textarea>';
    h+='<button class="sbtn '+(uStep==='reel'?'reel':'post')+'" onclick="submitU()">'+(uStep==='reel'?'Share Reel \ud83c\udfac':'Share Post \ud83c\udf3a')+'</button>';
    h+='</div>';
  }
  if(uStep==='profile'){
    var p=ST.profile;
    h+='<div class="mbody">'
      +pf('Bride\'s Name','pfbr',p.bride)+pf('Groom\'s Name','pfgr',p.groom)
      +pf('Wedding Date','pfdt',p.date)+pf('Location','pflc',p.location)
      +pf('Photographer','pfph',p.photographer)+pf('Bio','pfbi',p.bio)
      +pf('Profile Photo (Drive link)','pfav',p.avatarUrl)
      +(p.avatarUrl?'<img src="'+es(p.avatarUrl)+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #c9915a;display:block;margin:0 auto 16px" onerror="this.style.display=\'none\'"/>':'')
      +'<button class="sbtn post" onclick="submitProfile()">Save Profile \u2713</button></div>';
  }
  h+='</div></div>';
  document.getElementById('modal-root').innerHTML=h;
}
function uOpt(id,ic,tl,ds){return '<button class="uoption" onclick="uStep=\''+id+'\';drawUpload()"><div class="uoption-icon">'+ic+'</div><div><div class="uoption-title">'+tl+'</div><div class="uoption-desc">'+ds+'</div></div></button>';}
function pf(lbl,id,val){return '<label class="flabel">'+lbl+'</label><input class="finput" id="'+id+'" value="'+es(val||'')+'" placeholder="'+lbl+'"/>';}
function uprev(){var id=drid(uLinks[0]);var el=document.getElementById('uprev');if(el&&id)el.innerHTML='<div class="preview-img"><img src="'+dthumb(id,'w400')+'" onerror="this.style.display=\'none\'"/></div>';else if(el)el.innerHTML='';}
function uBack(){uStep=null;drawUpload();}
function closeU(){document.getElementById('modal-root').innerHTML='';}
function closeUifBg(e){if(e.target.id==='umod')closeU();}

function submitU(){
  if(uStep==='post'){
    var imgs=uLinks.map(function(l){var id=drid(l);return id?dthumb(id,'w800'):null;}).filter(Boolean);
    if(!imgs.length){alert('Please add at least one valid Google Drive link');return;}
    var cap=document.getElementById('ucap');
    ST.posts.unshift({id:'p'+Date.now(),type:'post',caption:cap?cap.value:'',time:Date.now(),images:imgs});
  } else {
    var vid=drid(uLinks[0]);
    var sg=document.getElementById('rsong');
    var cap2=document.getElementById('ucap');
    ST.posts.unshift({id:'p'+Date.now(),type:'reel',caption:cap2?cap2.value:'',time:Date.now(),thumb:vid?dthumb(vid,'w800'):null,song:sg?sg.value:''});
  }
  sv('wg-posts',ST.posts);
  closeU();
  renderFeed();
  renderReels();
}
function submitProfile(){
  ST.profile={bride:g('pfbr'),groom:g('pfgr'),date:g('pfdt'),location:g('pflc'),photographer:g('pfph'),bio:g('pfbi'),avatarUrl:g('pfav')};
  sv('wg-profile',ST.profile);
  closeU();renderFeed();renderProfile();
}
function g(id){var el=document.getElementById(id);return el?el.value:'';}

// ── COMMENTS
function openCmts(pid){
  var cmts=ST.comments[pid]||[];
  var h='<div class="modal-overlay" id="cmod" onclick="closeCifBg(event)">'
    +'<div class="modal-sheet" style="display:flex;flex-direction:column;max-height:78vh">'
    +'<div class="mhandle"><div class="mhandle-bar"></div></div>'
    +'<div class="mheader"><span>Comments</span><button onclick="closeC()" style="background:none;border:none;font-size:22px;color:#888">\u00d7</button></div>'
    +'<div class="clist" id="clist">'
    +(cmts.length?cmts.map(function(c){
      return '<div class="citem"><div class="cavatar">'+es((c.name||'?')[0].toUpperCase())+'</div>'
        +'<div><div class="ctext"><strong>'+es(c.name)+'</strong> '+es(c.text)+'</div><div class="ctime">'+tago(c.time)+'</div></div></div>';
    }).join(''):'<div class="cempty"><div style="font-size:30px;margin-bottom:8px">\ud83d\udcac</div><div style="font-size:13px">Be the first to comment!</div></div>')
    +'</div>'
    +'<div class="cinput-area">'
    +'<input id="cn" placeholder="Your name (optional)"/>'
    +'<div class="csend-row">'
    +'<input id="ct" placeholder="Write a comment\u2026 \u2764\ufe0f" onkeydown="if(event.key===\'Enter\')addC(\''+pid+'\')"/>'
    +'<button class="csend-btn" onclick="addC(\''+pid+'\')">Post</button>'
    +'</div></div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
  var cl=document.getElementById('clist');if(cl)cl.scrollTop=cl.scrollHeight;
}
function addC(pid){
  var nm=g('cn')||'Guest \u2764\ufe0f';var tx=g('ct');
  if(!tx.trim())return;
  if(!ST.comments[pid])ST.comments[pid]=[];
  ST.comments[pid].push({name:nm,text:tx.trim(),time:Date.now()});
  sv('wg-comments',ST.comments);
  openCmts(pid);renderFeed();renderProfile();
}
function closeC(){document.getElementById('modal-root').innerHTML='';}
function closeCifBg(e){if(e.target.id==='cmod')closeC();}

// ── INIT
renderFeed();
</script>
</body>
</html>
