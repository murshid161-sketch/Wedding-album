<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Wedding Album</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gold2:#E8C97A;--gold3:#8B6914;
  --cream:#FAF7F2;--cream2:#F2EDE4;--cream3:#ddd5c8;
  --dark:#1A1209;--dark2:#2D200A;--dark3:#4A3520;
  --text:#2A1F10;--text2:#6B5230;--text3:#9B7D52;
  --red:#c0392b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--cream);overflow-x:hidden;color:var(--text)}
::-webkit-scrollbar{display:none}
button,input,textarea,select{font-family:'Montserrat',sans-serif;cursor:pointer}
img{display:block}

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
.ls-ornament{font-size:30px;color:var(--gold);margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
.ls-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:var(--gold);letter-spacing:2px;margin-bottom:6px;text-align:center;padding:0 20px}
.ls-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto;animation:shimmer 2s ease-in-out infinite}
.ls-sub{font-size:9px;color:var(--gold3);letter-spacing:4px;text-transform:uppercase}

/* ── ADMIN LOGIN OVERLAY ── */
#admin-login{position:fixed;inset:0;background:rgba(26,18,9,0.96);backdrop-filter:blur(20px);z-index:800;display:none;align-items:center;justify-content:center;padding:24px}
.login-box{width:100%;max-width:340px;text-align:center}
.login-ornament{font-size:28px;color:var(--gold);margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
.login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:var(--gold);margin-bottom:6px}
.login-sub{font-size:11px;color:var(--gold3);letter-spacing:2px;margin-bottom:28px}
.login-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:14px 18px;font-size:14px;color:#fff;outline:none;margin-bottom:14px;letter-spacing:1px;text-align:center}
.login-input:focus{border-color:var(--gold)}
.login-input::placeholder{color:rgba(201,168,76,0.35);letter-spacing:2px}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold3),var(--gold));border:none;border-radius:12px;color:var(--dark);font-weight:700;font-size:13px;padding:14px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.login-err{font-size:12px;color:var(--red);letter-spacing:0.5px;height:16px}
.login-cancel{background:none;border:none;color:rgba(201,168,76,0.4);font-size:12px;letter-spacing:1px;margin-top:8px}

/* ── NAV ── */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(26,18,9,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,0.18);display:flex;z-index:100}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0 16px;opacity:0.32;transition:all 0.22s}
.nav-btn.active{opacity:1}
.nav-btn .ni{font-size:19px;line-height:1}
.nav-btn .nl{font-size:8px;font-weight:600;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}

/* ── PAGES ── */
.page{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:var(--cream);padding-bottom:80px}
.page.active{display:block}

/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:50;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.12);display:flex;align-items:center;justify-content:space-between;padding:11px 16px}
.top-bar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.top-right-btns{display:flex;align-items:center;gap:8px}
.admin-indicator{font-size:9px;background:var(--gold);color:var(--dark);border-radius:10px;padding:2px 8px;font-weight:700;letter-spacing:1px}
.av-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--gold);background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);font-style:italic;overflow:hidden;cursor:pointer}
.av-circle img{width:100%;height:100%;object-fit:cover}

/* ── ADMIN FAB (floating add button) ── */
#admin-fab{position:fixed;bottom:90px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold3),var(--gold));border:none;color:var(--dark);font-size:24px;display:none;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 20px rgba(201,168,76,0.4);font-weight:700;line-height:1;max-width:calc(480px - 20px)}
#admin-fab.show{display:flex}

/* ── UPLOAD MODAL ── */
#upload-modal{position:fixed;inset:0;background:rgba(26,18,9,0.7);z-index:700;display:none;align-items:flex-end;justify-content:center}
#upload-modal.show{display:flex}
.upload-sheet{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp 0.3s ease}
.upload-handle{display:flex;justify-content:center;padding:10px 0 4px}
.upload-handle-bar{width:36px;height:3px;border-radius:2px;background:var(--cream3)}
.upload-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 14px;border-bottom:1px solid var(--cream3)}
.upload-header-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.upload-close{background:none;border:none;font-size:20px;color:var(--text3)}
.upload-type-row{display:flex;gap:0;border-bottom:1px solid var(--cream3)}
.upload-type-btn{flex:1;background:none;border:none;padding:12px;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--text3);border-bottom:2px solid transparent;transition:all 0.2s}
.upload-type-btn.active{color:var(--gold3);border-bottom-color:var(--gold)}
.upload-body{padding:18px}
/* file pick area */
.file-pick-area{border:1.5px dashed rgba(201,168,76,0.35);border-radius:16px;background:var(--cream);overflow:hidden;margin-bottom:14px;cursor:pointer;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative}
.file-pick-area .fp-icon{font-size:40px}
.file-pick-area .fp-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text3)}
.file-pick-area .fp-sub{font-size:11px;color:var(--cream3)}
.file-pick-area img,.file-pick-area video{width:100%;max-height:320px;object-fit:cover;border-radius:16px}
.file-change-hint{position:absolute;bottom:10px;right:10px;background:rgba(26,18,9,0.65);border:1px solid rgba(201,168,76,0.4);color:var(--gold);font-size:10px;border-radius:10px;padding:4px 10px;letter-spacing:0.5px}
/* multi-photo strip */
.multi-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding:2px}
.multi-thumb{position:relative;flex-shrink:0;width:80px;height:80px;border-radius:10px;overflow:hidden;background:var(--cream2)}
.multi-thumb img{width:100%;height:100%;object-fit:cover}
.multi-thumb-del{position:absolute;top:3px;right:3px;background:rgba(26,18,9,0.7);border:none;color:var(--gold);border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1}
.multi-add{flex-shrink:0;width:80px;height:80px;border-radius:10px;border:1.5px dashed rgba(201,168,76,0.35);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--gold3);cursor:pointer}
/* form fields */
.u-input{width:100%;border:1px solid var(--cream3);border-radius:12px;padding:12px 16px;font-size:13px;outline:none;background:var(--cream);color:var(--text);margin-bottom:12px;transition:border-color 0.2s;resize:none}
.u-input:focus{border-color:var(--gold)}
.u-input::placeholder{color:var(--text3);font-style:italic}
/* progress */
.u-progress{height:3px;background:var(--cream3);border-radius:2px;overflow:hidden;display:none;margin-bottom:12px}
.u-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));width:0%;transition:width 0.3s}
.u-status{font-size:11px;color:var(--text3);margin-bottom:10px;text-align:center;font-style:italic;height:16px}
.u-submit{width:100%;background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:14px;letter-spacing:1px}
.u-submit:disabled{opacity:0.45}

/* ── STORIES ── */
#stories-row{background:#fff;border-bottom:1px solid var(--cream3);padding:12px 0}
#stories-scroll{display:flex;gap:12px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
.story-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2))}
.story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2.5px solid #fff}
.story-ring-inner{width:100%;height:100%;border-radius:50%;border:2.5px solid #fff;background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-size:20px}
.story-label{font-size:9px;color:var(--text2);max-width:64px;text-align:center;line-height:1.3;font-weight:500;letter-spacing:0.3px}

/* ── POST CARD ── */
.post-card{background:#fff;border-bottom:6px solid var(--cream);animation:fadeIn 0.35s ease}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.post-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);font-style:italic}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-meta-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--dark);font-weight:600}
.post-meta-time{font-size:10px;color:var(--text3)}
.reel-badge{font-size:10px;background:var(--dark);border-radius:20px;padding:3px 10px;color:var(--gold);letter-spacing:0.5px;font-weight:500}
.post-img-wrap{position:relative;user-select:none;-webkit-user-select:none}
.post-img-wrap img,.post-img-wrap video{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.c-prev,.c-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(26,18,9,0.5);border:1px solid rgba(201,168,76,0.4);border-radius:50%;width:30px;height:30px;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:2;color:var(--gold)}
.c-prev{left:10px}.c-next{right:10px}
.c-count{position:absolute;top:12px;right:12px;background:rgba(26,18,9,0.6);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:3px 10px;font-size:10px;color:var(--gold);font-weight:600;letter-spacing:0.5px}
.c-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.dot{height:4px;border-radius:2px;transition:all 0.25s}
.dot.on{width:20px;background:var(--gold)}.dot.off{width:4px;background:rgba(201,168,76,0.4)}
.heart-anim{position:absolute;top:50%;left:50%;font-size:80px;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop 0.9s ease forwards}
.reel-overlay{position:absolute;inset:0;background:rgba(26,18,9,0.28);display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-play-btn{width:64px;height:64px;border-radius:50%;background:rgba(201,168,76,0.15);backdrop-filter:blur(8px);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);padding-left:4px;font-size:22px}
.post-actions{padding:12px 16px 14px}
.action-row{display:flex;gap:14px;align-items:center;margin-bottom:8px}
.action-btn{background:none;border:none;font-size:24px;line-height:1;transition:transform 0.15s;padding:2px}
.action-btn:active{transform:scale(0.82)}
.del-btn{background:none;border:none;font-size:18px;line-height:1;color:var(--red);opacity:0.5;margin-left:auto;padding:4px}
.like-count{font-weight:600;font-size:12px;color:var(--dark);margin-bottom:5px}
.post-caption{font-size:13px;line-height:1.6;margin-bottom:3px}
.post-caption strong{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--dark)}
.view-cmts{background:none;border:none;padding:0;font-size:11px;color:var(--text3);margin-top:3px;display:block}
.last-cmt{font-size:12px;color:var(--text2);margin-top:5px}
.last-cmt strong{font-family:'Cormorant Garamond',serif;font-style:italic}
.post-time{font-size:9px;color:var(--cream3);margin-top:5px;text-transform:uppercase;letter-spacing:1px}
.song-tag{padding:6px 16px 0;font-size:11px;color:var(--text3);font-style:italic;display:flex;align-items:center;gap:6px}

/* ── REELS PAGE ── */
#reels-page{background:var(--dark)}
#reels-topbar{position:sticky;top:0;z-index:10;padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,18,9,0.85);backdrop-filter:blur(12px)}
#reels-topbar .rt{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:22px;font-style:italic}
#reels-topbar .rs{font-size:10px;color:var(--gold3);letter-spacing:2px}
.reel-card{position:relative;height:88vh;background:#0d0a06;margin-bottom:3px;overflow:hidden}
.reel-card img,.reel-card video{width:100%;height:100%;object-fit:cover;opacity:0.85}
.reel-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-center-btn{width:64px;height:64px;border-radius:50%;background:rgba(201,168,76,0.15);backdrop-filter:blur(8px);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);padding-left:4px;font-size:22px}
.reel-actions{position:absolute;right:14px;bottom:140px;display:flex;flex-direction:column;gap:24px;align-items:center}
.reel-action{display:flex;flex-direction:column;align-items:center;gap:4px}
.reel-action button{background:none;border:none;font-size:28px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7))}
.reel-action span{color:var(--gold);font-size:11px;font-weight:600;letter-spacing:0.5px}
.reel-info{position:absolute;bottom:0;left:0;right:70px;padding:60px 16px 24px;background:linear-gradient(to top,rgba(26,18,9,0.85),transparent);pointer-events:none}
.reel-uname{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:15px;color:var(--gold);margin-bottom:5px;font-style:italic}
.reel-cap{font-size:12px;color:rgba(255,255,255,0.85);line-height:1.55;margin-bottom:6px}
.reel-song{font-size:10px;color:rgba(201,168,76,0.7);display:flex;align-items:center;gap:5px}
.spin2{animation:spin 4s linear infinite;display:inline-block}

/* ── GUEST WALL ── */
#wall-page{background:var(--cream)}
.wall-topbar{position:sticky;top:0;z-index:50;background:rgba(250,247,242,0.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.12);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.wall-topbar-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--dark)}
.wall-upload-btn{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:20px;color:var(--gold);font-weight:600;font-size:11px;padding:8px 16px;letter-spacing:0.5px}
.wall-upload-area{margin:14px;border:1.5px solid rgba(201,168,76,0.25);border-radius:20px;background:#fff;overflow:hidden;display:none;box-shadow:0 8px 32px rgba(26,18,9,0.10)}
.wall-upload-area.open{display:block}
.wall-preview-placeholder{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;background:linear-gradient(135deg,var(--cream),var(--cream2))}
.wall-preview-placeholder .wpi{font-size:44px}
.wall-preview-placeholder span{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text3)}
.wall-preview-wrap{position:relative;width:100%;aspect-ratio:1;background:var(--cream2);overflow:hidden}
.wall-preview-wrap img{width:100%;height:100%;object-fit:cover}
.wall-form{padding:16px 18px 20px;display:flex;flex-direction:column;gap:12px}
.wall-input{border:1px solid var(--cream3);border-radius:12px;padding:12px 16px;font-size:13px;outline:none;width:100%;background:var(--cream);color:var(--text);transition:border-color 0.2s}
.wall-input:focus{border-color:var(--gold)}
.wall-input::placeholder{color:var(--text3);font-style:italic}
.wall-submit-btn{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--gold);border-radius:12px;color:var(--gold);font-weight:600;font-size:13px;padding:14px;width:100%;letter-spacing:1px}
.wall-submit-btn:disabled{opacity:0.5}
.wall-progress{height:3px;background:var(--cream3);border-radius:2px;overflow:hidden;display:none}
.wall-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));width:0%;transition:width 0.3s}
.wall-section-title{padding:20px 18px 10px;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--dark2);display:flex;align-items:center;gap:10px}
.wall-section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.3),transparent)}
.wall-grid{padding:0 14px 14px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wall-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(26,18,9,0.08);animation:fadeIn 0.35s ease}
.wall-card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--cream2)}
.wall-card-body{padding:11px 12px 13px}
.wall-card-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:15px;font-style:italic;color:var(--dark)}
.wall-card-msg{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}
.wall-card-time{font-size:9px;color:var(--cream3);margin-top:6px;letter-spacing:0.5px;text-transform:uppercase}
.wall-empty{text-align:center;padding:60px 20px;grid-column:1/-1}
.wall-empty .we{font-size:44px;margin-bottom:14px}
.wall-empty-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--text3);margin-bottom:6px}
.wall-empty-sub{font-size:12px;color:var(--cream3)}

/* ── PROFILE ── */
.prof-topbar{padding:14px 18px;border-bottom:1px solid var(--cream3);display:flex;align-items:center;justify-content:space-between;background:#fff}
.prof-topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--dark)}
.prof-topbar-actions{display:flex;gap:8px}
.prof-topbar-actions button{background:none;border:1px solid var(--cream3);border-radius:20px;font-size:11px;color:var(--text3);padding:5px 12px;font-weight:500}
.prof-hero{background:linear-gradient(160deg,var(--dark) 0%,var(--dark2) 100%);padding:30px 18px 26px;text-align:center;position:relative;overflow:hidden}
.prof-hero::before{content:'✦';position:absolute;top:14px;left:20px;color:rgba(201,168,76,0.15);font-size:44px}
.prof-hero::after{content:'✦';position:absolute;bottom:14px;right:20px;color:rgba(201,168,76,0.10);font-size:30px}
.pav-ring{width:90px;height:90px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));margin:0 auto 16px;cursor:pointer}
.pav-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--dark)}
.pav-ring-inner{width:100%;height:100%;border-radius:50%;border:3px solid var(--dark);background:linear-gradient(135deg,var(--dark2),var(--dark3));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);font-style:italic}
.pname{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:26px;color:var(--gold);margin-bottom:6px}
.pbio{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.75;max-width:280px;margin:0 auto 14px}
.pmeta-row{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}

var ADMIN_PASSWORD = "@Qwe456uio";
var COUPLE = {

var IS_ADMIN = sessionStorage.getItem("wg-admin")==="1";

var _unsubPosts=null, _unsubWall=null, _unsubComment=null;

// ── utils ──
function es(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function cp(){return es(COUPLE.bride)+" &amp; "+es(COUPLE.groom);}
function cpPlain(){return COUPLE.bride+" & "+COUPLE.groom;}
function inits(){return((COUPLE.bride||"B")[0]+(COUPLE.groom||"G")[0]).toUpperCase();}
function ta(ts){
  if(!ts)return"";
  var t=ts instanceof Date?ts.getTime():(ts&&ts.toMillis?ts.toMillis():+ts);
  var s=Math.floor((Date.now()-t)/1000);
  if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";
}
function getUserId(){var u=localStorage.getItem("wg-uid");if(!u){u="u_"+Math.random().toString(36).slice(2,10);localStorage.setItem("wg-uid",u);}return u;}
var USER_ID=getUserId();

// ── Cloudinary Config ──
var CLOUDINARY_CLOUD = "dormnrhdf";
var CLOUDINARY_PRESET = "ml_default";

async function uploadToCloudinary(file, onProgress){
  return new Promise(function(resolve, reject){
    var formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_PRESET);
    
    // Use "auto" resource type to handle images, videos, and blobs
    var url = "https://api.cloudinary.com/v1_1/" + CLOUDINARY_CLOUD + "/auto/upload";
    
    var xhr = new XMLHttpRequest();
    xhr.open("POST", url);
    xhr.upload.onprogress = function(e){
      if(e.lengthComputable && onProgress) onProgress((e.loaded/e.total)*100);
    };
    xhr.onload = function(){
      if(xhr.status === 200){
        var res = JSON.parse(xhr.responseText);
        resolve(res.secure_url);
      } else {
        reject(new Error("Upload failed: " + xhr.responseText));
      }
    };
    xhr.onerror = function(){ reject(new Error("Network error")); };
    xhr.send(formData);
  });
}

// ── Admin ──
function handleAvatarTap(){IS_ADMIN?goTo('profile'):openLogin();}
function openLogin(){
  document.getElementById("admin-login").style.display="flex";
  document.getElementById("login-pw").value="";
  document.getElementById("login-err").textContent="";
  setTimeout(function(){document.getElementById("login-pw").focus();},200);
}
function closeLogin(){document.getElementById("admin-login").style.display="none";}
function doLogin(){
  var pw=document.getElementById("login-pw").value;
  if(pw===ADMIN_PASSWORD){
    IS_ADMIN=true;sessionStorage.setItem("wg-admin","1");
    closeLogin();applyAdminUI();
  }else{
    document.getElementById("login-err").textContent="Incorrect password";
    document.getElementById("login-pw").value="";
    document.getElementById("login-pw").focus();
  }
}
function logoutAdmin(){
  IS_ADMIN=false;sessionStorage.removeItem("wg-admin");
  applyAdminUI();alert("Logged out from admin.");
}
function applyAdminUI(){
  document.getElementById("admin-badge").style.display=IS_ADMIN?"inline":"none";
  var fab=document.getElementById("admin-fab");
  IS_ADMIN?fab.classList.add("show"):fab.classList.remove("show");
  document.getElementById("admin-btn-label").textContent=IS_ADMIN?"🔓 Logout Admin":"🔐 Admin Login";
  renderFeed();renderReels();renderProfile();
}

// ── Upload Modal ──
function openUpload(){
  if(!IS_ADMIN){openLogin();return;}
  _uploadFiles=[];_uploadType="post";
  document.getElementById("upload-modal").classList.add("show");
  document.body.style.overflow="hidden";
  switchUploadType("post");
}
function closeUpload(){
  document.getElementById("upload-modal").classList.remove("show");
  document.body.style.overflow="";
  _uploadFiles=[];
}
function switchUploadType(t){
  _uploadType=t;_uploadFiles=[];
  ["post","reel","story"].forEach(function(x){
    document.getElementById("tab-"+x).classList.toggle("active",x===t);
  });
  document.getElementById("upload-title").textContent=
    t==="post"?"Add Post":t==="reel"?"Add Reel":"Add Story";
  renderUploadBody();
}

function renderUploadBody(){
  var t=_uploadType;
  var body="";
  if(t==="post"){
    // Multi-photo post
    body+='<div class="multi-strip" id="multi-strip">'+renderThumbStrip()+'</div>';
    body+='<input type="file" id="up-file" accept="image/*" multiple style="display:none" onchange="onPostFiles(event)"/>';
    body+='<textarea class="u-input" id="up-caption" rows="3" placeholder="Write a caption..."></textarea>';
  } else if(t==="reel"){
    body+='<div class="file-pick-area" id="fp-area" onclick="document.getElementById(\'up-file\').click()">'
      +'<div class="fp-icon">🎬</div>'
      +'<div class="fp-title">Tap to choose video</div>'
      +'<div class="fp-sub">MP4, MOV from your phone</div>'
      +'</div>';
    body+='<input type="file" id="up-file" accept="video/*" style="display:none" onchange="onReelFile(event)"/>';
    body+='<textarea class="u-input" id="up-caption" rows="2" placeholder="Caption..."></textarea>';
    body+='<input class="u-input" id="up-song" placeholder="🎵 Song name (optional)"/>';
  } else if(t==="story"){
    body+='<div class="file-pick-area" id="fp-area" onclick="document.getElementById(\'up-file\').click()">'
      +'<div class="fp-icon">✨</div>'
      +'<div class="fp-title">Tap to choose photo</div>'
      +'<div class="fp-sub">This will appear in the Stories row</div>'
      +'</div>';
    body+='<input type="file" id="up-file" accept="image/*" style="display:none" onchange="onStoryFile(event)"/>';
    body+='<input class="u-input" id="up-label" placeholder="Story label (e.g. Ceremony)"/>';
  }
  body+='<div class="u-progress" id="up-prog"><div class="u-progress-bar" id="up-prog-bar"></div></div>';
  body+='<div class="u-status" id="up-status"></div>';
  body+='<button class="u-submit" id="up-submit" onclick="submitUpload()">Upload ✦</button>';
  document.getElementById("upload-body").innerHTML=body;
}

function renderThumbStrip(){
  var h="";
  _uploadFiles.forEach(function(f,i){
    var url=URL.createObjectURL(f);
    h+='<div class="multi-thumb">'
      +'<img src="'+url+'"/>'
      +'<button class="multi-thumb-del" onclick="removeFile('+i+')">✕</button>'
      +'</div>';
  });
  h+='<div class="multi-add" onclick="document.getElementById(\'up-file\').click()">'+(_uploadFiles.length?'+':'📷')+'</div>';
  return h;
}

function removeFile(i){_uploadFiles.splice(i,1);document.getElementById("multi-strip").innerHTML=renderThumbStrip();}

function onPostFiles(e){
  Array.from(e.target.files).forEach(function(f){_uploadFiles.push(f);});
  document.getElementById("multi-strip").innerHTML=renderThumbStrip();
  e.target.value="";
}
function onReelFile(e){
  var f=e.target.files[0];if(!f)return;
  _uploadFiles=[f];
  var url=URL.createObjectURL(f);
  document.getElementById("fp-area").innerHTML=
    '<video src="'+url+'" style="width:100%;max-height:280px;border-radius:16px" controls></video>'
    +'<div class="file-change-hint">change</div>';
}
function onStoryFile(e){
  var f=e.target.files[0];if(!f)return;
  _uploadFiles=[f];
  var url=URL.createObjectURL(f);
  document.getElementById("fp-area").innerHTML=
    '<img src="'+url+'" style="width:100%;max-height:280px;border-radius:16px;object-fit:cover"/>'

async function submitUpload(){
  if(!window._FB_READY){alert("Firebase not connected.");return;}
  var btn=document.getElementById("up-submit");
  btn.disabled=true;
  document.getElementById("up-prog").style.display="block";

  try{
    if(_uploadType==="post"){
      if(!_uploadFiles.length){alert("Please choose at least one photo.");btn.disabled=false;return;}
      var caption=gv("up-caption");
      var urls=[];
      for(var i=0;i<_uploadFiles.length;i++){
        setStatus("Uploading photo "+(i+1)+" of "+_uploadFiles.length+"...");
        setProgress(0);
        var url=await uploadToCloudinary(_uploadFiles[i],function(p){setProgress(p);});
        urls.push(url);
      }
      setStatus("Saving...");
      await window._db.collection("posts").add({
        type:"post",images:urls,caption:caption,
        time:firebase.firestore.FieldValue.serverTimestamp()
      });
      setStatus("Posted! ✦");

    } else if(_uploadType==="reel"){
      if(!_uploadFiles.length){alert("Please choose a video.");btn.disabled=false;return;}
      var caption=gv("up-caption"),song=gv("up-song");
      setStatus("Uploading video... (may take a minute)");
      setProgress(0);
      var url=await uploadToCloudinary(_uploadFiles[0],function(p){setProgress(p);});
      var thumb=await getVideoThumb(_uploadFiles[0]);
      var thumbUrl="";
      if(thumb){
        setStatus("Uploading thumbnail...");
        thumbUrl=await uploadToCloudinary(thumb,null);
      }
      setStatus("Saving...");
      await window._db.collection("posts").add({
        type:"reel",videoUrl:url,thumbUrl:thumbUrl,caption:caption,song:song,
        time:firebase.firestore.FieldValue.serverTimestamp()
      });
      setStatus("Reel posted! ✦");

    } else if(_uploadType==="story"){
      if(!_uploadFiles.length){alert("Please choose a photo.");btn.disabled=false;return;}
      var label=gv("up-label")||"Story";
      setStatus("Uploading...");
      setProgress(0);
      var url=await uploadToCloudinary(_uploadFiles[0],function(p){setProgress(p);});
      setStatus("Saving...");
      await window._db.collection("stories").add({
        imgUrl:url,label:label,
        time:firebase.firestore.FieldValue.serverTimestamp()
      });
      setStatus("Story added! ✦");
    }

    setTimeout(closeUpload, 1000);
  }catch(e){
    console.error(e);
    setStatus("Error: "+e.message);
    btn.disabled=false;
  }
}

// Extract first frame of video as thumbnail blob
function getVideoThumb(file){
  return new Promise(function(resolve){
    try{
      var video=document.createElement("video");
      video.preload="metadata";
      video.playsInline=true;
      video.muted=true;
      var url=URL.createObjectURL(file);
      video.src=url;
      video.currentTime=0.5;
      video.addEventListener("seeked",function(){
        var canvas=document.createElement("canvas");
        canvas.width=video.videoWidth||640;
        canvas.height=video.videoHeight||480;
        canvas.getContext("2d").drawImage(video,0,0);
        canvas.toBlob(function(blob){URL.revokeObjectURL(url);resolve(blob);},"image/jpeg",0.8);
      });
      video.addEventListener("error",function(){URL.revokeObjectURL(url);resolve(null);});
    }catch(e){resolve(null);}
  });
}

async function tgLike(id){
  var was=LKD[id];
  LKS[id]=Math.max(0,(LKS[id]||0)+(was?-1:1));LKD[id]=!was;
  renderFeed();renderProfile();
  if(!window._FB_READY||!window._db)return;
  try{
    await window._db.collection("likes").doc(id).set({count:firebase.firestore.FieldValue.increment(was?-1:1)},{merge:true});
    await window._db.collection("userLikes_"+USER_ID).doc(id).set({liked:!was});
  }catch(e){console.warn("tgLike:",e);}
}

    document.getElementById("wall-progress").style.display="none";
    document.getElementById("wall-progress-bar").style.width="0%";
    document.getElementById("wall-preview-wrap").outerHTML='<div id="wall-preview-wrap" class="wall-preview-placeholder" onclick="document.getElementById(\'wall-file-input\').click()"><div class="wpi">📷</div><span>Tap to choose a photo</span></div>';
    btn.textContent="Share Your Memory 💝";btn.disabled=false;
    document.getElementById("wall-upload-area").classList.remove("open");
  }catch(e){
    console.error(e);btn.disabled=false;btn.textContent="Share Your Memory 💝";
    alert("Upload failed. Please try again.");
  }
}
function renderWallGrid(){
  var el=document.getElementById("wall-grid");if(!el)return;
  document.getElementById("sw").textContent=WALL_POSTS.length;
  if(!WALL_POSTS.length){
    el.innerHTML='<div class="wall-empty"><div class="we">🌸</div><div class="wall-empty-title">Be the first to share</div><div class="wall-empty-sub">Tap "+ Share" to add your photo</div></div>';
    return;
  }
  el.innerHTML=WALL_POSTS.map(function(p){
    var t=p.time instanceof Date?p.time.getTime():(p.time&&p.time.toMillis?p.time.toMillis():Date.now());
    return'<div class="wall-card">'
      +'<img class="wall-card-img" src="'+es(p.imgUrl)+'" loading="lazy" onerror="this.style.background=\'var(--cream2)\'"/>'
      +'<div class="wall-card-body"><div class="wall-card-name">'+es(p.name)+'</div>'
      +(p.msg?'<div class="wall-card-msg">'+es(p.msg)+'</div>':"")
      +'<div class="wall-card-time">'+ta(t)+'</div></div></div>';
  }).join("");
}
function listenWall(){
  if(!window._FB_READY||!window._db)return;
  if(_unsubWall)_unsubWall();
  _unsubWall=window._db.collection("guestWall").orderBy("time","desc")
    .onSnapshot(function(s){
      WALL_POSTS=[];s.forEach(function(d){var dat=d.data();WALL_POSTS.push({id:d.id,name:dat.name,msg:dat.msg||"",imgUrl:dat.imgUrl,time:dat.time?dat.time.toDate():new Date()});});
      renderWallGrid();
    },function(e){console.warn("Wall:",e);});
}
function renderWall(){renderWallGrid();listenWall();}

// ── Share ──
function shareAlbum(){
  if(navigator.share){navigator.share({url:window.location.href,title:cpPlain()+" Wedding Album"});}
  else{try{navigator.clipboard.writeText(window.location.href);}catch(e){}alert("Link copied! Share on WhatsApp 💝");}
}
function refreshAll(){loadLikes();loadComments();}

// ── Boot ──
function boot(){
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").style.display="block";
  applyAdminUI();
  if(window._FB_READY){
    startListening();
    loadComments();
    listenWall();
  }
  renderFeed();renderProfile();
}
setTimeout(boot, 600);
</script>
