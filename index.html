<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Wedding Album</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#fafafa;overflow-x:hidden}
::-webkit-scrollbar{display:none}
button{cursor:pointer;font-family:'Inter',sans-serif}
input,textarea{font-family:'Inter',sans-serif}
img{display:block}
#loading-screen{position:fixed;inset:0;background:#0d0404;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.spin-icon{font-size:36px;animation:spin 2s linear infinite;margin-bottom:20px}
.load-text{font-size:14px;color:rgba(210,170,90,0.7);letter-spacing:3px}
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);border-top:1px solid #efefef;display:flex;z-index:100}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 14px;opacity:0.4;transition:opacity 0.2s}
.nav-btn.active{opacity:1}
.nav-btn .ni{font-size:22px}
.nav-btn .nl{font-size:9px;font-weight:700;color:#333;letter-spacing:0.3px}
.page{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:#fafafa;padding-bottom:70px}
.page.active{display:block}
.top-bar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.96);backdrop-filter:blur(14px);border-bottom:1px solid #efefef;display:flex;align-items:center;justify-content:space-between;padding:11px 16px}
.top-bar-title{font-family:'Palatino Linotype',Georgia,serif;font-size:21px;font-style:italic;color:#1a0505}
.avatar-btn{background:none;border:none;padding:0}
.avatar-btn img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #c9915a}
#stories-row{background:#fff;border-bottom:1px solid #efefef;padding:10px 0}
#stories-scroll{display:flex;gap:14px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.story-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2.5px}
.story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2.5px solid #fff}
.story-label{font-size:9.5px;color:#444;max-width:62px;text-align:center;line-height:1.2}
.post-card{background:#fff;border-bottom:8px solid #f0f0f0}
.post-header{display:flex;align-items:center;gap:10px;padding:10px 14px}
.post-avatar{width:36px;height:36px;border-radius:50%;border:2px solid #c9915a;overflow:hidden;flex-shrink:0}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-meta-name{font-weight:600;font-size:13px}
.post-meta-time{font-size:11px;color:#999}
.reel-badge{font-size:11px;background:#f0f0f0;border-radius:10px;padding:3px 8px;color:#666}
.post-img-wrap{position:relative;user-select:none;-webkit-user-select:none}
.post-img-wrap img{width:100%;aspect-ratio:1;object-fit:cover}
.c-prev,.c-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.85);border:none;border-radius:50%;width:28px;height:28px;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:2}
.c-prev{left:8px}.c-next{right:8px}
.c-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);border-radius:12px;padding:2px 9px;font-size:11px;color:#fff;font-weight:600}
.c-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.dot{height:6px;border-radius:3px;transition:all 0.25s}
.dot.on{width:18px;background:#fff}.dot.off{width:6px;background:rgba(255,255,255,0.55)}
.heart-anim{position:absolute;top:50%;left:50%;font-size:86px;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop 0.9s ease forwards}
.reel-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.22);display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-play-btn{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,0.2);backdrop-filter:blur(4px);border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;font-size:24px;padding-left:4px}
.post-actions{padding:10px 14px 12px}
.action-row{display:flex;gap:14px;align-items:center;margin-bottom:8px}
.action-btn{background:none;border:none;font-size:26px;line-height:1;transition:transform 0.15s}
.action-btn:active{transform:scale(0.85)}
.like-count{font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:4px}
.post-caption{font-size:13px;line-height:1.55;margin-bottom:3px}
.view-cmts{background:none;border:none;padding:0;font-size:12px;color:#999;margin-top:2px;display:block}
.last-cmt{font-size:12px;color:#555;margin-top:4px}
.post-time{font-size:10px;color:#c0c0c0;margin-top:4px;text-transform:uppercase}
.song-tag{padding:6px 14px 0;font-size:11px;color:#555;font-style:italic}
#reels-page{background:#000}
#reels-topbar{position:sticky;top:0;z-index:10;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between}
#reels-topbar span{color:#fff;font-weight:700;font-size:18px}
.reel-card{position:relative;height:88vh;background:#111;margin-bottom:3px;overflow:hidden}
.reel-card img{width:100%;height:100%;object-fit:cover;opacity:0.82}
.reel-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-center-btn{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,0.14);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;padding-left:4px}
.reel-actions{position:absolute;right:12px;bottom:130px;display:flex;flex-direction:column;gap:22px;align-items:center}
.reel-action{display:flex;flex-direction:column;align-items:center;gap:3px}
.reel-action button{background:none;border:none;font-size:30px;line-height:1;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.6))}
.reel-action span{color:#fff;font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.7)}
.reel-info{position:absolute;bottom:0;left:0;right:65px;padding:60px 14px 22px;background:linear-gradient(to top,rgba(0,0,0,0.72),transparent);pointer-events:none}
.reel-uname{font-weight:700;font-size:13px;color:#fff;margin-bottom:5px}
.reel-cap{font-size:13px;color:rgba(255,255,255,0.9);line-height:1.5;margin-bottom:6px}
.reel-song{font-size:11px;color:rgba(255,255,255,0.55);display:flex;align-items:center;gap:5px}
.spin2{animation:spin 4s linear infinite;display:inline-block}
.prof-topbar{padding:13px 16px;border-bottom:1px solid #efefef;display:flex;align-items:center;justify-content:space-between}
.prof-topbar span{font-family:'Palatino Linotype',serif;font-size:19px;font-style:italic}
.prof-topbar button{background:none;border:none;font-size:13px;color:#999}
.prof-header{padding:20px 16px 14px}
.prof-row{display:flex;align-items:center;gap:22px;margin-bottom:16px}
.pav-ring{width:88px;height:88px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#b5534a,#c9915a,#e08040);flex-shrink:0}
.pav-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid #fff}
.prof-stats{display:flex;flex:1;justify-content:space-around}
.stat-val{font-weight:700;font-size:18px;color:#1a1a1a}
.stat-lbl{font-size:11px;color:#888;text-align:center}
.pname{font-family:'Palatino Linotype',serif;font-style:italic;font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.pbio{font-size:13px;color:#555;line-height:1.65;margin-bottom:3px}
.pmeta{font-size:12px;color:#888;margin-top:2px}
.pbtns{display:flex;gap:8px;margin-top:14px}
.pbtns button{flex:1;padding:8px;background:#f0f0f0;border:1px solid #dbdbdb;border-radius:8px;font-weight:600;font-size:13px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;border-top:1px solid #efefef}
.pgrid-item{aspect-ratio:1;overflow:hidden;background:#f0ece6}
.pgrid-item img{width:100%;height:100%;object-fit:cover}
.m-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.m-sheet{width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;max-height:90vh;overflow-y:auto;animation:slideUp 0.28s ease}
.m-handle{display:flex;justify-content:center;padding:10px 0 4px}
.m-handle-bar{width:38px;height:4px;border-radius:2px;background:#e0e0e0}
.m-header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 14px;border-bottom:1px solid #f0f0f0}
.m-header button{background:none;border:none;font-size:22px;color:#888}
.m-header span{font-weight:700;font-size:15px}
.clist{flex:1;overflow-y:auto;padding:12px 16px;min-height:80px}
.citem{display:flex;gap:10px;margin-bottom:16px}
.cavatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#b5534a,#c9915a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.ctext{font-size:13px;color:#333}
.ctime{font-size:10px;color:#bbb;margin-top:3px}
.cempty{text-align:center;padding:36px 0;color:#ccc}
.c-input-area{padding:10px 14px 22px;border-top:1px solid #f5f5f5;background:#fafafa}
.c-input-area input{width:100%;border:1px solid #efefef;border-radius:20px;padding:8px 14px;font-size:13px;outline:none;margin-bottom:8px;background:#fff}
.c-send-row{display:flex;gap:8px}
.c-send-row input{flex:1;border:1px solid #efefef;border-radius:20px;padding:10px 14px;font-size:13px;outline:none;background:#fff}
.c-send-btn{border:none;border-radius:20px;padding:0 18px;color:#fff;font-weight:700;font-size:13px;background:#3897f0}
#sv{position:fixed;inset:0;background:#000;z-index:300;display:none}
#sv img{width:100%;height:100%;object-fit:cover;opacity:0.88}
#sv-prog{position:absolute;top:0;left:0;right:0;height:3px}
#sv-info{position:absolute;top:14px;left:16px;display:flex;align-items:center;gap:10px}
#sv-info img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #fff}
.sv-name{color:#fff;font-weight:600;font-size:13px}
.sv-sub{color:rgba(255,255,255,0.6);font-size:11px}
#sv-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#fff;font-size:28px;z-index:10}
#sv-bot{position:absolute;bottom:60px;left:20px;right:20px}
.sv-head{font-family:'Palatino Linotype',serif;font-size:20px;font-style:italic;color:#fff;margin-bottom:4px}
.sv-date{font-size:12px;color:rgba(255,255,255,0.6)}
#vid-modal{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#vid-modal iframe{width:100%;max-width:480px;height:65vh;border:none;border-radius:10px}
#vid-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#vid-hint{color:rgba(255,255,255,0.35);font-size:12px;margin-top:14px;letter-spacing:1px}
.empty-state{text-align:center;padding:80px 20px;color:#bbb}
.empty-state .ei{font-size:48px;margin-bottom:12px}
@keyframes heartPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}15%{transform:translate(-50%,-50%) scale(1.4)}80%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spin-icon">✦</div>
  <div class="load-text">Loading your album...</div>
</div>

<div id="app" style="display:none">
  <div class="page active" id="home-page">
    <div class="top-bar">
      <div style="width:30px"></div>
      <span class="top-bar-title" id="home-title">Wedding Album</span>
      <button class="avatar-btn" onclick="goTo('profile')"><img id="top-av" src="" alt="" onerror="this.style.display='none'"/></button>
    </div>
    <div id="stories-row"><div id="stories-scroll"></div></div>
    <div id="feed"></div>
  </div>

  <div class="page" id="reels-page">
    <div id="reels-topbar"><span>Reels</span></div>
    <div id="reels-feed"></div>
  </div>

  <div class="page" id="profile-page">
    <div class="prof-topbar">
      <span id="prof-title">Wedding Album</span>
      <button onclick="refreshSheet()">↻ Refresh</button>
    </div>
    <div class="prof-header">
      <div class="prof-row">
        <div class="pav-ring"><img id="prof-av" src="" alt="" onerror="this.style.background='#f0d0b0'"/></div>
        <div class="prof-stats">
          <div><div class="stat-val" id="sp">0</div><div class="stat-lbl">Posts</div></div>
          <div><div class="stat-val" id="sl">0</div><div class="stat-lbl">Likes</div></div>
          <div><div class="stat-val" id="sc">0</div><div class="stat-lbl">Comments</div></div>
        </div>
      </div>
      <div class="pname" id="pname"></div>
      <div class="pbio" id="pbio"></div>
      <div class="pmeta" id="ploc"></div>
      <div class="pmeta" id="pdate"></div>
      <div class="pmeta" id="pphoto"></div>
      <div class="pbtns">
        <button onclick="refreshSheet()">↻ Refresh Photos</button>
        <button onclick="shareAlbum()">📤 Share Album</button>
      </div>
    </div>
    <div class="pgrid" id="pgrid"></div>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="goTo('home')"><span class="ni">🏠</span><span class="nl">Home</span></button>
    <button class="nav-btn" id="nav-reels" onclick="goTo('reels')"><span class="ni">▶️</span><span class="nl">Reels</span></button>
    <button class="nav-btn" id="nav-profile" onclick="goTo('profile')"><span class="ni">💑</span><span class="nl">Profile</span></button>
  </nav>
</div>

<div id="modal-root"></div>

<div id="sv">
  <img id="sv-img" src="" alt=""/>
  <div id="sv-prog"></div>
  <div id="sv-info"><img id="sv-av" src="" alt=""/><div><div class="sv-name" id="sv-couple"></div><div class="sv-sub" id="sv-sub"></div></div></div>
  <button id="sv-close" onclick="closeSV()">x</button>
  <div id="sv-bot"><div class="sv-head" id="sv-lbl"></div><div class="sv-date" id="sv-dt"></div></div>
</div>

<div id="vid-modal">
  <button id="vid-close" onclick="closeVid()">x</button>
  <iframe id="vid-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  <div id="vid-hint">Tap x to close</div>
</div>

<script>
var SHEET_ID="1D7XRzOjWnOqnovFdw8U08FafF_OTa_cu3LWt8LAd5CE";
var POSTS=[],STORIES_DATA=[],PROF={bride:"",groom:"",date:"",location:"",photographer:"",bio:"",avatarUrl:""};
var LKS={},LKD={},CMTS={},CI={};

function ld(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function es(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function cp(){return es(PROF.bride)+" &amp; "+es(PROF.groom);}
function ta(ts){var s=Math.floor((Date.now()-ts)/1000);if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";}
function drid(url){if(!url)return null;var pp=[/\/file\/d\/([a-zA-Z0-9_-]{20,})/,/[?&]id=([a-zA-Z0-9_-]{20,})/,/\/d\/([a-zA-Z0-9_-]{20,})/];for(var i=0;i<pp.length;i++){var m=url.match(pp[i]);if(m)return m[1];}if(/^[a-zA-Z0-9_-]{20,}$/.test((url||"").trim()))return url.trim();return null;}
function dth(id,sz){return"https://drive.google.com/thumbnail?id="+id+"&sz="+(sz||"w800");}
function demb(id){return"https://drive.google.com/file/d/"+id+"/preview";}

function parseCSV(txt){
  var rows=[],lines=txt.split("\n");
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=[],cur="",inQ=false;
    for(var j=0;j<line.length;j++){var c=line[j];if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){cols.push(cur.trim());cur="";}else{cur+=c;}}
    cols.push(cur.trim());rows.push(cols);
  }
  return rows;
}

function processRows(rows){
  POSTS=[];STORIES_DATA=[];PROF={bride:"",groom:"",date:"",location:"",photographer:"",bio:"",avatarUrl:""};
  var t=Date.now();
  rows.forEach(function(r,idx){
    var type=(r[0]||"").toLowerCase().trim();
    if(type==="profile"){
      PROF.bride=r[1]||"Bride";PROF.groom=r[2]||"Groom";PROF.date=r[3]||"";
      PROF.location=r[4]||"Kerala";PROF.photographer=r[5]||"";PROF.bio=r[6]||"";
      var av=r[7]||"";var avId=drid(av);
      PROF.avatarUrl=avId?dth(avId,"w200"):av;
    } else if(type==="post"){
      var imgs=[];
      for(var c=1;c<=4;c++){var lnk=(r[c]||"").trim();if(!lnk)continue;var id=drid(lnk);imgs.push(id?dth(id,"w800"):lnk);}
      if(imgs.length)POSTS.push({id:"p"+idx,type:"post",caption:r[5]||"",time:t-(idx*300000),images:imgs});
    } else if(type==="reel"){
      var lnk=(r[1]||"").trim();var id=drid(lnk);
      POSTS.push({id:"r"+idx,type:"reel",caption:r[5]||"",song:r[6]||"",time:t-(idx*300000),thumb:id?dth(id,"w800"):lnk,driveId:id});
    } else if(type==="story"){
      var lnk=(r[1]||"").trim();var id=drid(lnk);
      STORIES_DATA.push({img:id?dth(id,"w200"):lnk,fullImg:id?dth(id,"w1200"):lnk,label:r[5]||"Story"});
    }
  });
}

function loadSheet(){
  var url="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&sheet=Sheet1";
  fetch(url)
    .then(function(r){if(!r.ok)throw new Error("fail");return r.text();})
    .then(function(txt){
      processRows(parseCSV(txt));
      LKS=ld("wg-lks")||{};LKD=ld("wg-lkd")||{};CMTS=ld("wg-cmts")||{};
      document.getElementById("loading-screen").style.display="none";
      document.getElementById("app").style.display="block";
      renderFeed();
    })
    .catch(function(){
      document.getElementById("loading-screen").innerHTML=
        '<div style="text-align:center;padding:40px 20px;color:#f7ead6">'+
        '<div style="font-size:40px;margin-bottom:16px">&#x26A0;&#xFE0F;</div>'+
        '<div style="font-size:15px;margin-bottom:8px">Could not load album</div>'+
        '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:24px">Check your internet connection</div>'+
        '<button onclick="loadSheet()" style="background:linear-gradient(135deg,#5c1e12,#c9915a);border:none;border-radius:10px;color:#fff;padding:12px 28px;font-size:14px;cursor:pointer">Try Again</button>'+
        '</div>';
    });
}

function refreshSheet(){
  var ls=document.getElementById("loading-screen");
  ls.style.display="flex";
  ls.innerHTML='<div class="spin-icon">&#x2726;</div><div class="load-text">Refreshing...</div>';
  loadSheet();
}

function goTo(pg){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  document.getElementById(pg+"-page").classList.add("active");
  document.getElementById("nav-"+pg).classList.add("active");
  if(pg==="home")renderFeed();
  if(pg==="reels")renderReels();
  if(pg==="profile")renderProfile();
}

var STRS=[{l:"Bride",g:["#b5534a","#e08040"]},{l:"Groom",g:["#2d6a4f","#52b788"]},{l:"Together",g:["#7a5040","#c4875a"]},{l:"Family",g:["#9b3a7a","#e06fa0"]},{l:"Friends",g:["#7a5a35","#c9994a"]},{l:"Ceremony",g:["#5c1e12","#9a4e22"]}];
var SRIMG=["https://images.unsplash.com/photo-1537633552985-df8429e8048b?w=120","https://images.unsplash.com/photo-1600091166971-7f9faad6c498?w=120","https://images.unsplash.com/photo-1606800052052-a08af7148866?w=120","https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=120","https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=120","https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=120"];

function renderStories(){
  var h="";
  var colors=[["#b5534a","#e08040"],["#2d6a4f","#52b788"],["#7a5040","#c4875a"],["#9b3a7a","#e06fa0"],["#7a5a35","#c9994a"],["#5c1e12","#9a4e22"],["#3a4a6b","#6080b0"],["#6b3a6b","#a060a0"]];
  if(STORIES_DATA && STORIES_DATA.length > 0){
    STORIES_DATA.forEach(function(s,i){
      var g=colors[i%colors.length];
      h+='<div class="story-item" onclick="openStory('+i+')">'
        +'<div class="story-ring" style="background:linear-gradient(135deg,'+g[0]+','+g[1]+')">'
        +'<img src="'+es(s.img)+'" onerror="this.style.opacity=0"/>'
        +'</div><div class="story-label">'+es(s.label)+'</div></div>';
    });
  } else {
    var fp=POSTS.find(function(p){return p.type==="post"&&p.images&&p.images.length;});
    if(fp)SRIMG[0]=fp.images[0];
    STRS.forEach(function(s,i){
      h+='<div class="story-item" onclick="showSV('+i+')"><div class="story-ring" style="background:linear-gradient(135deg,'+s.g[0]+','+s.g[1]+')"><img src="'+SRIMG[i]+'" onerror="this.style.display=\'none\'"/></div><div class="story-label">'+es(s.l)+'</div></div>';
    });
  }
  document.getElementById("stories-scroll").innerHTML=h;
}

function openStory(i){
  var s=STORIES_DATA[i]; if(!s) return;
  var colors=[["#b5534a","#e08040"],["#2d6a4f","#52b788"],["#7a5040","#c4875a"],["#9b3a7a","#e06fa0"],["#7a5a35","#c9994a"],["#5c1e12","#9a4e22"]];
  var g=colors[i%colors.length];
  document.getElementById("sv-img").src=s.fullImg||s.img;
  document.getElementById("sv-prog").style.background="linear-gradient(90deg,"+g[0]+","+g[1]+")";
  document.getElementById("sv-av").src=PROF.avatarUrl||"";
  document.getElementById("sv-couple").innerHTML=cp();
  document.getElementById("sv-sub").textContent=s.label;
  document.getElementById("sv-lbl").textContent=s.label;
  document.getElementById("sv-dt").textContent=(PROF.date||"")+" - "+(PROF.location||"");
  document.getElementById("sv").style.display="block";
}

function renderFeed(){
  updateTB();renderStories();
  var el=document.getElementById("feed");
  if(!POSTS.length){el.innerHTML='<div class="empty-state"><div class="ei">&#x1F4F8;</div><div style="font-weight:600;margin-bottom:6px">No posts yet</div><div style="font-size:13px">Add rows to your Google Sheet</div></div>';return;}
  el.innerHTML=POSTS.map(mkPost).join("");
}

function mkPost(p){
  var isR=p.type==="reel",ci=CI[p.id]||0;
  var src=isR?(p.thumb||""):((p.images&&p.images[ci])||"");
  var lk=LKS[p.id]||0,ld2=LKD[p.id]?true:false;
  var cm=CMTS[p.id]||[],last=cm.length?cm[cm.length-1]:null;
  var imgH="";
  if(src){
    if(isR){
      var vid=p.driveId||"";
      imgH='<div class="post-img-wrap"><img src="'+es(src)+'" loading="lazy" onerror="this.parentNode.style.display=\'none\'"/><div class="reel-overlay" onclick="playVid(\''+vid+'\')"><div class="reel-play-btn">&#x25B6;</div></div><span id="hrt-'+p.id+'"></span></div>';
    } else {
      imgH='<div class="post-img-wrap" ondblclick="dtap(\''+p.id+'\')"><img src="'+es(src)+'" loading="lazy" onerror="this.parentNode.style.display=\'none\'"/>';
      if(p.images&&p.images.length>1){
        imgH+='<div class="c-count">'+(ci+1)+"/"+p.images.length+"</div>";
        imgH+='<div class="c-dots">';
        for(var i=0;i<p.images.length;i++)imgH+='<div class="dot '+(i===ci?"on":"off")+'"></div>';
        imgH+="</div>";
        if(ci>0)imgH+='<button class="c-prev" onclick="slide(\''+p.id+'\',-1)">&#x2039;</button>';
        if(ci<p.images.length-1)imgH+='<button class="c-next" onclick="slide(\''+p.id+'\',1)">&#x203A;</button>';
      }
      imgH+='<span id="hrt-'+p.id+'"></span></div>';
    }
  }
  return '<div class="post-card" id="pc-'+p.id+'">'
    +'<div class="post-header"><div class="post-avatar"><img src="'+es(PROF.avatarUrl)+'" onerror="this.style.background=\'#f0d0b0\'"/></div>'
    +'<div style="flex:1"><div class="post-meta-name">'+cp()+'</div><div class="post-meta-time">'+ta(p.time)+'</div></div>'
    +(isR?'<span class="reel-badge">&#x1F3AC; Reel</span>':"")+'</div>'
    +imgH
    +(isR&&p.song?'<div class="song-tag">&#x1F3B5; '+es(p.song)+"</div>":"")
    +'<div class="post-actions"><div class="action-row">'
    +'<button class="action-btn" onclick="tgLike(\''+p.id+'\')">'+(ld2?"&#x2764;&#xFE0F;":"&#x1F90D;")+"</button>"
    +'<button class="action-btn" style="font-size:24px" onclick="openC(\''+p.id+'\')">&#x1F4AC;</button>'
    +'<button class="action-btn" style="font-size:22px" onclick="shareAlbum()">&#x1F4E4;</button></div>'
    +(lk?'<div class="like-count">'+lk.toLocaleString()+" like"+(lk!==1?"s":"")+"</div>":"")
    +'<div class="post-caption"><strong>'+cp()+"</strong> "+es(p.caption)+"</div>"
    +(cm.length?'<button class="view-cmts" onclick="openC(\''+p.id+'\')">View all '+cm.length+" comment"+(cm.length!==1?"s":"")+"</button>":"")
    +(last?'<div class="last-cmt"><strong>'+es(last.name)+"</strong> "+es(last.text)+"</div>":"")
    +'<div class="post-time">'+ta(p.time)+"</div></div></div>";
}

function slide(id,dir){var p=POSTS.find(function(x){return x.id===id;});if(!p)return;CI[id]=Math.max(0,Math.min((CI[id]||0)+dir,(p.images||[]).length-1));var el=document.getElementById("pc-"+id);if(el)el.outerHTML=mkPost(p);}

function tgLike(id){var w=LKD[id];LKS[id]=Math.max(0,(LKS[id]||0)+(w?-1:1));LKD[id]=!w;sv("wg-lks",LKS);sv("wg-lkd",LKD);renderFeed();renderProfile();}
function dtap(id){if(!LKD[id])tgLike(id);var el=document.getElementById("hrt-"+id);if(el){el.innerHTML='<div class="heart-anim">&#x2764;&#xFE0F;</div>';setTimeout(function(){el.innerHTML="";},900);}}

function renderReels(){
  var reels=POSTS.filter(function(p){return p.type==="reel";});
  var el=document.getElementById("reels-feed");
  if(!reels.length){el.innerHTML='<div class="empty-state" style="color:#555"><div class="ei">&#x1F3AC;</div><div style="color:#aaa;font-weight:600">No reels yet</div></div>';return;}
  el.innerHTML=reels.map(function(r){
    var lk=LKS[r.id]||0,ld2=LKD[r.id]?true:false,cm=CMTS[r.id]||[],vid=r.driveId||"";
    return '<div class="reel-card" ondblclick="dtapR(\''+r.id+'\')">'
      +(r.thumb?'<img src="'+es(r.thumb)+'" loading="lazy"/>':'<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a0808,#5c2020);display:flex;align-items:center;justify-content:center;font-size:48px">&#x1F3AC;</div>')
      +'<div class="reel-center" onclick="playVid(\''+vid+'\')"><div class="reel-center-btn">&#x25B6;</div></div>'
      +'<span id="hrtr-'+r.id+'"></span>'
      +'<div class="reel-actions">'
      +'<div class="reel-action"><button onclick="tgLike(\''+r.id+'\')">'+(ld2?"&#x2764;&#xFE0F;":"&#x1F90D;")+"</button>"+(lk?"<span>"+lk+"</span>":"")+"</div>"
      +'<div class="reel-action"><button onclick="openC(\''+r.id+'\')">&#x1F4AC;</button>'+(cm.length?"<span>"+cm.length+"</span>":"")+"</div>"
      +'<div class="reel-action"><button onclick="shareAlbum()">&#x1F4E4;</button></div></div>'
      +'<div class="reel-info"><div class="reel-uname">'+cp()+"</div><div class=\"reel-cap\">"+es(r.caption)+"</div>"
      +(r.song?'<div class="reel-song"><span class="spin2">&#x1F3B5;</span>'+es(r.song)+"</div>":"")
      +"</div></div>";
  }).join("");
}
function dtapR(id){if(!LKD[id])tgLike(id);var el=document.getElementById("hrtr-"+id);if(el){el.innerHTML='<div class="heart-anim">&#x2764;&#xFE0F;</div>';setTimeout(function(){el.innerHTML="";},900);}}

function playVid(driveId){
  if(!driveId){alert("Video not found. Check the Drive link in your Sheet.");return;}
  document.getElementById("vid-frame").src=demb(driveId);
  document.getElementById("vid-modal").style.display="flex";
  document.body.style.overflow="hidden";
}
function closeVid(){document.getElementById("vid-frame").src="";document.getElementById("vid-modal").style.display="none";document.body.style.overflow="";}

function renderProfile(){
  document.getElementById("prof-title").innerHTML=cp();
  document.getElementById("pname").innerHTML=cp();
  document.getElementById("pbio").textContent=PROF.bio||"";
  document.getElementById("ploc").textContent="&#x1F4CD; "+(PROF.location||"");
  document.getElementById("pdate").textContent="&#x1F495; "+(PROF.date||"");
  document.getElementById("pphoto").textContent="&#x1F4F8; "+(PROF.photographer||"");
  document.getElementById("prof-av").src=PROF.avatarUrl||"";
  var tl=Object.values(LKS).reduce(function(a,b){return a+b;},0);
  var tc=Object.values(CMTS).reduce(function(a,b){return a+b.length;},0);
  document.getElementById("sp").textContent=POSTS.length;
  document.getElementById("sl").textContent=tl;
  document.getElementById("sc").textContent=tc;
  var imgs=[];
  POSTS.filter(function(p){return p.type==="post";}).forEach(function(p){(p.images||[]).forEach(function(img){if(imgs.length<12)imgs.push(img);});});
  document.getElementById("pgrid").innerHTML=imgs.length?imgs.map(function(s){return'<div class="pgrid-item"><img src="'+es(s)+'" loading="lazy" onerror="this.style.display=\'none\'"/></div>';}).join(""):'<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#ccc"><div style="font-size:40px;margin-bottom:12px">&#x1F5BC;&#xFE0F;</div><p>Photos appear here</p></div>';
}

function updateTB(){document.getElementById("home-title").innerHTML=cp();document.getElementById("top-av").src=PROF.avatarUrl||"";}

function showSV(i){
  var s=STRS[i];var fp=POSTS.find(function(p){return p.type==="post"&&p.images&&p.images.length;});
  var img=(i===0&&fp)?fp.images[0]:SRIMG[i];
  document.getElementById("sv-img").src=img;
  document.getElementById("sv-prog").style.background="linear-gradient(90deg,"+s.g[0]+","+s.g[1]+")";
  document.getElementById("sv-av").src=PROF.avatarUrl||"";
  document.getElementById("sv-couple").innerHTML=cp();
  document.getElementById("sv-sub").textContent=s.l;
  document.getElementById("sv-lbl").textContent=s.l;
  document.getElementById("sv-dt").textContent=(PROF.date||"")+" - "+(PROF.location||"");
  document.getElementById("sv").style.display="block";
}
function closeSV(){document.getElementById("sv").style.display="none";}

function shareAlbum(){
  if(navigator.share){navigator.share({url:window.location.href,title:PROF.bride+" & "+PROF.groom+" Wedding Album"});}
  else{try{navigator.clipboard.writeText(window.location.href);}catch(e){}alert("Link copied! Share on WhatsApp");}
}

function openC(pid){
  var cm=CMTS[pid]||[];
  var h='<div class="m-overlay" id="cmod" onclick="closeCBG(event)"><div class="m-sheet" style="display:flex;flex-direction:column;max-height:78vh">'
    +'<div class="m-handle"><div class="m-handle-bar"></div></div>'
    +'<div class="m-header"><span>Comments</span><button onclick="closeC()">x</button></div>'
    +'<div class="clist" id="clist">'
    +(cm.length?cm.map(function(c){return'<div class="citem"><div class="cavatar">'+es((c.name||"?")[0].toUpperCase())+'</div><div><div class="ctext"><strong>'+es(c.name)+"</strong> "+es(c.text)+'</div><div class="ctime">'+ta(c.time)+"</div></div></div>";}).join(""):'<div class="cempty"><div style="font-size:30px;margin-bottom:8px">&#x1F4AC;</div><div style="font-size:13px">Be the first to comment!</div></div>')
    +'</div><div class="c-input-area"><input id="cn" placeholder="Your name (optional)"/>'
    +'<div class="c-send-row"><input id="ct" placeholder="Write a comment..." onkeydown="if(event.key===\'Enter\')addC(\''+pid+'\')"/>'
    +'<button class="c-send-btn" onclick="addC(\''+pid+'\')">Post</button></div></div></div></div>';
  document.getElementById("modal-root").innerHTML=h;
  var cl=document.getElementById("clist");if(cl)cl.scrollTop=cl.scrollHeight;
}
function gv(id){var el=document.getElementById(id);return el?el.value:"";}
function addC(pid){
  var nm=gv("cn")||"Guest",tx=gv("ct");
  if(!tx.trim())return;
  if(!CMTS[pid])CMTS[pid]=[];
  CMTS[pid].push({name:nm,text:tx.trim(),time:Date.now()});
  sv("wg-cmts",CMTS);openC(pid);renderFeed();renderProfile();
}
function closeC(){document.getElementById("modal-root").innerHTML="";}
function closeCBG(e){if(e.target.id==="cmod")closeC();}

loadSheet();
</script>
</body>
</html>
