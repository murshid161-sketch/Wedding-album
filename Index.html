<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#fafafa;overflow-x:hidden}
::-webkit-scrollbar{display:none}
button{cursor:pointer;font-family:'Inter',sans-serif}

.page{display:none;max-width:480px;margin:0 auto;min-height:100vh;background:#fafafa;padding-bottom:70px}

#stories-scroll{display:flex;gap:14px;padding:0 12px;overflow-x:auto;scrollbar-width:none}

.post-meta-name{font-weight:600;font-size:13px}
.post-meta-time{font-size:11px;color:#999}
.reel-badge{font-size:11px;background:#f0f0f0;border-radius:10px;padding:3px 8px;color:#666}
.post-img-wrap{position:relative;user-select:none;-webkit-user-select:none}

.dot.on{width:18px;background:#fff}.dot.off{width:6px;background:rgba(255,255,255,0.55)}
.heart-anim{position:absolute;top:50%;left:50%;font-size:86px;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop 0.9s ease forwards}

.post-actions{padding:10px 14px 12px}

.post-caption{font-size:13px;line-height:1.55;margin-bottom:3px}

#reels-page{background:#000}

.prof-header{padding:20px 16px 14px}
.prof-row{display:flex;align-items:center;gap:22px;margin-bottom:16px}
.pav-ring{width:88px;height:88px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#b5534a,#c9915a,#e08040);flex-shrink:0}

.stat-val{font-weight:700;font-size:18px;color:#1a1a1a}
.stat-lbl{font-size:11px;color:#888;text-align:center}
.pname{font-family:'Palatino Linotype',serif;font-style:italic;font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.pbio{font-size:13px;color:#555;line-height:1.65;margin-bottom:3px}
.pmeta{font-size:12px;color:#888;margin-top:2px}
.pbtns{display:flex;gap:8px;margin-top:14px}
.pbtns button{flex:1;padding:8px;background:#f0f0f0;border:1px solid #dbdbdb;border-radius:8px;font-weight:600;font-size:13px}

.m-handle{display:flex;justify-content:center;padding:10px 0 4px}
.m-handle-bar{width:38px;height:4px;border-radius:2px;background:#e0e0e0}
.m-header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 14px;border-bottom:1px solid #f0f0f0}
.m-header button{background:none;border:none;font-size:22px;color:#888}
.m-header span{font-weight:700;font-size:15px}
.clist{flex:1;overflow-y:auto;padding:12px 16px;min-height:80px}
.citem{display:flex;gap:10px;margin-bottom:16px}
.cavatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#b5534a,#c9915a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.ctext{font-size:13px;color:#333}
.ctime{font-size:10px;color:#bbb;margin-top:3px}
.cempty{text-align:center;padding:36px 0;color:#ccc}
.c-input-area{padding:10px 14px 22px;border-top:1px solid #f5f5f5;background:#fafafa}

.c-send-row{display:flex;gap:8px}
.c-send-row input{flex:1;border:1px solid #efefef;border-radius:20px;padding:10px 14px;font-size:13px;outline:none;background:#fff}
.c-send-btn{border:none;border-radius:20px;padding:0 18px;color:#fff;font-weight:700;font-size:13px;background:#3897f0}
#sv{position:fixed;inset:0;background:#000;z-index:300;display:none}
#sv img{width:100%;height:100%;object-fit:cover;opacity:0.88}
#sv-prog{position:absolute;top:0;left:0;right:0;height:3px}
#sv-info{position:absolute;top:14px;left:16px;display:flex;align-items:center;gap:10px}
#sv-info img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #fff}
.sv-name{color:#fff;font-weight:600;font-size:13px}
.sv-sub{color:rgba(255,255,255,0.6);font-size:11px}
#sv-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#fff;font-size:28px;z-index:10}
#sv-bot{position:absolute;bottom:60px;left:20px;right:20px}
.sv-head{font-family:'Palatino Linotype',serif;font-size:20px;font-style:italic;color:#fff;margin-bottom:4px}
.sv-date{font-size:12px;color:rgba(255,255,255,0.6)}
#vid-modal{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#vid-modal iframe{width:100%;max-width:480px;height:65vh;border:none;border-radius:10px}
#vid-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#vid-hint{color:rgba(255,255,255,0.35);font-size:12px;margin-top:14px;letter-spacing:1px}
.empty-state{text-align:center;padding:80px 20px;color:#bbb}
.empty-state .ei{font-size:48px;margin-bottom:12px}
/* Firebase config banner */
#fb-banner{position:fixed;top:0;left:0;right:0;z-index:999;background:#ff6b35;color:#fff;padding:10px 16px;font-size:12px;text-align:center;line-height:1.5;display:none}
#fb-banner a{color:#fff;font-weight:700;text-decoration:underline}
@keyframes heartPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}15%{transform:translate(-50%,-50%) scale(1.4)}80%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

var POSTS = [], STORIES_DATA = [], PROF = { bride:"",groom:"",date:"",location:"",photographer:"",bio:"",avatarUrl:"" };
// In-memory cache (synced from Firestore or localStorage)

// Load all likes for all posts from Firestore
async function loadAllLikesFromFirebase(){
  if(!window._FB_READY || !window._db) return;
  var {collection,getDocs,doc,getDoc} = window._fbFns;
  try {
    // Get like counts
    var snap = await getDocs(collection(window._db, "likes"));
    snap.forEach(function(d){
      LKS[d.id] = d.data().count || 0;
    });
    // Check which posts THIS user liked
    var usnap = await getDocs(collection(window._db, "userLikes_"+USER_ID));
    usnap.forEach(function(d){
      LKD[d.id] = true;
    });
  } catch(e){
    console.warn("Failed to load likes from Firebase:", e);
  }
}

// Load all comments from Firestore
async function loadAllCommentsFromFirebase(){
  if(!window._FB_READY || !window._db) return;
  var {collection,getDocs,query,orderBy} = window._fbFns;
  try {
    var postsSnap = await getDocs(collection(window._db,"posts"));
    for(var d of postsSnap.docs){
      var pid = d.id;
      var cmtSnap = await getDocs(query(collection(window._db,"posts",pid,"comments"), orderBy("time","asc")));
      CMTS[pid] = [];
      cmtSnap.forEach(function(c){
        var dat = c.data();
        CMTS[pid].push({name:dat.name||"Guest",text:dat.text,time:dat.time? dat.time.toMillis():Date.now()});
      });
    }
  } catch(e){
    console.warn("Failed to load comments from Firebase:", e);
  }
}

// Toggle like — saves to Firestore
async function tgLike(id){
  var wasLiked = LKD[id];
  // Optimistic update
  LKS[id] = Math.max(0, (LKS[id]||0) + (wasLiked ? -1 : 1));
  LKD[id] = !wasLiked;
  renderFeed();
  renderProfile();

  if(window._FB_READY && window._db){
    var {doc,setDoc,updateDoc,increment,collection} = window._fbFns;
    try {
      // Update global like count
      var likeRef = doc(window._db,"likes",id);
      await setDoc(likeRef, {count: increment(wasLiked ? -1 : 1)}, {merge:true});
      // Track per-user like
      var userLikeRef = doc(window._db, "userLikes_"+USER_ID, id);
      if(!wasLiked){
        await setDoc(userLikeRef, {liked:true});
      } else {
        var {deleteDoc} = window._fbFns;
        if(deleteDoc) await deleteDoc(userLikeRef);
        else await setDoc(userLikeRef, {liked:false});
      }
    } catch(e){
      console.warn("Like save failed:", e);
      // Still works locally
    }
  } else {
    // Fallback: localStorage
    sv("wg-lks",LKS); sv("wg-lkd",LKD);
  }
}

// Add comment — saves to Firestore
async function addC(pid){
  var nm = gv("cn")||"Guest", tx = gv("ct");
  if(!tx.trim()) return;
  var cmt = {name:nm, text:tx.trim(), time:Date.now()};

  if(!CMTS[pid]) CMTS[pid]=[];
  CMTS[pid].push(cmt);
  openC(pid);
  renderFeed();
  renderProfile();

  if(window._FB_READY && window._db){
    var {collection,addDoc,serverTimestamp,doc,setDoc} = window._fbFns;
    try {
      // Ensure post doc exists
      await setDoc(doc(window._db,"posts",pid), {id:pid}, {merge:true});
      // Add comment subcollection
      await addDoc(collection(window._db,"posts",pid,"comments"), {
        name: nm,
        text: tx.trim(),
        time: serverTimestamp()
      });
    } catch(e){
      console.warn("Comment save failed:", e);
    }
  } else {
    sv("wg-cmts",CMTS);
  }
}

// Listen for real-time comment updates on an open post
var _unsubComment = null;
function listenComments(pid){
  if(!window._FB_READY || !window._db) return;
  if(_unsubComment) _unsubComment();
  var {collection,query,orderBy,onSnapshot,doc} = window._fbFns;
  _unsubComment = onSnapshot(
    query(collection(window._db,"posts",pid,"comments"), orderBy("time","asc")),
    function(snap){
      CMTS[pid]=[];
      snap.forEach(function(c){
        var dat=c.data();
        CMTS[pid].push({name:dat.name||"Guest",text:dat.text,time:dat.time?dat.time.toMillis():Date.now()});
      });
      // Re-render comment list if modal is open
      var cl=document.getElementById("clist");
      if(cl) cl.innerHTML=renderCmtList(pid);
    }
  );
}

// CSV / SHEET LOADING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseCSV(txt){
  var rows=[],lines=txt.split("\n");
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=[],cur="",inQ=false;
    for(var j=0;j<line.length;j++){var c=line[j];if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){cols.push(cur.trim());cur="";}else{cur+=c;}}
    cols.push(cur.trim());rows.push(cols);
  }
  return rows;
}

function processRows(rows){
  POSTS=[];STORIES_DATA=[];PROF={bride:"",groom:"",date:"",location:"",photographer:"",bio:"",avatarUrl:""};
  var t=Date.now();
  rows.forEach(function(r,idx){
    var type=(r[0]||"").toLowerCase().trim();
    if(type==="profile"){
      PROF.bride=r[1]||"Bride";PROF.groom=r[2]||"Groom";PROF.date=r[3]||"";
      PROF.location=r[4]||"Kerala";PROF.photographer=r[5]||"";PROF.bio=r[6]||"";
      var av=r[7]||"";var avId=drid(av);
      PROF.avatarUrl=avId?dth(avId,"w200"):av;
    } else if(type==="post"){
      var imgs=[];
      for(var c=1;c<=4;c++){var lnk=(r[c]||"").trim();if(!lnk)continue;var id=drid(lnk);imgs.push(id?dth(id,"w800"):lnk);}
      if(imgs.length)POSTS.push({id:"p"+idx,type:"post",caption:r[5]||"",time:t-(idx*300000),images:imgs});
    } else if(type==="reel"){
      var lnk=(r[1]||"").trim();var id=drid(lnk);
      POSTS.push({id:"r"+idx,type:"reel",caption:r[5]||"",song:r[6]||"",time:t-(idx*300000),thumb:id?dth(id,"w800"):lnk,driveId:id});
    } else if(type==="story"){
      var lnk=(r[1]||"").trim();var id=drid(lnk);
      STORIES_DATA.push({img:id?dth(id,"w200"):lnk,fullImg:id?dth(id,"w1200"):lnk,label:r[5]||"Story"});
    }
  });
}

async function loadSheet(){
  var url="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&sheet=Sheet1";
  try {
    var r = await fetch(url);
    if(!r.ok) throw new Error("fail");
    var txt = await r.text();
    processRows(parseCSV(txt));

    // Load likes/comments (Firebase or localStorage)
    if(window._FB_READY && window._db){
      await loadAllLikesFromFirebase();
      await loadAllCommentsFromFirebase();
    } else {
      LKS=ld("wg-lks")||{};LKD=ld("wg-lkd")||{};CMTS=ld("wg-cmts")||{};
    }

    document.getElementById("loading-screen").style.display="none";
    document.getElementById("app").style.display="block";
    renderFeed();
  } catch(e) {
    document.getElementById("loading-screen").innerHTML=
      '<div style="text-align:center;padding:40px 20px;color:#f7ead6">'+
      '<div style="font-size:40px;margin-bottom:16px">⚠️</div>'+
      '<div style="font-size:15px;margin-bottom:8px">Could not load album</div>'+
      '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:24px">Check your internet connection</div>'+
      '<button onclick="loadSheet()" style="background:linear-gradient(135deg,#5c1e12,#c9915a);border:none;border-radius:10px;color:#fff;padding:12px 28px;font-size:14px;cursor:pointer">Try Again</button>'+
      '</div>';
  }
}

function refreshSheet(){
  var ls=document.getElementById("loading-screen");
  ls.style.display="flex";
  ls.innerHTML='<div class="spin-icon">&#x2726;</div><div class="load-text">Refreshing...</div>';
  loadSheet();
}

function renderStories(){
  var h="";
  var colors=[["#b5534a","#e08040"],["#2d6a4f","#52b788"],["#7a5040","#c4875a"],["#9b3a7a","#e06fa0"],["#7a5a35","#c9994a"],["#5c1e12","#9a4e22"],["#3a4a6b","#6080b0"],["#6b3a6b","#a060a0"]];
  if(STORIES_DATA && STORIES_DATA.length > 0){
    STORIES_DATA.forEach(function(s,i){
      var g=colors[i%colors.length];
      h+='<div class="story-item" onclick="openStory('+i+')">'
        +'<div class="story-ring" style="background:linear-gradient(135deg,'+g[0]+','+g[1]+')">'
        +'<img src="'+es(s.img)+'" onerror="this.style.opacity=0"/>'
        +'</div><div class="story-label">'+es(s.label)+'</div></div>';
    });
  } else {
    var fp=POSTS.find(function(p){return p.type==="post"&&p.images&&p.images.length;});
    if(fp)SRIMG[0]=fp.images[0];
    STRS.forEach(function(s,i){
      h+='<div class="story-item" onclick="showSV('+i+')"><div class="story-ring" style="background:linear-gradient(135deg,'+s.g[0]+','+s.g[1]+')"><img src="'+SRIMG[i]+'" onerror="this.style.display=\'none\'"/></div><div class="story-label">'+es(s.l)+'</div></div>';
    });
  }
  document.getElementById("stories-scroll").innerHTML=h;
}

function openStory(i){
  var s=STORIES_DATA[i]; if(!s) return;
  var colors=[["#b5534a","#e08040"],["#2d6a4f","#52b788"],["#7a5040","#c4875a"],["#9b3a7a","#e06fa0"],["#7a5a35","#c9994a"],["#5c1e12","#9a4e22"]];
  var g=colors[i%colors.length];
  document.getElementById("sv-img").src=s.fullImg||s.img;
  document.getElementById("sv-prog").style.background="linear-gradient(90deg,"+g[0]+","+g[1]+")";
  document.getElementById("sv-av").src=PROF.avatarUrl||"";
  document.getElementById("sv-couple").innerHTML=cp();
  document.getElementById("sv-sub").textContent=s.label;
  document.getElementById("sv-lbl").textContent=s.label;
  document.getElementById("sv-dt").textContent=(PROF.date||"")+" - "+(PROF.location||"");
  document.getElementById("sv").style.display="block";
}

function renderFeed(){
  updateTB();renderStories();
  var el=document.getElementById("feed");
  if(!POSTS.length){el.innerHTML='<div class="empty-state"><div class="ei">📸</div><div style="font-weight:600;margin-bottom:6px">No posts yet</div><div style="font-size:13px">Add rows to your Google Sheet</div></div>';return;}
  el.innerHTML=POSTS.map(mkPost).join("");
}

function mkPost(p){
  var isR=p.type==="reel",ci=CI[p.id]||0;
  var src=isR?(p.thumb||""):((p.images&&p.images[ci])||"");
  var lk=LKS[p.id]||0,ld2=LKD[p.id]?true:false;
  var cm=CMTS[p.id]||[],last=cm.length?cm[cm.length-1]:null;
  var imgH="";
  if(src){
    if(isR){
      var vid=p.driveId||"";
      imgH='<div class="post-img-wrap"><img src="'+es(src)+'" loading="lazy" onerror="this.parentNode.style.display=\'none\'"/><div class="reel-overlay" onclick="playVid(\''+vid+'\')"><div class="reel-play-btn">▶</div></div><span id="hrt-'+p.id+'"></span></div>';
    } else {
      imgH='<div class="post-img-wrap" ondblclick="dtap(\''+p.id+'\')"><img src="'+es(src)+'" loading="lazy" onerror="this.parentNode.style.display=\'none\'"/>';
      if(p.images&&p.images.length>1){
        imgH+='<div class="c-count">'+(ci+1)+"/"+p.images.length+"</div>";
        imgH+='<div class="c-dots">';
        for(var i=0;i<p.images.length;i++)imgH+='<div class="dot '+(i===ci?"on":"off")+'"></div>';
        imgH+="</div>";
        if(ci>0)imgH+='<button class="c-prev" onclick="slide(\''+p.id+'\',-1)">‹</button>';
        if(ci<p.images.length-1)imgH+='<button class="c-next" onclick="slide(\''+p.id+'\',1)">›</button>';
      }
      imgH+='<span id="hrt-'+p.id+'"></span></div>';
    }
  }
  return '<div class="post-card" id="pc-'+p.id+'">'
    +'<div class="post-header"><div class="post-avatar"><img src="'+es(PROF.avatarUrl)+'" onerror="this.style.background=\'#f0d0b0\'"/></div>'
    +'<div style="flex:1"><div class="post-meta-name">'+cp()+'</div><div class="post-meta-time">'+ta(p.time)+'</div></div>'
    +(isR?'<span class="reel-badge">🎬 Reel</span>':"")+'</div>'
    +imgH
    +(isR&&p.song?'<div class="song-tag">🎵 '+es(p.song)+"</div>":"")
    +'<div class="post-actions"><div class="action-row">'
    +'<button class="action-btn" onclick="tgLike(\''+p.id+'\')">'+(ld2?"❤️":"🤍")+"</button>"
    +'<button class="action-btn" style="font-size:24px" onclick="openC(\''+p.id+'\')">💬</button>'
    +'<button class="action-btn" style="font-size:22px" onclick="shareAlbum()">📤</button></div>'
    +(lk?'<div class="like-count">'+lk.toLocaleString()+" like"+(lk!==1?"s":"")+"</div>":"")
    +'<div class="post-caption"><strong>'+cp()+"</strong> "+es(p.caption)+"</div>"
    +(cm.length?'<button class="view-cmts" onclick="openC(\''+p.id+'\')">View all '+cm.length+" comment"+(cm.length!==1?"s":"")+"</button>":"")
    +(last?'<div class="last-cmt"><strong>'+es(last.name)+"</strong> "+es(last.text)+"</div>":"")
    +'<div class="post-time">'+ta(p.time)+"</div></div></div>";
}

function slide(id,dir){var p=POSTS.find(function(x){return x.id===id;});if(!p)return;CI[id]=Math.max(0,Math.min((CI[id]||0)+dir,(p.images||[]).length-1));var el=document.getElementById("pc-"+id);if(el)el.outerHTML=mkPost(p);}

function dtap(id){if(!LKD[id])tgLike(id);var el=document.getElementById("hrt-"+id);if(el){el.innerHTML='<div class="heart-anim">❤️</div>';setTimeout(function(){el.innerHTML="";},900);}}

  document.getElementById("ploc").textContent="📍 "+(PROF.location||"");

  document.getElementById("pphoto").textContent="📸 "+(PROF.photographer||"");
  document.getElementById("prof-av").src=PROF.avatarUrl||"";
  var tl=Object.values(LKS).reduce(function(a,b){return a+b;},0);
  var tc=Object.values(CMTS).reduce(function(a,b){return a+b.length;},0);
  document.getElementById("sp").textContent=POSTS.length;
  document.getElementById("sl").textContent=tl;
  document.getElementById("sc").textContent=tc;
  var imgs=[];
  POSTS.filter(function(p){return p.type==="post";}).forEach(function(p){(p.images||[]).forEach(function(img){if(imgs.length<12)imgs.push(img);});});
  document.getElementById("pgrid").innerHTML=imgs.length?imgs.map(function(s){return'<div class="pgrid-item"><img src="'+es(s)+'" loading="lazy" onerror="this.style.display=\'none\'"/></div>';}).join(""):'<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#ccc"><div style="font-size:40px;margin-bottom:12px">🖼️</div><p>Photos appear here</p></div>';
}

function updateTB(){document.getElementById("home-title").innerHTML=cp();document.getElementById("top-av").src=PROF.avatarUrl||"";}

function showSV(i){
  var s=STRS[i];var fp=POSTS.find(function(p){return p.type==="post"&&p.images&&p.images.length;});
  var img=(i===0&&fp)?fp.images[0]:SRIMG[i];
  document.getElementById("sv-img").src=img;
  document.getElementById("sv-prog").style.background="linear-gradient(90deg,"+s.g[0]+","+s.g[1]+")";
  document.getElementById("sv-av").src=PROF.avatarUrl||"";
  document.getElementById("sv-couple").innerHTML=cp();
  document.getElementById("sv-sub").textContent=s.l;
  document.getElementById("sv-lbl").textContent=s.l;
  document.getElementById("sv-dt").textContent=(PROF.date||"")+" - "+(PROF.location||"");
  document.getElementById("sv").style.display="block";
}
function closeSV(){document.getElementById("sv").style.display="none";}

// COMMENTS MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCmtList(pid){
  var cm=CMTS[pid]||[];
  if(!cm.length) return '<div class="cempty"><div style="font-size:30px;margin-bottom:8px">💬</div><div style="font-size:13px">Be the first to comment!</div></div>';
  return cm.map(function(c){
    return '<div class="citem"><div class="cavatar">'+es((c.name||"?")[0].toUpperCase())+'</div>'
      +'<div><div class="ctext"><strong>'+es(c.name)+"</strong> "+es(c.text)+'</div>'
      +'<div class="ctime">'+ta(c.time)+"</div></div></div>";
  }).join("");
}

function openC(pid){
  var h='<div class="m-overlay" id="cmod" onclick="closeCBG(event)"><div class="m-sheet" style="display:flex;flex-direction:column;max-height:78vh">'
    +'<div class="m-handle"><div class="m-handle-bar"></div></div>'
    +'<div class="m-header"><span>Comments '+(window._FB_READY?'<span style="font-size:10px;color:#4CAF50;font-weight:400">● live</span>':'<span style="font-size:10px;color:#ff6b35;font-weight:400">● local only</span>')+'</span><button onclick="closeC()">✕</button></div>'
    +'<div class="clist" id="clist">'+renderCmtList(pid)+'</div>'
    +'<div class="c-input-area"><input id="cn" placeholder="Your name (optional)"/>'
    +'<div class="c-send-row"><input id="ct" placeholder="Write a comment..." onkeydown="if(event.key===\'Enter\')addC(\''+pid+'\')"/>'
    +'<button class="c-send-btn" onclick="addC(\''+pid+'\')">Post</button></div></div></div></div>';
  document.getElementById("modal-root").innerHTML=h;
  var cl=document.getElementById("clist");if(cl)cl.scrollTop=cl.scrollHeight;
  listenComments(pid); // start real-time listener
}
function gv(id){var el=document.getElementById(id);return el?el.value:"";}
function closeC(){
  if(_unsubComment){_unsubComment();_unsubComment=null;}
  document.getElementById("modal-root").innerHTML="";
}
function closeCBG(e){if(e.target.id==="cmod")closeC();}

function shareAlbum(){
  if(navigator.share){navigator.share({url:window.location.href,title:PROF.bride+" & "+PROF.groom+" Wedding Album"});}
  else{try{navigator.clipboard.writeText(window.location.href);}catch(e){}alert("Link copied! Share on WhatsApp");}
}
